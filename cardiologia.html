<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cardiologia — MedQuest</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #f8fafc;
  --card: #ffffff;
  --primary: #dc2626;
  --text: #1e293b;
  --muted: #64748b;
  --border: #e2e8f0;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  margin: 0;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 2rem;
}

.header {
  margin-bottom: 2rem;
}

.header h1 {
  margin: 0;
  font-size: 2rem;
}

.subtemas-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px,1fr));
  gap: 1rem;
}

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 1.2rem;
  cursor: pointer;
  transition: 0.25s;
}

.card:hover {
  transform: translateY(-5px);
  border-color: var(--primary);
}

.emoji {
  font-size: 1.5rem;
  margin-bottom: 0.5rem;
}

.nome {
  font-weight: 700;
  color: var(--text);
}
</style>
</head>

<body>

<script src="js/auth.js"></script>
<script src="js/sidebar.js"></script>

<main class="container" id="main" style="display:none">

<div class="header">
  <h1>❤️ Cardiologia</h1>
  <p style="color: var(--muted)">Selecione um subtema</p>
</div>

<div class="subtemas-grid">

  <div class="card" onclick="abrir('Hipertensão arterial')">
    <div class="emoji">🩸</div>
    <div class="nome">Hipertensão arterial</div>
  </div>

  <div class="card" onclick="abrir('Arritmias')">
    <div class="emoji">💓</div>
    <div class="nome">Arritmias</div>
  </div>

  <div class="card" onclick="abrir('Insuficiência cardíaca')">
    <div class="emoji">🫀</div>
    <div class="nome">Insuficiência cardíaca</div>
  </div>

  <div class="card" onclick="abrir('Miocardiopatias')">
    <div class="emoji">📉</div>
    <div class="nome">Miocardiopatias</div>
  </div>

</div>

</main>

<script>
window.addEventListener('load', async () => {
  const session = await exigirLogin();
  if(!session) return;
  document.getElementById('main').style.display = 'block';
});

function abrir(sub){
  window.location.href = `questoes.html?tema=Cardiologia&subtema=${encodeURIComponent(sub)}`
}
</script>

</body>
</html>
