<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — MedQuest Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{--bg:#0d1117;--surface:#161b22;--border:#21262d;--accent:#3b82f6;--text:#e6edf3;--muted:#7d8590;--success:#3fb950;--danger:#f85149}
        body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);margin-left:16rem}
        @media(max-width:768px){body{margin-left:0}}
        .main{padding:2.5rem;max-width:900px}
        h1{font-family:'Sora',sans-serif;font-size:1.8rem;font-weight:700;margin-bottom:.3rem}

        .tabs{display:flex;gap:.5rem;margin:1.5rem 0}
        .tab-btn{padding:.5rem 1.25rem;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.9rem;cursor:pointer;transition:all .15s}
        .tab-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

        .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:2rem;margin-bottom:1.5rem}
        .card h3{font-family:'Sora',sans-serif;font-size:1rem;font-weight:600;margin-bottom:1.5rem}

        .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
        @media(max-width:600px){.form-grid{grid-template-columns:1fr}}
        .form-group{margin-bottom:1rem}
        .form-group.full{grid-column:1/-1}
        .form-group label{display:block;font-size:.82rem;color:var(--muted);font-weight:500;margin-bottom:.4rem}
        .form-group input,.form-group select,.form-group textarea{width:100%;padding:.7rem .9rem;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none;resize:vertical}
        .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent)}
        .opcoes-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem}
        .opcao-input{display:flex;gap:.5rem;align-items:center}
        .opcao-label{font-size:.85rem;font-weight:600;color:var(--muted);width:20px;flex-shrink:0}
        .btn-salvar{padding:.8rem 2rem;background:var(--accent);border:none;border-radius:10px;color:#fff;font-family:'Sora',sans-serif;font-size:.95rem;font-weight:600;cursor:pointer;transition:background .2s}
        .btn-salvar:hover{background:#2563eb}
        .btn-salvar:disabled{opacity:.5;cursor:not-allowed}
        .msg{margin-top:1rem;padding:.75rem 1rem;border-radius:8px;font-size:.9rem;display:none}
        .msg.ok{background:rgba(63,185,80,.1);color:var(--success);border:1px solid rgba(63,185,80,.3);display:block}
        .msg.erro{background:rgba(248,81,73,.1);color:var(--danger);border:1px solid rgba(248,81,73,.3);display:block}

        /* Lista de questões */
        .questao-row{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;padding:1rem 0;border-bottom:1px solid var(--border)}
        .questao-row:last-child{border-bottom:none}
        .questao-row-texto{font-size:.9rem;line-height:1.5;flex:1}
        .questao-row-meta{font-size:.78rem;color:var(--muted);margin-top:.25rem}
        .btn-excluir{padding:.35rem .75rem;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:.8rem;cursor:pointer;flex-shrink:0;transition:all .15s}
        .btn-excluir:hover{border-color:var(--danger);color:var(--danger)}
        .acesso-negado{text-align:center;padding:4rem 2rem;color:var(--muted)}
        .acesso-negado h2{font-family:'Sora',sans-serif;font-size:1.5rem;color:var(--danger);margin-bottom:1rem}
    </style>
</head>
<body>
<script src="sidebar.js"></script>
<script src="js/auth.js"></script>
<main class="main" id="main" style="display:none">
    <h1>Painel Admin</h1>
    <p style="color:var(--muted);margin-top:.3rem">Gerencie o banco de questões.</p>

    <div class="tabs">
        <button class="tab-btn active" onclick="trocarAba('adicionar', this)">+ Adicionar questão</button>
        <button class="tab-btn" onclick="trocarAba('listar', this)">Ver questões</button>
    </div>

    <!-- Adicionar -->
    <div id="aba-adicionar">
        <div class="card">
            <h3>Nova questão</h3>
            <div class="form-grid">
                <div class="form-group full">
                    <label>Enunciado da questão *</label>
                    <textarea id="f-pergunta" rows="4" placeholder="Digite o enunciado..."></textarea>
                </div>

                <div class="form-group full">
                    <label>Opções de resposta *</label>
                    <div class="opcoes-grid">
                        <div class="opcao-input"><span class="opcao-label">A</span><input type="text" id="op-0" placeholder="Opção A"></div>
                        <div class="opcao-input"><span class="opcao-label">B</span><input type="text" id="op-1" placeholder="Opção B"></div>
                        <div class="opcao-input"><span class="opcao-label">C</span><input type="text" id="op-2" placeholder="Opção C"></div>
                        <div class="opcao-input"><span class="opcao-label">D</span><input type="text" id="op-3" placeholder="Opção D"></div>
                        <div class="opcao-input"><span class="opcao-label">E</span><input type="text" id="op-4" placeholder="Opção E (opcional)"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Resposta correta *</label>
                    <select id="f-resposta">
                        <option value="0">A</option>
                        <option value="1">B</option>
                        <option value="2">C</option>
                        <option value="3">D</option>
                        <option value="4">E</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Tema / Especialidade *</label>
                    <input type="text" id="f-tema" placeholder="ex: Cardiologia">
                </div>

                <div class="form-group">
                    <label>Subtema</label>
                    <input type="text" id="f-subtema" placeholder="ex: Hipertensão">
                </div>

                <div class="form-group">
                    <label>Dificuldade</label>
                    <select id="f-dificuldade">
                        <option value="facil">Fácil</option>
                        <option value="media" selected>Média</option>
                        <option value="dificil">Difícil</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Banca</label>
                    <input type="text" id="f-banca" placeholder="ex: USP, FMUSP">
                </div>

                <div class="form-group">
                    <label>Ano</label>
                    <input type="number" id="f-ano" placeholder="ex: 2023">
                </div>

                <div class="form-group full">
                    <label>Gabarito comentado</label>
                    <textarea id="f-comentario" rows="4" placeholder="Explique a resposta correta..."></textarea>
                </div>
            </div>

            <button class="btn-salvar" id="btn-salvar" onclick="salvarQuestao()">Salvar questão</button>
            <div class="msg" id="msg-form"></div>
        </div>
    </div>

    <!-- Listar -->
    <div id="aba-listar" style="display:none">
        <div class="card">
            <h3>Questões cadastradas (<span id="total-q">0</span>)</h3>
            <div id="lista-admin"><p style="color:var(--muted)">Carregando...</p></div>
        </div>
    </div>
</main>

<div id="acesso-negado" style="display:none;padding:2.5rem">
    <div class="acesso-negado">
        <h2>Acesso negado</h2>
        <p>Você precisa ser administrador para acessar este painel.</p>
    </div>
</div>

<script>
window.addEventListener('load', async () => {
    const session = await exigirLogin();
    if (!session) return;

    const perfil = await getPerfil();
    if (!perfil || perfil.role !== 'admin') {
        document.getElementById('acesso-negado').style.display = 'block';
        return;
    }
    document.getElementById('main').style.display = 'block';
});

function trocarAba(aba, btn) {
    document.getElementById('aba-adicionar').style.display = aba === 'adicionar' ? 'block' : 'none';
    document.getElementById('aba-listar').style.display = aba === 'listar' ? 'block' : 'none';
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (aba === 'listar') carregarListaAdmin();
}

async function salvarQuestao() {
    const sb = window.supabaseClient;
    const pergunta = document.getElementById('f-pergunta').value.trim();
    const tema = document.getElementById('f-tema').value.trim();
    const respostaIdx = parseInt(document.getElementById('f-resposta').value);

    const opcoes = [0,1,2,3,4].map(i => document.getElementById(`op-${i}`).value.trim()).filter(v => v);

    if (!pergunta || !tema || opcoes.length < 2) {
        mostrarMsg('Preencha enunciado, tema e ao menos 2 opções.', 'erro');
        return;
    }
    if (respostaIdx >= opcoes.length) {
        mostrarMsg('A resposta correta deve corresponder a uma opção preenchida.', 'erro');
        return;
    }

    const btn = document.getElementById('btn-salvar');
    btn.disabled = true; btn.textContent = 'Salvando...';

    const { error } = await sb.from('questoes').insert({
        pergunta,
        opcoes,
        resposta: respostaIdx,
        tema,
        subtema: document.getElementById('f-subtema').value.trim() || null,
        dificuldade: document.getElementById('f-dificuldade').value,
        banca: document.getElementById('f-banca').value.trim() || null,
        ano: parseInt(document.getElementById('f-ano').value) || null,
        comentario: document.getElementById('f-comentario').value.trim() || null,
    });

    btn.disabled = false; btn.textContent = 'Salvar questão';

    if (error) { mostrarMsg('Erro: ' + error.message, 'erro'); return; }

    mostrarMsg('Questão salva com sucesso!', 'ok');
    // Limpa o formulário
    ['f-pergunta','op-0','op-1','op-2','op-3','op-4','f-tema','f-subtema','f-banca','f-ano','f-comentario']
        .forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
    document.getElementById('f-resposta').value = '0';
    document.getElementById('f-dificuldade').value = 'media';
}

function mostrarMsg(texto, tipo) {
    const el = document.getElementById('msg-form');
    el.textContent = texto;
    el.className = 'msg ' + tipo;
    setTimeout(() => { el.className = 'msg'; }, 4000);
}

async function carregarListaAdmin() {
    const sb = window.supabaseClient;
    const { data: questoes, count } = await sb.from('questoes').select('*', { count: 'exact' }).order('id', { ascending: false });
    document.getElementById('total-q').textContent = count || 0;
    const lista = document.getElementById('lista-admin');
    if (!questoes || questoes.length === 0) { lista.innerHTML = '<p style="color:var(--muted)">Nenhuma questão cadastrada.</p>'; return; }
    lista.innerHTML = questoes.map(q => `
        <div class="questao-row">
            <div>
                <div class="questao-row-texto">${q.pergunta.substring(0, 120)}${q.pergunta.length > 120 ? '...' : ''}</div>
                <div class="questao-row-meta">${q.tema || '—'} ${q.subtema ? '· '+q.subtema : ''} ${q.banca ? '· '+q.banca : ''} ${q.ano ? q.ano : ''}</div>
            </div>
            <button class="btn-excluir" onclick="excluirQuestao(${q.id}, this)">Excluir</button>
        </div>
    `).join('');
}

async function excluirQuestao(id, btn) {
    if (!confirm('Excluir esta questão permanentemente?')) return;
    const sb = window.supabaseClient;
    await sb.from('questoes').delete().eq('id', id);
    btn.closest('.questao-row').remove();
}
</script>
</body>
</html>
