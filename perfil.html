<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Meu Perfil — MedQuest Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --bg-body: #f8fafc;
      --bg-card: #ffffff;
      --text-main: #1e293b;
      --text-secondary: #64748b;
      --border-color: #e2e8f0;
      --danger: #ef4444;
      --radius-lg: 16px;
      --radius-md: 12px;
      --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
    }

    body {
      background-color: var(--bg-body);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      margin: 0;
    }

    .main-content {
      max-width: 1000px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem;
    }

    .page-header { margin-bottom: 2rem; }
    .page-header h1 { font-size: 1.8rem; font-weight: 800; color: var(--text-main); margin: 0; }
    .page-header p { color: var(--text-secondary); margin-top: 0.4rem; font-size: 0.95rem; }

    .perfil-grid {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 2rem;
      align-items: start;
    }

    @media (max-width: 900px) {
      .perfil-grid { grid-template-columns: 1fr; }
    }

    .perfil-card-left {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 2.5rem 1.5rem;
      box-shadow: var(--shadow);
      text-align: center;
      position: sticky;
      top: 2rem;
    }

    .perfil-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), #60a5fa);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      font-weight: 800;
      margin: 0 auto 1.5rem;
      box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.2);
      border: 4px solid #fff;
    }

    .perfil-nome { font-size: 1.25rem; font-weight: 700; color: var(--text-main); margin-bottom: 0.25rem; }
    .perfil-email { font-size: 0.85rem; color: var(--text-secondary); word-break: break-all; margin-bottom: 1.5rem; }

    .perfil-status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.4rem 1rem;
      background: #f1f5f9;
      border-radius: 99px;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-main);
      text-transform: uppercase;
    }

    .card-form {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 2rem;
      box-shadow: var(--shadow);
    }

    .section-title-wrap {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border-color);
    }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; margin-bottom: 1.25rem; }
    @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }

    .form-group { margin-bottom: 1.25rem; }
    .form-label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-main); margin-bottom: 0.5rem; }
    
    .form-input, .form-select {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      font-size: 0.9rem;
      font-family: inherit;
      background-color: #fff;
      box-sizing: border-box;
    }

    .form-input:focus, .form-select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
    }

    .btn-save {
      background: var(--primary);
      color: white;
      border: none;
      padding: 0.85rem 1.5rem;
      border-radius: var(--radius-md);
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 1rem;
    }

    .btn-save:hover { background: var(--primary-hover); }

    .danger-zone {
      margin-top: 2rem;
      background: #fff5f5;
      border: 1px solid #fee2e2;
      border-radius: var(--radius-lg);
      padding: 1.5rem;
    }

    .btn-danger-outline {
      background: transparent;
      border: 1px solid #fca5a5;
      color: #b91c1c;
      padding: 0.75rem;
      border-radius: var(--radius-md);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }

    .alert-custom {
      display: none;
      padding: 1rem;
      border-radius: var(--radius-md);
      font-size: 0.9rem;
      font-weight: 600;
      margin-top: 1rem;
      text-align: center;
    }
    .alert-custom.show { display: block; animation: fadeIn 0.3s ease; }
    .alert-success { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
    .alert-error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
<script src="js/auth.js"></script>
<script src="js/sidebar.js"></script>

<main class="main-content" id="main" style="display:none">
  <div class="page-header">
    <h1>Meu Perfil</h1>
    <p>Gerencie suas informações pessoais e acadêmicas.</p>
  </div>

  <div class="perfil-grid">
    <aside>
      <div class="perfil-card-left">
        <div class="perfil-avatar" id="pf-av">?</div>
        <div class="perfil-nome" id="pf-nome">—</div>
        <div class="perfil-email" id="pf-email">—</div>
        <div class="perfil-status-badge">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" style="color:#10b981; margin-right: 5px;"><path d="M20 6L9 17l-5-5"/></svg>
            Conta Ativa
        </div>
      </div>
    </aside>

    <section>
      <div class="card-form">
        <div class="section-title-wrap">
          <span>👤</span>
          <h2 style="margin:0; font-size:1.1rem; font-weight:700">Dados Pessoais</h2>
        </div>

        <div class="form-group">
          <label class="form-label">Nome Completo</label>
          <input class="form-input" id="pf-nome-input" placeholder="Como você quer ser chamado?">
        </div>

        <div class="section-title-wrap" style="margin-top: 2rem;">
          <span>🎓</span>
          <h2 style="margin:0; font-size:1.1rem; font-weight:700">Informações Acadêmicas</h2>
        </div>
        
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Idade</label>
            <input class="form-input" type="number" id="pf-idade" placeholder="Ex: 24">
          </div>
          <div class="form-group">
            <label class="form-label">Nível de Formação</label>
            <select class="form-select" id="pf-nivel">
              <option value="">Selecione...</option>
              <option>Estudante de Medicina</option>
              <option>Interno/Residente</option>
              <option>Médico Formado</option>
              <option>Especialista</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Instituição de Ensino</label>
          <input class="form-input" id="pf-univ" placeholder="Ex: USP, UFMG, Unicamp...">
        </div>

        <div class="form-group">
          <label class="form-label">Ano de Formatura</label>
          <input class="form-input" type="number" id="pf-form" placeholder="Ex: 2026">
        </div>

        <button class="btn-save" id="btn-salvar" onclick="salvarPerfil()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          Salvar Alterações
        </button>

        <div id="msg-pf" class="alert-custom"></div>
      </div>

      <div class="danger-zone">
        <h3 style="color: #991b1b; font-size: 1rem; font-weight: 700; margin-bottom: 0.5rem;">⚠️ Zona de Perigo</h3>
        <p style="font-size: 0.85rem; color: #b91c1c; line-height: 1.5; margin-bottom: 1.25rem;">A exclusão da conta removerá permanentemente seu histórico de simulados e anotações.</p>
        <button class="btn-danger-outline" onclick="excluirConta()">Excluir minha conta permanentemente</button>
      </div>
    </section>
  </div>
</main>

<script>
window.addEventListener('load', async()=>{
  const session = await exigirLogin(); if(!session) return;
  document.getElementById('main').style.display='block';
  
  const sb = window.supabaseClient;
  const uid = session.user.id;
  
  // Corrigindo a extração do nome do metadado ou e-mail
  const nomeMeta = session.user.user_metadata?.nome;
  const nomeEmail = session.user.email.split('@');
  const nomeDisplay = nomeMeta || nomeEmail;

  // Atualiza UI lateral
  document.getElementById('pf-av').textContent = nomeDisplay.charAt(0).toUpperCase();
  document.getElementById('pf-nome').textContent = nomeDisplay;
  document.getElementById('pf-email').textContent = session.user.email;
  
  // Preenche o input de nome
  document.getElementById('pf-nome-input').value = nomeMeta || "";
  
  // Busca dados adicionais na tabela 'perfis'
  const {data:pf} = await sb.from('perfis').select('*').eq('id',uid).single();
  if(pf){
    if(pf.idade) document.getElementById('pf-idade').value = pf.idade;
    if(pf.nivel) document.getElementById('pf-nivel').value = pf.nivel;
    if(pf.universidade) document.getElementById('pf-univ').value = pf.universidade;
    if(pf.ano_formatura) document.getElementById('pf-form').value = pf.ano_formatura;
    // Se o nome estiver na tabela mas não no meta, prioriza o input
    if(pf.nome && !nomeMeta) document.getElementById('pf-nome-input').value = pf.nome;
  }
});

async function salvarPerfil(){
  const btn = document.getElementById('btn-salvar');
  const msg = document.getElementById('msg-pf');
  
  try {
    btn.disabled = true;
    btn.textContent = "Salvando...";
    
    const sb = window.supabaseClient;
    const {data:{session}} = await sb.auth.getSession();
    const uid = session.user.id;
    const novoNome = document.getElementById('pf-nome-input').value.trim();

    // 1. Atualiza metadados do Auth (para refletir no sistema todo)
    const { error: authError } = await sb.auth.updateUser({
      data: { nome: novoNome }
    });
    if(authError) throw authError;

    // 2. Atualiza tabela de perfis
    const { error: dbError } = await sb.from('perfis').upsert({
      id: uid,
      nome: novoNome,
      idade: parseInt(document.getElementById('pf-idade').value) || null,
      nivel: document.getElementById('pf-nivel').value || null,
      universidade: document.getElementById('pf-univ').value.trim() || null,
      ano_formatura: parseInt(document.getElementById('pf-form').value) || null,
    });
    if(dbError) throw dbError;

    // Sucesso: Atualiza UI local
    document.getElementById('pf-nome').textContent = novoNome;
    document.getElementById('pf-av').textContent = novoNome.charAt(0).toUpperCase();
    
    msg.textContent = 'Perfil atualizado com sucesso!';
    msg.className = 'alert-custom show alert-success';
    
  } catch (err) {
    console.error(err);
    msg.textContent = 'Erro ao salvar: ' + err.message;
    msg.className = 'alert-custom show alert-error';
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Atualizar Perfil`;
    setTimeout(() => msg.classList.remove('show'), 3000);
  }
}

async function excluirConta(){
  if(!confirm('Atenção: Você tem certeza que deseja excluir sua conta?')) return;
  if(!confirm('Esta é a última confirmação. Todos os seus dados serão deletados.')) return;
  
  const sb = window.supabaseClient;
  const {data:{session}} = await sb.auth.getSession();
  
  await sb.from('perfis').delete().eq('id',session.user.id);
  await sb.auth.signOut();
  window.location.href = 'index.html';
}
</script>
</body>
</html>
