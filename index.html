<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedQuest Pro — Entrar</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #30363d;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --text: #e6edf3;
            --muted: #7d8590;
            --danger: #f85149;
            --success: #3fb950;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        /* Painel esquerdo decorativo */
        .hero {
            background: linear-gradient(135deg, #0f2027, #1a3a5c, #0d1117);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 4rem;
            position: relative;
            overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute;
            width: 600px; height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(59,130,246,0.12) 0%, transparent 70%);
            top: -100px; left: -100px;
        }
        .hero-logo {
            font-family: 'Sora', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 3rem;
            letter-spacing: -0.5px;
        }
        .hero-logo span { color: var(--accent); }
        .hero h1 {
            font-family: 'Sora', sans-serif;
            font-size: 2.8rem;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 1.5rem;
            color: #fff;
        }
        .hero p { color: #8b949e; font-size: 1.05rem; line-height: 1.7; max-width: 380px; }
        .hero-stats {
            display: flex;
            gap: 2rem;
            margin-top: 3rem;
        }
        .hero-stat strong {
            display: block;
            font-family: 'Sora', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent);
        }
        .hero-stat span { font-size: 0.85rem; color: var(--muted); }

        /* Painel direito — formulário */
        .auth-panel {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem 2rem;
        }
        .auth-box {
            width: 100%;
            max-width: 420px;
        }
        .tabs {
            display: flex;
            gap: 0;
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 2rem;
        }
        .tab {
            flex: 1;
            padding: 0.75rem;
            background: transparent;
            border: none;
            color: var(--muted);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab.active {
            background: var(--accent);
            color: #fff;
        }

        .form-group { margin-bottom: 1.25rem; }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--muted);
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus { border-color: var(--accent); }

        .btn-primary {
            width: 100%;
            padding: 0.9rem;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-family: 'Sora', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 0.5rem;
        }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-primary:active { transform: scale(0.98); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

        .msg {
            margin-top: 1rem;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            display: none;
        }
        .msg.erro { background: rgba(248,81,73,0.1); color: var(--danger); border: 1px solid rgba(248,81,73,0.3); display: block; }
        .msg.ok { background: rgba(63,185,80,0.1); color: var(--success); border: 1px solid rgba(63,185,80,0.3); display: block; }

        @media (max-width: 768px) {
            body { grid-template-columns: 1fr; }
            .hero { display: none; }
            .auth-panel { padding: 2rem 1.5rem; }
        }
    </style>
</head>
<body>

<div class="hero">
    <div class="hero-logo">Med<span>Quest</span> Pro</div>
    <h1>Sua residência começa aqui.</h1>
    <p>Banco de questões comentadas, simulados cronometrados e estatísticas detalhadas para você passar na prova.</p>
    <div class="hero-stats">
        <div class="hero-stat">
            <strong id="total-q">—</strong>
            <span>questões</span>
        </div>
        <div class="hero-stat">
            <strong>10+</strong>
            <span>especialidades</span>
        </div>
    </div>
</div>

<div class="auth-panel">
    <div class="auth-box">

        <div class="tabs">
            <button class="tab active" onclick="trocarAba('login')">Entrar</button>
            <button class="tab" onclick="trocarAba('cadastro')">Cadastrar</button>
        </div>

        <!-- LOGIN -->
        <div id="form-login">
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" id="login-email" placeholder="seu@email.com">
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="login-senha" placeholder="••••••••">
            </div>
            <button class="btn-primary" onclick="fazerLogin()">Entrar</button>
            <div id="msg-login" class="msg"></div>
        </div>

        <!-- CADASTRO -->
        <div id="form-cadastro" style="display:none">
            <div class="form-group">
                <label>Nome completo</label>
                <input type="text" id="cad-nome" placeholder="Dr. João Silva">
            </div>
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" id="cad-email" placeholder="seu@email.com">
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="cad-senha" placeholder="Mínimo 6 caracteres">
            </div>
            <button class="btn-primary" onclick="fazerCadastro()">Criar conta</button>
            <div id="msg-cadastro" class="msg"></div>
        </div>

    </div>
</div>

<script>
    function trocarAba(aba) {
        document.getElementById('form-login').style.display = aba === 'login' ? 'block' : 'none';
        document.getElementById('form-cadastro').style.display = aba === 'cadastro' ? 'block' : 'none';
        document.querySelectorAll('.tab').forEach((t, i) => {
            t.classList.toggle('active', (aba === 'login' && i === 0) || (aba === 'cadastro' && i === 1));
        });
    }

    function mostrarMsg(id, texto, tipo) {
        const el = document.getElementById(id);
        el.textContent = texto;
        el.className = 'msg ' + tipo;
    }

    async function fazerLogin() {
        const sb = window.supabaseClient;
        const email = document.getElementById('login-email').value.trim();
        const senha = document.getElementById('login-senha').value;
        if (!email || !senha) return mostrarMsg('msg-login', 'Preencha todos os campos.', 'erro');
        const btn = document.querySelector('#form-login .btn-primary');
        btn.disabled = true; btn.textContent = 'Entrando...';
        const { error } = await sb.auth.signInWithPassword({ email, password: senha });
        if (error) {
            mostrarMsg('msg-login', 'E-mail ou senha incorretos.', 'erro');
            btn.disabled = false; btn.textContent = 'Entrar';
        } else {
            window.location.href = 'dashboard.html';
        }
    }

    async function fazerCadastro() {
        const sb = window.supabaseClient;
        const nome = document.getElementById('cad-nome').value.trim();
        const email = document.getElementById('cad-email').value.trim();
        const senha = document.getElementById('cad-senha').value;
        if (!nome || !email || !senha) return mostrarMsg('msg-cadastro', 'Preencha todos os campos.', 'erro');
        if (senha.length < 6) return mostrarMsg('msg-cadastro', 'A senha precisa ter ao menos 6 caracteres.', 'erro');
        const btn = document.querySelector('#form-cadastro .btn-primary');
        btn.disabled = true; btn.textContent = 'Criando conta...';
        const { error } = await sb.auth.signUp({ email, password: senha, options: { data: { nome } } });
        if (error) {
            mostrarMsg('msg-cadastro', error.message, 'erro');
            btn.disabled = false; btn.textContent = 'Criar conta';
        } else {
            mostrarMsg('msg-cadastro', 'Conta criada! Verifique seu e-mail para confirmar.', 'ok');
            btn.disabled = false; btn.textContent = 'Criar conta';
        }
    }

    // Redireciona se já logado
    window.addEventListener('load', async () => {
        const sb = window.supabaseClient;
        if (!sb) return;
        const { data: { session } } = await sb.auth.getSession();
        if (session) window.location.href = 'dashboard.html';

        // Total de questões no hero
        const { count } = await sb.from('questoes').select('*', { count: 'exact', head: true });
        if (count) document.getElementById('total-q').textContent = count.toLocaleString('pt-BR') + '+';
    });

    // Enter para logar
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const loginVisivel = document.getElementById('form-login').style.display !== 'none';
            loginVisivel ? fazerLogin() : fazerCadastro();
        }
    });
</script>
</body>
</html>
