<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Especialidades — MedQuest Pro</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

<style>
:root {
  --bg-body: #f8fafc;
  --surface: #ffffff;
  --primary: #2563eb;
  --text-main: #1e293b;
  --text-muted: #64748b;
  --border: #e2e8f0;
  --radius-lg: 18px;
}

body {
  background-color: var(--bg-body);
  font-family: 'Inter', sans-serif;
}

.main-content {
  max-width: 900px;
  margin: 0 auto;
  padding: 2.5rem 1.5rem;
}

/* ===== GRID ===== */
.materias-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 1.2rem;
}

/* ===== CARD ===== */
.materia-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  height: 150px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 0.6rem;
  cursor: pointer;
  transition: all 0.25s ease;
  position: relative;
  overflow: hidden;
}

/* brilho sutil */
.materia-card::after {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at top, rgba(255,255,255,0.4), transparent);
  opacity: 0;
  transition: 0.3s;
}

.materia-card:hover::after {
  opacity: 1;
}

/* hover */
.materia-card:hover {
  transform: translateY(-6px) scale(1.02);
  border-color: var(--primary);
  box-shadow: 0 12px 25px rgba(0,0,0,0.08);
}

/* clique (mobile feel) */
.materia-card:active {
  transform: scale(0.96);
}

/* emoji */
.materia-emoji {
  font-size: 2.2rem;
}

/* nome */
.materia-nome {
  font-weight: 700;
  font-size: 0.95rem;
  color: var(--text-main);
}
</style>
</head>

<body>

<script src="js/auth.js"></script>
<script src="js/sidebar.js"></script>

<main class="main-content" id="main" style="display:none">

  <div class="page-header" style="margin-bottom: 2.5rem;">
    <h1 style="font-size: 2rem; font-weight: 800;">Especialidades</h1>
    <p style="color: var(--text-muted); margin-top: 0.4rem;">
      Acesse rapidamente suas áreas de estudo.
    </p>
  </div>

  <div class="materias-grid">

    <div class="materia-card" onclick="ir('cardiologia.html')">
      <div class="materia-emoji">❤️</div>
      <div class="materia-nome">Cardiologia</div>
    </div>

    <div class="materia-card" onclick="ir('endocrinologia.html')">
      <div class="materia-emoji">🧪</div>
      <div class="materia-nome">Endocrinologia</div>
    </div>

    <div class="materia-card" onclick="ir('pediatria.html')">
      <div class="materia-emoji">👶</div>
      <div class="materia-nome">Pediatria</div>
    </div>

  </div>

</main>

<script>
window.addEventListener('load', async () => {
  const session = await exigirLogin();
  if(!session) return;

  document.getElementById('main').style.display = 'block';
});

function ir(pagina){
  window.location.href = pagina;
}
</script>

</body>
</html>
