<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Especialidades — MedQuest Pro</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

<style>
:root {
  --bg-body: #f8fafc;
  --surface: #ffffff;
  --primary: #2563eb;
  --text-main: #1e293b;
  --text-muted: #64748b;
  --border: #e2e8f0;
  --radius-lg: 16px;
}

body {
  background-color: var(--bg-body);
  font-family: 'Inter', sans-serif;
}

.main-content {
  max-width: 900px;
  margin: 0 auto;
  padding: 2.5rem 1.5rem;
}

/* ===== NOVOS BLOCOS ===== */
.materias-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 1rem;
}

.materia-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  height: 140px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 0.5rem;
  cursor: pointer;
  transition: 0.25s;
}

.materia-card:hover {
  transform: translateY(-4px);
  border-color: var(--primary);
}

.materia-emoji {
  font-size: 2rem;
}

.materia-nome {
  font-weight: 700;
}
</style>
</head>

<body>

<script src="js/auth.js"></script>
<script src="js/sidebar.js"></script>

<main class="main-content" id="main" style="display:none">

  <div class="page-header" style="margin-bottom: 2.5rem;">
    <h1 style="font-size: 2rem; font-weight: 800;">Especialidades</h1>
    <p style="color: var(--text-muted);">Aperfeiçoe seu conhecimento focando em áreas específicas.</p>
  </div>

  <!-- 🔥 NOVOS BLOCOS -->
  <div class="materias-grid">

    <div class="materia-card" onclick="ir('cardiologia.html')">
      <div class="materia-emoji">❤️</div>
      <div class="materia-nome">Cardiologia</div>
    </div>

    <div class="materia-card" onclick="ir('endocrinologia.html')">
      <div class="materia-emoji">🧪</div>
      <div class="materia-nome">Endocrinologia</div>
    </div>

    <div class="materia-card" onclick="ir('pediatria.html')">
      <div class="materia-emoji">👶</div>
      <div class="materia-nome">Pediatria</div>
    </div>

  </div>

</main>

<script>
window.addEventListener('load', async () => {
  const session = await exigirLogin();
  if(!session) return;

  document.getElementById('main').style.display = 'block';
});

function ir(pagina){
  window.location.href = pagina;
}
</script>

</body>
</html>
