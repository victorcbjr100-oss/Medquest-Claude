<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Temas — MedQuest Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .temas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1.25rem}
    .tema-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
    .tema-header{padding:1.25rem 1.5rem;display:flex;align-items:center;gap:.9rem;cursor:pointer;transition:background .15s;border-bottom:1px solid transparent}
    .tema-header:hover{background:var(--bg)}
    .tema-header.open{border-bottom-color:var(--border)}
    .tema-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
    .tema-info{flex:1}
    .tema-name{font-weight:700;font-size:.95rem;color:var(--text)}
    .tema-count{font-size:.78rem;color:var(--text-muted);margin-top:2px}
    .tema-progress-wrap{margin-top:.4rem}
    .tema-pct{font-size:.72rem;color:var(--text-secondary);margin-bottom:3px}
    .tema-arrow{font-size:.8rem;color:var(--text-muted);transition:transform .2s;flex-shrink:0}
    .tema-arrow.open{transform:rotate(90deg)}
    .subtemas{display:none;padding:.5rem .5rem}
    .subtemas.open{display:block}
    .subtema-btn{display:flex;justify-content:space-between;align-items:center;width:100%;padding:.65rem 1rem;margin-bottom:2px;background:transparent;border:none;border-radius:var(--radius-sm);cursor:pointer;text-align:left;font-family:'Inter',sans-serif;font-size:.85rem;color:var(--text);transition:background .12s}
    .subtema-btn:hover{background:var(--bg)}
    .subtema-nome{font-weight:500}
    .subtema-meta{display:flex;align-items:center;gap:.5rem}
    .subtema-q{font-size:.75rem;color:var(--text-muted)}
    .subtema-pct{font-size:.75rem;font-weight:600;padding:.15rem .5rem;border-radius:99px}
    .loading-msg{text-align:center;padding:3rem;color:var(--text-muted)}
  </style>
</head>
<body>
<script src="js/auth.js"></script>
<script src="js/sidebar.js"></script>

<main class="main-content" id="main" style="display:none">
  <div class="page-header">
    <h1>Temas</h1>
    <p>Selecione uma especialidade para praticar questões</p>
  </div>

  <div class="filter-tabs" id="filtros">
    <button class="filter-tab active" data-filtro="">Todos</button>
    <button class="filter-tab" data-filtro="facil">Fácil</button>
    <button class="filter-tab" data-filtro="media">Média</button>
    <button class="filter-tab" data-filtro="dificil">Difícil</button>
  </div>

  <div id="loading" class="loading-msg">Carregando especialidades...</div>
  <div class="temas-grid" id="temas-grid" style="display:none"></div>
</main>

<script>
/* Paleta de cores por tema */
const CORES = [
  {bg:'#eff6ff',icon:'#2563eb',emoji:'❤️'},
  {bg:'#ecfdf5',icon:'#059669',emoji:'🧠'},
  {bg:'#f5f3ff',icon:'#7c3aed',emoji:'🫁'},
  {bg:'#fff7ed',icon:'#ea580c',emoji:'🦴'},
  {bg:'#fef2f2',icon:'#dc2626',emoji:'🩺'},
  {bg:'#f0fdf4',icon:'#16a34a',emoji:'💊'},
  {bg:'#fefce8',icon:'#ca8a04',emoji:'🔬'},
  {bg:'#fff1f2',icon:'#e11d48',emoji:'👶'},
  {bg:'#f0f9ff',icon:'#0284c7',emoji:'🧬'},
  {bg:'#fdf4ff',icon:'#9333ea',emoji:'🏥'},
];

let temasData = {};
let filtroAtivo = '';
let statsUsuario = {};

window.addEventListener('load', async () => {
  const session = await exigirLogin(); if(!session) return;
  document.getElementById('main').style.display='block';
  const sb = window.supabaseClient, uid = session.user.id;

  // Carrega questões agrupadas por tema/subtema
  const {data:questoes} = await sb.from('questoes').select('id,tema,subtema,dificuldade');
  const {data:resps} = await sb.from('respostas').select('questao_id,acertou,questoes(tema,subtema)').eq('user_id',uid);

  // Agrupa stats por questão
  const statsQ = {};
  if(resps) resps.forEach(r=>{ statsQ[r.questao_id]={acertou:r.acertou}; });

  // Monta estrutura: tema → subtema → {total, acertos}
  const estrutura = {};
  if(questoes) questoes.forEach(q=>{
    const t = q.tema||'Outros', s = q.subtema||'Geral';
    if(!estrutura[t]) estrutura[t]={subtemas:{},total:0,acertos:0};
    if(!estrutura[t].subtemas[s]) estrutura[t].subtemas[s]={total:0,acertos:0,ids:[]};
    estrutura[t].subtemas[s].total++;
    estrutura[t].total++;
    estrutura[t].subtemas[s].ids.push(q.id);
    if(statsQ[q.id]?.acertou){ estrutura[t].subtemas[s].acertos++; estrutura[t].acertos++; }
  });
  temasData = estrutura;

  renderTemas(estrutura);
  document.getElementById('loading').style.display='none';
  document.getElementById('temas-grid').style.display='grid';

  // Filtros
  document.getElementById('filtros').addEventListener('click', e=>{
    const btn = e.target.closest('.filter-tab'); if(!btn) return;
    document.querySelectorAll('.filter-tab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    filtroAtivo = btn.dataset.filtro;
    renderTemas(estrutura);
  });
});

function renderTemas(estrutura) {
  const grid = document.getElementById('temas-grid');
  grid.innerHTML = '';
  Object.entries(estrutura).forEach(([tema, dados], idx)=>{
    const cor = CORES[idx % CORES.length];
    const pct = dados.total>0 ? Math.round((dados.acertos/dados.total)*100) : 0;
    const card = document.createElement('div');
    card.className = 'tema-card';

    const subtemasBtns = Object.entries(dados.subtemas).map(([sub, sd])=>{
      const sp = sd.total>0 ? Math.round((sd.acertos/sd.total)*100) : null;
      const corPct = sp===null?'#9ca3af':sp>=70?'#059669':sp>=50?'#2563eb':'#dc2626';
      const bgPct = sp===null?'#f3f4f6':sp>=70?'#ecfdf5':sp>=50?'#eff6ff':'#fef2f2';
      const label = sp===null?'—':sp+'%';
      return `<button class="subtema-btn" onclick="irParaQuestoes('${encodeURIComponent(tema)}','${encodeURIComponent(sub)}')">
        <span class="subtema-nome">${sub}</span>
        <span class="subtema-meta">
          <span class="subtema-q">${sd.total} questões</span>
          <span class="subtema-pct" style="color:${corPct};background:${bgPct}">${label}</span>
        </span>
      </button>`;
    }).join('');

    card.innerHTML = `
      <div class="tema-header" onclick="toggleTema(this)">
        <div class="tema-icon" style="background:${cor.bg}">${cor.emoji}</div>
        <div class="tema-info">
          <div class="tema-name">${tema}</div>
          <div class="tema-count">${dados.total} questões · ${Object.keys(dados.subtemas).length} subtemas</div>
          <div class="tema-progress-wrap">
            <div class="tema-pct">${pct}% concluído</div>
            <div class="progress-bar" style="height:4px"><div class="progress-fill ${pct>=70?'fill-green':pct>=50?'fill-blue':'fill-red'}" style="width:${pct}%"></div></div>
          </div>
        </div>
        <span class="tema-arrow">▶</span>
      </div>
      <div class="subtemas">
        <button class="subtema-btn" style="font-weight:700;color:var(--accent)" onclick="irParaQuestoes('${encodeURIComponent(tema)}','')">
          <span class="subtema-nome">📚 Todas as questões de ${tema}</span>
          <span class="subtema-q">${dados.total}</span>
        </button>
        ${subtemasBtns}
      </div>`;
    grid.appendChild(card);
  });
}

function toggleTema(header) {
  const arrow = header.querySelector('.tema-arrow');
  const subtemas = header.nextElementSibling;
  const open = subtemas.classList.toggle('open');
  header.classList.toggle('open', open);
  arrow.classList.toggle('open', open);
}

function irParaQuestoes(tema, subtema) {
  let url = `questoes.html?tema=${tema}`;
  if(subtema) url += `&subtema=${subtema}`;
  if(filtroAtivo) url += `&dificuldade=${filtroAtivo}`;
  window.location.href = url;
}
</script>
</body>
</html>
