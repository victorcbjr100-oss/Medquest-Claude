<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Especialidades — MedQuest Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    :root{--bg-body:#f8fafc;--surface:#fff;--primary:#2563eb;--text-main:#1e293b;--text-muted:#64748b;--border:#e2e8f0;--radius-lg:16px}
    body{background:var(--bg-body);font-family:'Inter',sans-serif}
    .main-content{max-width:900px;margin:0 auto;padding:2.5rem 1.5rem}
    .materias-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:1rem}
    .materia-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);height:140px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:.5rem;cursor:pointer;transition:.25s;text-align:center;padding:.5rem}
    .materia-card:hover{transform:translateY(-4px);border-color:var(--primary);box-shadow:0 8px 20px rgba(0,0,0,.08)}
    .materia-emoji{font-size:2rem}
    .materia-nome{font-weight:700;font-size:.88rem;color:var(--text-main);line-height:1.2}
    .materia-count{font-size:.7rem;color:var(--text-muted);margin-top:2px}
  </style>
</head>
<body>
<script src="js/auth.js"></script>
<script src="js/sidebar.js"></script>

<main class="main-content" id="main" style="display:none">
  <div class="page-header" style="margin-bottom:2.5rem">
    <h1 style="font-size:2rem;font-weight:800;color:var(--text-main)">Especialidades</h1>
    <p style="color:var(--text-muted)">Aperfeiçoe seu conhecimento focando em áreas específicas.</p>
  </div>
  <div class="materias-grid" id="grid"></div>
</main>

<script>
const ESPECIALIDADES=[
  {nome:'Cardiologia',            emoji:'❤️',  page:'cardiologia.html'},
  {nome:'Clínica Médica',         emoji:'🩺',  page:'clinica-medica.html'},
  {nome:'Pneumologia',            emoji:'🫁',  page:'pneumologia.html'},
  {nome:'Gastroenterologia',      emoji:'🫃',  page:'gastroenterologia.html'},
  {nome:'Nefrologia',             emoji:'🫘',  page:'nefrologia.html'},
  {nome:'Neurologia',             emoji:'🧠',  page:'neurologia.html'},
  {nome:'Psiquiatria',            emoji:'🧩',  page:'psiquiatria.html'},
  {nome:'Endocrinologia',         emoji:'🧪',  page:'endocrinologia.html'},
  {nome:'Reumatologia',           emoji:'🦴',  page:'reumatologia.html'},
  {nome:'Hematologia',            emoji:'🩸',  page:'hematologia.html'},
  {nome:'Infectologia',           emoji:'🦠',  page:'infectologia.html'},
  {nome:'Pediatria',              emoji:'👶',  page:'pediatria.html'},
  {nome:'Ginecologia e Obstetrícia', emoji:'🤰', page:'gineco.html'},
  {nome:'Cirurgia Geral',         emoji:'🔪',  page:'cirurgia.html'},
  {nome:'Ortopedia',              emoji:'🦷',  page:'ortopedia.html'},
  {nome:'Dermatologia',           emoji:'🩹',  page:'dermatologia.html'},
  {nome:'Oftalmologia',           emoji:'👁️', page:'oftalmologia.html'},
  {nome:'Otorrinolaringologia',   emoji:'👂',  page:'otorrino.html'},
  {nome:'Urologia',               emoji:'🫧',  page:'urologia.html'},
  {nome:'Medicina de Família',    emoji:'🏘️', page:'medicina-familia.html'},
];

window.addEventListener('load', async()=>{
  const session=await exigirLogin(); if(!session) return;
  document.getElementById('main').style.display='block';
  const sb=window.supabaseClient;

  // Conta questões por tema
  const {data:qs}=await sb.from('questoes').select('tema');
  const cont={};
  (qs||[]).forEach(q=>{ const t=q.tema||''; cont[t]=(cont[t]||0)+1; });

  const grid=document.getElementById('grid');
  ESPECIALIDADES.forEach(e=>{
    const n=cont[e.nome]||0;
    const card=document.createElement('div');
    card.className='materia-card';
    card.innerHTML=`<div class="materia-emoji">${e.emoji}</div>
      <div class="materia-nome">${e.nome}</div>
      ${n?`<div class="materia-count">${n} questões</div>`:''}`;
    card.onclick=()=>window.location.href=e.page;
    grid.appendChild(card);
  });
});
</script>
</body>
</html>
