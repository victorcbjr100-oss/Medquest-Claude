<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Psiquiatria — MedQuest Pro</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
:root{--bg-body:#f8fafc;--surface:#fff;--primary:#7c3aed;--text-main:#1e293b;--text-muted:#64748b;--border:#e2e8f0;--radius-lg:18px}
body{background:var(--bg-body);font-family:'Inter',sans-serif}
.main-content{max-width:900px;margin:0 auto;padding:2.5rem 1.5rem}
.subtemas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:1.2rem}
.subtema-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);height:150px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:.6rem;cursor:pointer;transition:all .25s ease;position:relative;overflow:hidden;text-align:center;padding:.75rem}
.subtema-card::after{content:"";position:absolute;inset:0;background:radial-gradient(circle at top,rgba(255,255,255,.4),transparent);opacity:0;transition:.3s}
.subtema-card:hover::after{opacity:1}
.subtema-card:hover{transform:translateY(-6px) scale(1.02);border-color:var(--primary);box-shadow:0 12px 25px rgba(0,0,0,.08)}
.subtema-card:active{transform:scale(.96)}
.subtema-emoji{font-size:2.2rem}
.subtema-nome{font-weight:700;font-size:.88rem;color:var(--text-main);line-height:1.3}
.subtema-count{font-size:.7rem;color:var(--text-muted);margin-top:2px}
</style>
</head>
<body>
<script src="js/auth.js"></script>
<script src="js/sidebar.js"></script>
<main class="main-content" id="main" style="display:none">
  <div class="page-header" style="margin-bottom:2.5rem">
    <h1 style="font-size:2rem;font-weight:800">🧩 Psiquiatria</h1>
    <p style="color:var(--text-muted);margin-top:.4rem">Escolha um subtema para treinar questões</p>
  </div>
  <div class="subtemas-grid" id="grid"></div>
</main>
<script>
const SUBTEMAS=[{"nome": "Transtorno depressivo maior", "emoji": "😔"}, {"nome": "Transtorno bipolar", "emoji": "🔄"}, {"nome": "Transtornos de ansiedade", "emoji": "😰"}, {"nome": "Transtorno de pânico", "emoji": "😱"}, {"nome": "Esquizofrenia", "emoji": "🌀"}, {"nome": "Transtornos psicóticos", "emoji": "🔮"}, {"nome": "TOC", "emoji": "🔁"}, {"nome": "TEPT", "emoji": "💔"}, {"nome": "Transtornos alimentares", "emoji": "🍽️"}, {"nome": "Dependência de substâncias", "emoji": "⚠️"}, {"nome": "Transtornos de personalidade", "emoji": "🎭"}];
window.addEventListener('load', async()=>{
  const session=await exigirLogin(); if(!session) return;
  document.getElementById('main').style.display='block';
  const sb=window.supabaseClient;
  const {data:qs}=await sb.from('questoes').select('subtema').eq('tema','Psiquiatria');
  const cont={};
  (qs||[]).forEach(q=>{ const s=q.subtema||''; cont[s]=(cont[s]||0)+1; });
  const grid=document.getElementById('grid');
  SUBTEMAS.forEach(s=>{
    const n=cont[s.nome]||0;
    const card=document.createElement('div');
    card.className='subtema-card';
    card.innerHTML=`<div class="subtema-emoji">${s.emoji}</div>
      <div class="subtema-nome">${s.nome}</div>
      ${n?`<div class="subtema-count">${n} questões</div>`:''}`;
    card.onclick=()=>window.location.href=`questoes.html?tema=${encodeURIComponent('Psiquiatria')}&subtema=${encodeURIComponent(s.nome)}`;
    grid.appendChild(card);
  });
});
</script>
</body>
</html>
