<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulado — MedQuest Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{--bg:#0d1117;--surface:#161b22;--border:#21262d;--accent:#3b82f6;--text:#e6edf3;--muted:#7d8590;--success:#3fb950;--danger:#f85149;--warning:#d29922}
        body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);margin-left:16rem}
        @media(max-width:768px){body{margin-left:0}}
        .main{padding:2.5rem;max-width:900px}
        h1{font-family:'Sora',sans-serif;font-size:1.8rem;font-weight:700;margin-bottom:.3rem}

        /* Tela de configuração */
        #tela-config{}
        .config-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:2rem;max-width:500px;margin-top:1.5rem}
        .config-card h3{font-family:'Sora',sans-serif;font-size:1rem;margin-bottom:1.25rem}
        .form-group{margin-bottom:1.25rem}
        .form-group label{display:block;font-size:.85rem;color:var(--muted);margin-bottom:.4rem}
        .form-group select,.form-group input{width:100%;padding:.7rem .9rem;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none}
        .form-group select:focus,.form-group input:focus{border-color:var(--accent)}
        .btn-iniciar{padding:.9rem 2rem;background:var(--accent);border:none;border-radius:10px;color:#fff;font-family:'Sora',sans-serif;font-size:1rem;font-weight:600;cursor:pointer;transition:background .2s}
        .btn-iniciar:hover{background:#2563eb}

        /* Tela do simulado */
        #tela-simulado{display:none}
        .simulado-header{display:flex;justify-content:space-between;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1rem 1.5rem;margin-bottom:2rem}
        .timer{font-family:'Sora',sans-serif;font-size:1.5rem;font-weight:700;color:var(--accent)}
        .timer.urgente{color:var(--danger)}
        .prog-texto{font-size:.9rem;color:var(--muted)}

        .questao-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.75rem;margin-bottom:1.5rem}
        .questao-num{font-size:.8rem;color:var(--muted);margin-bottom:.75rem;font-weight:500}
        .questao-pergunta{font-size:1rem;line-height:1.7;margin-bottom:1.25rem;font-weight:500}
        .opcao{display:flex;align-items:flex-start;gap:.75rem;padding:.7rem .9rem;border-radius:8px;border:1px solid var(--border);margin-bottom:.5rem;cursor:pointer;transition:all .15s}
        .opcao:hover{border-color:#444}
        .opcao.selecionada{border-color:var(--accent);background:rgba(59,130,246,.1)}
        .opcao.correta{border-color:var(--success);background:rgba(63,185,80,.08)}
        .opcao.errada{border-color:var(--danger);background:rgba(248,81,73,.08)}
        .opcao-letra{width:24px;height:24px;border-radius:50%;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:600;flex-shrink:0;margin-top:1px}
        .opcao.selecionada .opcao-letra{background:var(--accent);border-color:var(--accent);color:#fff}
        .opcao.correta .opcao-letra{background:var(--success);border-color:var(--success);color:#000}
        .opcao.errada .opcao-letra{background:var(--danger);border-color:var(--danger);color:#fff}

        .btn-finalizar{padding:.9rem 2rem;background:var(--success);border:none;border-radius:10px;color:#000;font-family:'Sora',sans-serif;font-size:1rem;font-weight:600;cursor:pointer;margin-top:1rem}

        /* Resultado */
        #tela-resultado{display:none}
        .resultado-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:2.5rem;text-align:center;margin-top:1.5rem;max-width:500px}
        .resultado-nota{font-family:'Sora',sans-serif;font-size:4rem;font-weight:700;color:var(--accent);margin-bottom:.5rem}
        .resultado-sub{color:var(--muted);margin-bottom:2rem}
        .btn-novo{padding:.9rem 2rem;background:var(--accent);border:none;border-radius:10px;color:#fff;font-family:'Sora',sans-serif;font-size:1rem;font-weight:600;cursor:pointer}
    </style>
</head>
<body>
<script src="sidebar.js"></script>
<script src="js/auth.js"></script>
<main class="main">

    <!-- Config -->
    <div id="tela-config">
        <h1>Simulado</h1>
        <p style="color:var(--muted);margin-top:.3rem">Configure e inicie seu simulado cronometrado.</p>
        <div class="config-card">
            <h3>Configurações</h3>
            <div class="form-group">
                <label>Quantidade de questões</label>
                <input type="number" id="qtd" value="10" min="5" max="100">
            </div>
            <div class="form-group">
                <label>Tema (opcional)</label>
                <select id="tema-select"><option value="">Todos os temas</option></select>
            </div>
            <div class="form-group">
                <label>Tempo por questão (minutos)</label>
                <input type="number" id="tempo-por-q" value="2" min="1" max="10">
            </div>
            <button class="btn-iniciar" onclick="iniciarSimulado()">Iniciar simulado</button>
        </div>
    </div>

    <!-- Simulado -->
    <div id="tela-simulado">
        <div class="simulado-header">
            <div>
                <div style="font-size:.8rem;color:var(--muted);margin-bottom:.2rem">Tempo restante</div>
                <div class="timer" id="timer">00:00</div>
            </div>
            <div class="prog-texto" id="prog-texto"></div>
        </div>
        <div id="lista-simulado"></div>
        <button class="btn-finalizar" onclick="finalizarSimulado()">Finalizar simulado</button>
    </div>

    <!-- Resultado -->
    <div id="tela-resultado">
        <h1>Resultado</h1>
        <div class="resultado-card">
            <div class="resultado-nota" id="res-nota">—</div>
            <div class="resultado-sub" id="res-sub"></div>
            <button class="btn-novo" onclick="location.reload()">Novo simulado</button>
        </div>
    </div>

</main>
<script>
let sessaoAtual = null;
let questoesSimulado = [];
let respostasSimulado = {};
let timerInterval = null;
let tempoTotal = 0;
let tempoRestante = 0;

window.addEventListener('load', async () => {
    const session = await exigirLogin();
    if (!session) return;
    sessaoAtual = session;

    const sb = window.supabaseClient;
    const { data: temas } = await sb.from('questoes').select('tema');
    if (temas) {
        const temasUnicos = [...new Set(temas.map(t => t.tema).filter(Boolean))].sort();
        const sel = document.getElementById('tema-select');
        temasUnicos.forEach(t => { const o = document.createElement('option'); o.value = t; o.textContent = t; sel.appendChild(o); });
    }
});

async function iniciarSimulado() {
    const sb = window.supabaseClient;
    const qtd = parseInt(document.getElementById('qtd').value) || 10;
    const tema = document.getElementById('tema-select').value;
    const tempoQ = parseInt(document.getElementById('tempo-por-q').value) || 2;

    let query = sb.from('questoes').select('*');
    if (tema) query = query.eq('tema', tema);
    const { data: questoes } = await query;
    if (!questoes || questoes.length === 0) { alert('Nenhuma questão encontrada.'); return; }

    // Embaralha e pega a quantidade desejada
    const embaralhadas = questoes.sort(() => Math.random() - 0.5).slice(0, Math.min(qtd, questoes.length));
    questoesSimulado = embaralhadas;

    document.getElementById('tela-config').style.display = 'none';
    document.getElementById('tela-simulado').style.display = 'block';

    renderSimulado();

    tempoTotal = embaralhadas.length * tempoQ * 60;
    tempoRestante = tempoTotal;
    atualizarTimer();
    timerInterval = setInterval(() => {
        tempoRestante--;
        atualizarTimer();
        if (tempoRestante <= 0) finalizarSimulado();
    }, 1000);
}

function atualizarTimer() {
    const min = Math.floor(tempoRestante / 60).toString().padStart(2, '0');
    const seg = (tempoRestante % 60).toString().padStart(2, '0');
    const el = document.getElementById('timer');
    el.textContent = `${min}:${seg}`;
    el.className = 'timer' + (tempoRestante < 60 ? ' urgente' : '');
}

function renderSimulado() {
    const letras = ['A','B','C','D','E'];
    document.getElementById('prog-texto').textContent = `${questoesSimulado.length} questões`;
    document.getElementById('lista-simulado').innerHTML = questoesSimulado.map((q, idx) => {
        let opcoes = q.opcoes;
        if (typeof opcoes === 'string') { try { opcoes = JSON.parse(opcoes); } catch { opcoes = opcoes.split(',').map(s => s.trim()); } }
        const opcoesHTML = opcoes.map((op, i) => `
            <div class="opcao" id="sim-op-${idx}-${i}" onclick="selecionarOpcao(${idx}, ${i})">
                <div class="opcao-letra">${letras[i]}</div><div>${op}</div>
            </div>`).join('');
        return `<div class="questao-card"><div class="questao-num">Questão ${idx+1} de ${questoesSimulado.length}</div><div class="questao-pergunta">${q.pergunta}</div>${opcoesHTML}</div>`;
    }).join('');
}

function selecionarOpcao(qIdx, opIdx) {
    const q = questoesSimulado[qIdx];
    let opcoes = q.opcoes;
    if (typeof opcoes === 'string') { try { opcoes = JSON.parse(opcoes); } catch { opcoes = opcoes.split(',').map(s => s.trim()); } }
    // Remove seleção anterior
    opcoes.forEach((_, i) => {
        const el = document.getElementById(`sim-op-${qIdx}-${i}`);
        if (el) { el.classList.remove('selecionada'); el.querySelector('.opcao-letra').style.cssText = ''; }
    });
    const el = document.getElementById(`sim-op-${qIdx}-${opIdx}`);
    if (el) el.classList.add('selecionada');
    respostasSimulado[qIdx] = opIdx;
}

async function finalizarSimulado() {
    clearInterval(timerInterval);
    const sb = window.supabaseClient;
    const uid = sessaoAtual.user.id;
    let acertos = 0;

    // Corrige e salva
    for (let idx = 0; idx < questoesSimulado.length; idx++) {
        const q = questoesSimulado[idx];
        const escolhida = respostasSimulado[idx];
        const respondeu = escolhida !== undefined;
        const acertou = respondeu && escolhida === q.resposta;
        if (acertou) acertos++;

        // Mostra gabarito visual
        let opcoes = q.opcoes;
        if (typeof opcoes === 'string') { try { opcoes = JSON.parse(opcoes); } catch { opcoes = opcoes.split(',').map(s => s.trim()); } }
        opcoes.forEach((_, i) => {
            const el = document.getElementById(`sim-op-${idx}-${i}`);
            if (!el) return;
            el.style.pointerEvents = 'none';
            el.classList.remove('selecionada');
            if (i === q.resposta) el.classList.add('correta');
            else if (i === escolhida && !acertou) el.classList.add('errada');
        });

        if (respondeu) {
            await sb.from('respostas').insert({ user_id: uid, questao_id: q.id, opcao_escolhida: escolhida, acertou, modo: 'simulado' });
        }
    }

    // Mostra resultado
    setTimeout(() => {
        document.getElementById('tela-simulado').style.display = 'none';
        document.getElementById('tela-resultado').style.display = 'block';
        const pct = Math.round((acertos / questoesSimulado.length) * 100);
        document.getElementById('res-nota').textContent = pct + '%';
        document.getElementById('res-sub').textContent = `Você acertou ${acertos} de ${questoesSimulado.length} questões.`;
    }, 1500);
}
</script>
</body>
</html>
