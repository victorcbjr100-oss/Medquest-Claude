<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Simulados — MedQuest Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --bg-body: #f8fafc;
      --surface: #ffffff;
      --text-main: #1e293b;
      --text-secondary: #64748b;
      --border: #e2e8f0;
      --radius-lg: 16px;
      --radius-md: 12px;
      --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
      --green: #10b981;
      --red: #ef4444;
      --yellow: #f59e0b;
    }

    body { background-color: var(--bg-body); font-family: 'Inter', sans-serif; color: var(--text-main); margin: 0; }
    .main-content { max-width: 900px; margin: 0 auto; padding: 2.5rem 1.5rem; }

    /* Estilo do Card de Configuração */
    .config-container { max-width: 550px; margin: 0 auto; }
    .config-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 2rem; box-shadow: var(--shadow); }

    /* Header flutuante do Simulado */
    .sim-header {
      position: sticky;
      top: 1rem;
      z-index: 100;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 1rem 1.5rem;
      margin-bottom: 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
    }

    .timer-display { font-size: 2rem; font-weight: 800; color: var(--primary); font-variant-numeric: tabular-nums; letter-spacing: -1px; }
    .timer-display.urgente { color: var(--red); animation: pulse 1s infinite; }

    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

    /* Progresso em Dots */
    .sim-progresso { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; max-width: 200px; }
    .prog-dot { 
      width: 12px; height: 12px; border-radius: 4px; background: #e2e8f0; 
      cursor: pointer; transition: all 0.2s; border: 1px solid transparent;
    }
    .prog-dot.respondida { background: var(--primary); border-color: var(--primary); }
    .prog-dot.selecionada { background: #fff; border: 2px solid var(--primary); box-shadow: 0 0 0 2px rgba(37,99,235,0.2); }

    /* Lista de Questões */
    .sim-questao-card { 
      background: var(--surface); border: 1px solid var(--border); 
      border-radius: var(--radius-lg); padding: 2rem; margin-bottom: 1.5rem;
      transition: border-color 0.2s;
    }
    .sim-questao-card:hover { border-color: #cbd5e1; }

    /* Resultado Final */
    .resultado-hero {
      text-align: center; padding: 3rem 2rem; background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--radius-lg);
      max-width: 500px; margin: 2rem auto; box-shadow: var(--shadow);
    }
    .resultado-pct { font-size: 5rem; font-weight: 900; line-height: 1; margin: 1rem 0; }
    .resultado-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin: 2rem 0; }
    .resultado-stat { background: #f8fafc; border-radius: var(--radius-md); padding: 1.25rem; border: 1px solid var(--border); }
    .resultado-stat strong { display: block; font-size: 1.75rem; font-weight: 800; margin-bottom: 4px; }
    .resultado-stat span { font-size: 0.8rem; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; }

    /* Botões */
    .btn-full { width: 100%; padding: 0.85rem; font-weight: 700; font-size: 1rem; border-radius: var(--radius-md); cursor: pointer; border: none; transition: all 0.2s; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); }

    .opcao-item {
      display: flex; align-items: center; gap: 1rem; padding: 1rem;
      border: 1px solid var(--border); border-radius: var(--radius-md);
      margin-bottom: 0.75rem; cursor: pointer; transition: all 0.2s;
    }
    .opcao-item:hover { background: #f1f5f9; border-color: #cbd5e1; }
    .opcao-item.selecionada { border-color: var(--primary); background: #eff6ff; box-shadow: 0 0 0 1px var(--primary); }
    
    .opcao-letra {
      width: 32px; height: 32px; border-radius: 8px; background: #f1f5f9;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.85rem; color: var(--text-secondary); flex-shrink: 0;
    }
    .opcao-item.selecionada .opcao-letra { background: var(--primary); color: #fff; }

    .correta { background: #dcfce7 !important; border-color: var(--green) !important; }
    .errada { background: #fee2e2 !important; border-color: var(--red) !important; }
  </style>
</head>
<body>
<script src="js/auth.js"></script>
<script src="js/sidebar.js"></script>

<main class="main-content" id="main" style="display:none">

  <div id="tela-config" class="config-container">
    <div class="page-header">
      <h1 style="font-size: 2rem; font-weight: 800;">Simulados</h1>
      <p style="color: var(--text-secondary);">Prepare-se com cronômetro e questões aleatórias.</p>
    </div>
    
    <div class="config-card">
      <div class="form-group">
        <label class="form-label">Quantidade de Questões</label>
        <input class="form-input" type="number" id="cfg-qtd" value="10" min="5" max="120">
      </div>
      
      <div class="form-group">
        <label class="form-label">Especialidade Foco</label>
        <select class="form-select" id="cfg-tema">
          <option value="">Todas as especialidades</option>
        </select>
      </div>

      <div class="form-grid" style="display:grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
        <div class="form-group">
          <label class="form-label">Dificuldade</label>
          <select class="form-select" id="cfg-dif">
            <option value="">Qualquer</option>
            <option value="facil">Fácil</option>
            <option value="media">Média</option>
            <option value="dificil">Difícil</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Minutos p/ Questão</label>
          <input class="form-input" type="number" id="cfg-tempo" value="2" min="1" max="10">
        </div>
      </div>

      <button class="btn-full btn-primary" style="margin-top: 1rem;" onclick="iniciar()">
        Começar Simulado
      </button>
    </div>
  </div>

  <div id="tela-sim" style="display:none">
    <div class="sim-header">
      <div>
        <div style="font-size:.7rem; font-weight:700; color:var(--text-secondary); text-transform:uppercase; letter-spacing:0.05em">Tempo Restante</div>
        <div class="timer-display" id="timer">00:00</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:.75rem; font-weight:600; color:var(--text-secondary); margin-bottom: 0.5rem;" id="sim-prog-txt">0 / 0 Respondidas</div>
        <div class="sim-progresso" id="sim-dots"></div>
      </div>
    </div>

    <div id="lista-sim"></div>

    <div style="text-align:center; padding: 2rem 0;">
      <button class="btn-full btn-primary" style="max-width: 300px;" onclick="finalizar()">Finalizar e Ver Resultado</button>
    </div>
  </div>

  <div id="tela-result" style="display:none">
    <div class="resultado-hero">
      <div style="font-size: 0.9rem; font-weight: 700; color: var(--text-secondary); text-transform: uppercase;">Desempenho Geral</div>
      <div class="resultado-pct" id="res-pct">0%</div>
      <p id="res-sub" style="font-weight: 500; color: var(--text-main);"></p>
      
      <div class="resultado-stats">
        <div class="resultado-stat">
          <strong id="res-acertos" style="color:var(--green)">0</strong>
          <span>Acertos</span>
        </div>
        <div class="resultado-stat">
          <strong id="res-erros" style="color:var(--red)">0</strong>
          <span>Erros</span>
        </div>
      </div>
      
      <button class="btn-full btn-primary" onclick="location.reload()">Tentar Novo Simulado</button>
      <button class="btn-full" style="background:transparent; color: var(--primary); margin-top: 0.5rem;" onclick="window.location.href='estatisticas.html'">Ver Estatísticas Completas</button>
    </div>
  </div>

</main>

<script>
let sessao=null, questoesSim=[], respostasSim={}, timerInt=null, tempoRest=0;
const LETRAS=['A','B','C','D','E'];

window.addEventListener('load', async()=>{
  sessao = await exigirLogin(); if(!sessao) return;
  document.getElementById('main').style.display='block';
  const sb=window.supabaseClient;
  const {data:temas} = await sb.from('questoes').select('tema');
  if(temas){
    const u=[...new Set(temas.map(t=>t.tema).filter(Boolean))].sort();
    const sel=document.getElementById('cfg-tema');
    u.forEach(t=>{const o=document.createElement('option');o.value=o.textContent=t;sel.appendChild(o);});
  }
});

async function iniciar(){
  const sb=window.supabaseClient;
  const qtd=parseInt(document.getElementById('cfg-qtd').value)||10;
  const tema=document.getElementById('cfg-tema').value;
  const dif=document.getElementById('cfg-dif').value;
  const tempoQ=parseInt(document.getElementById('cfg-tempo').value)||2;

  let q=sb.from('questoes').select('*');
  if(tema) q=q.eq('tema',tema);
  if(dif) q=q.eq('dificuldade',dif);

  const {data}=await q;
  if(!data||data.length===0){alert('Nenhuma questão encontrada com esses filtros.');return;}

  questoesSim=data.sort(()=>Math.random()-.5).slice(0,Math.min(qtd,data.length));
  
  document.getElementById('tela-config').style.display='none';
  document.getElementById('tela-sim').style.display='block';
  
  renderSim();
  tempoRest=questoesSim.length*tempoQ*60;
  ticarTimer();
  timerInt=setInterval(ticarTimer,1000);
}

function renderSim(){
  const lista=document.getElementById('lista-sim');
  lista.innerHTML=questoesSim.map((q,idx)=>{
    const ops=parseOpcoes(q.opcoes);
    return `
    <div class="sim-questao-card" id="sc-${idx}">
      <div style="display:flex; justify-content:space-between; margin-bottom:1.5rem">
        <span style="font-size:0.75rem; font-weight:800; color:var(--primary); background:#eff6ff; padding:4px 10px; border-radius:6px">QUESTÃO ${idx+1}</span>
        <span style="font-size:0.75rem; font-weight:600; color:var(--text-secondary)">${q.tema || 'Geral'}</span>
      </div>
      <div style="font-size:1.05rem; line-height:1.7; font-weight:500; margin-bottom:2rem">${q.pergunta}</div>
      <div class="opcoes-container">
        ${ops.map((op,i)=>`
          <div class="opcao-item" id="so-${idx}-${i}" onclick="selOp(${idx},${i})">
            <div class="opcao-letra">${LETRAS[i]}</div>
            <div style="font-size:.9rem; line-height:1.5">${op}</div>
          </div>`).join('')}
      </div>
    </div>`;
  }).join('');
  atualizarDots();
}

function selOp(qIdx,opIdx){
  const q=questoesSim[qIdx];
  const ops=parseOpcoes(q.opcoes);
  ops.forEach((_,i)=>{
    const el=document.getElementById(`so-${qIdx}-${i}`);
    if(el) el.classList.remove('selecionada');
  });
  const el=document.getElementById(`so-${qIdx}-${opIdx}`);
  if(el) el.classList.add('selecionada');
  respostasSim[qIdx]=opIdx;
  atualizarDots();
}

function atualizarDots(){
  const dots=document.getElementById('sim-dots');
  const respondidasCount=Object.keys(respostasSim).length;
  document.getElementById('sim-prog-txt').textContent=`${respondidasCount} / ${questoesSim.length} respondidas`;
  dots.innerHTML=questoesSim.map((_,i)=>`
    <div class="prog-dot ${respostasSim[i]!==undefined?'respondida':''}" 
         onclick="document.getElementById('sc-${i}').scrollIntoView({behavior:'smooth', block:'center'})">
    </div>`).join('');
}

function ticarTimer(){
  if(tempoRest < 0) return;
  const m=Math.floor(tempoRest/60).toString().padStart(2,'0');
  const s=(tempoRest%60).toString().padStart(2,'0');
  const el=document.getElementById('timer');
  el.textContent=`${m}:${s}`;
  if(tempoRest<60) el.classList.add('urgente');
  if(tempoRest<=0){ clearInterval(timerInt); finalizar(); }
  tempoRest--;
}

async function finalizar(){
  if(!confirm('Deseja finalizar o simulado agora?')) return;
  
  clearInterval(timerInt);
  const sb=window.supabaseClient, uid=sessao.user.id;
  let acertos=0;

  for(let i=0;i<questoesSim.length;i++){
    const q=questoesSim[i], escolhida=respostasSim[i];
    const acertou=escolhida!==undefined && escolhida===q.resposta;
    if(acertou) acertos++;
    
    // Registrar cada resposta no banco
    await sb.from('respostas').insert({
      user_id: uid,
      questao_id: q.id,
      opcao_escolhida: escolhida ?? null,
      acertou: acertou,
      modo: 'simulado'
    });
  }

  // Mostrar Tela de Resultado
  document.getElementById('tela-sim').style.display='none';
  document.getElementById('tela-result').style.display='block';
  
  const pct=Math.round((acertos/questoesSim.length)*100);
  const elPct = document.getElementById('res-pct');
  elPct.textContent=pct+'%';
  elPct.style.color = pct>=70?'var(--green)':pct>=50?'var(--yellow)':'var(--red)';
  
  document.getElementById('res-sub').textContent=`Você acertou ${acertos} de ${questoesSim.length} questões selecionadas.`;
  document.getElementById('res-acertos').textContent=acertos;
  document.getElementById('res-erros').textContent=questoesSim.length-acertos;
  
  window.scrollTo(0,0);
}
</script>
</body>
</html>
