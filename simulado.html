<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Simulados — MedQuest Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .config-card{max-width:520px;margin-top:1.5rem}
    .timer-display{font-size:3rem;font-weight:800;color:var(--accent);text-align:center;margin:.5rem 0;font-variant-numeric:tabular-nums}
    .timer-display.urgente{color:var(--red)}
    .sim-header{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem 1.75rem;margin-bottom:1.5rem;display:flex;justify-content:space-between;align-items:center;box-shadow:var(--shadow)}
    .sim-progresso{display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.5rem}
    .prog-dot{width:10px;height:10px;border-radius:50%;background:var(--border);cursor:pointer;transition:background .15s}
    .prog-dot.respondida{background:var(--green)}
    .prog-dot.selecionada{background:var(--accent)}
    .resultado-hero{text-align:center;padding:2.5rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);max-width:500px;margin:1.5rem auto;box-shadow:var(--shadow-md)}
    .resultado-pct{font-size:4.5rem;font-weight:800;line-height:1}
    .resultado-sub{color:var(--text-secondary);margin-top:.5rem;font-size:.9rem}
    .resultado-stats{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-top:1.5rem}
    .resultado-stat{background:var(--bg);border-radius:var(--radius-sm);padding:1rem;text-align:center}
    .resultado-stat strong{display:block;font-size:1.5rem;font-weight:800}
    .resultado-stat span{font-size:.78rem;color:var(--text-secondary)}
  </style>
</head>
<body>
<script src="js/auth.js"></script>
<script src="js/sidebar.js"></script>

<main class="main-content" id="main" style="display:none">

  <!-- Config -->
  <div id="tela-config">
    <div class="page-header"><h1>Simulados</h1><p>Configure e inicie seu simulado cronometrado</p></div>
    <div class="card config-card">
      <h3 style="font-size:1rem;font-weight:700;margin-bottom:1.25rem">Configurações do Simulado</h3>
      <div class="form-group"><label class="form-label">Quantidade de questões</label><input class="form-input" type="number" id="cfg-qtd" value="10" min="5" max="120"></div>
      <div class="form-group"><label class="form-label">Especialidade (opcional)</label><select class="form-select" id="cfg-tema"><option value="">Todas as especialidades</option></select></div>
      <div class="form-group"><label class="form-label">Dificuldade</label><select class="form-select" id="cfg-dif"><option value="">Qualquer dificuldade</option><option value="facil">Fácil</option><option value="media">Média</option><option value="dificil">Difícil</option></select></div>
      <div class="form-group"><label class="form-label">Tempo por questão (minutos)</label><input class="form-input" type="number" id="cfg-tempo" value="2" min="1" max="10"></div>
      <button class="btn btn-primary" style="width:100%;padding:.75rem;font-size:.95rem;margin-top:.5rem" onclick="iniciar()">Iniciar Simulado</button>
    </div>
  </div>

  <!-- Simulado -->
  <div id="tela-sim" style="display:none">
    <div class="sim-header">
      <div>
        <div style="font-size:.75rem;color:var(--text-secondary);margin-bottom:.2rem">TEMPO RESTANTE</div>
        <div class="timer-display" id="timer">00:00</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:.82rem;color:var(--text-secondary)" id="sim-prog-txt">0 / 0</div>
        <div class="sim-progresso" id="sim-dots"></div>
      </div>
    </div>
    <div id="lista-sim"></div>
    <div style="text-align:center;margin-top:1.5rem">
      <button class="btn btn-primary" style="padding:.75rem 2.5rem;font-size:.95rem" onclick="finalizar()">Finalizar Simulado</button>
    </div>
  </div>

  <!-- Resultado -->
  <div id="tela-result" style="display:none">
    <div class="page-header"><h1>Resultado do Simulado</h1></div>
    <div class="resultado-hero">
      <div class="resultado-pct" id="res-pct" style="color:var(--accent)">0%</div>
      <div class="resultado-sub" id="res-sub">Você acertou 0 de 0 questões.</div>
      <div class="resultado-stats">
        <div class="resultado-stat"><strong id="res-acertos" style="color:var(--green)">0</strong><span>Acertos</span></div>
        <div class="resultado-stat"><strong id="res-erros" style="color:var(--red)">0</strong><span>Erros</span></div>
      </div>
      <button class="btn btn-primary" style="width:100%;padding:.75rem;margin-top:1.5rem;font-size:.95rem" onclick="location.reload()">Novo Simulado</button>
    </div>
  </div>

</main>

<script>
let sessao=null, questoesSim=[], respostasSim={}, timerInt=null, tempoRest=0;
const LETRAS=['A','B','C','D','E'];

window.addEventListener('load', async()=>{
  sessao = await exigirLogin(); if(!sessao) return;
  document.getElementById('main').style.display='block';
  const sb=window.supabaseClient;
  const {data:temas} = await sb.from('questoes').select('tema');
  if(temas){
    const u=[...new Set(temas.map(t=>t.tema).filter(Boolean))].sort();
    const sel=document.getElementById('cfg-tema');
    u.forEach(t=>{const o=document.createElement('option');o.value=o.textContent=t;sel.appendChild(o);});
  }
});

async function iniciar(){
  const sb=window.supabaseClient;
  const qtd=parseInt(document.getElementById('cfg-qtd').value)||10;
  const tema=document.getElementById('cfg-tema').value;
  const dif=document.getElementById('cfg-dif').value;
  const tempoQ=parseInt(document.getElementById('cfg-tempo').value)||2;
  let q=sb.from('questoes').select('*');
  if(tema) q=q.eq('tema',tema);
  if(dif) q=q.eq('dificuldade',dif);
  const {data}=await q;
  if(!data||data.length===0){alert('Nenhuma questão encontrada com esses filtros.');return;}
  questoesSim=data.sort(()=>Math.random()-.5).slice(0,Math.min(qtd,data.length));
  document.getElementById('tela-config').style.display='none';
  document.getElementById('tela-sim').style.display='block';
  renderSim();
  tempoRest=questoesSim.length*tempoQ*60;
  ticarTimer();
  timerInt=setInterval(ticarTimer,1000);
}

function renderSim(){
  const lista=document.getElementById('lista-sim');
  lista.innerHTML=questoesSim.map((q,idx)=>{
    const ops=parseOpcoes(q.opcoes);
    return `<div class="card" style="margin-bottom:1.25rem" id="sc-${idx}">
      <div style="font-size:.78rem;color:var(--text-muted);font-weight:600;margin-bottom:.75rem">QUESTÃO ${idx+1} DE ${questoesSim.length}</div>
      <div style="font-size:.95rem;line-height:1.75;font-weight:500;margin-bottom:1.1rem">${q.pergunta}</div>
      ${ops.map((op,i)=>`<div class="opcao-item" id="so-${idx}-${i}" onclick="selOp(${idx},${i})"><div class="opcao-letra">${LETRAS[i]}</div><div style="font-size:.875rem;line-height:1.6">${op}</div></div>`).join('')}
    </div>`;
  }).join('');
  atualizarDots();
}

function selOp(qIdx,opIdx){
  const q=questoesSim[qIdx];
  const ops=parseOpcoes(q.opcoes);
  ops.forEach((_,i)=>{const el=document.getElementById(`so-${qIdx}-${i}`);if(el){el.classList.remove('selecionada');}});
  const el=document.getElementById(`so-${qIdx}-${opIdx}`);
  if(el) el.classList.add('selecionada');
  respostasSim[qIdx]=opIdx;
  atualizarDots();
}

function atualizarDots(){
  const dots=document.getElementById('sim-dots');
  const resp=Object.keys(respostasSim).length;
  document.getElementById('sim-prog-txt').textContent=`${resp} / ${questoesSim.length} respondidas`;
  dots.innerHTML=questoesSim.map((_,i)=>`<div class="prog-dot ${respostasSim[i]!==undefined?'respondida':''}" onclick="document.getElementById('sc-${i}').scrollIntoView({behavior:'smooth'})"></div>`).join('');
}

function ticarTimer(){
  const m=Math.floor(tempoRest/60).toString().padStart(2,'0');
  const s=(tempoRest%60).toString().padStart(2,'0');
  const el=document.getElementById('timer');
  el.textContent=`${m}:${s}`;
  el.className='timer-display'+(tempoRest<60?' urgente':'');
  if(tempoRest<=0){clearInterval(timerInt);finalizar();}
  tempoRest--;
}

async function finalizar(){
  clearInterval(timerInt);
  const sb=window.supabaseClient, uid=sessao.user.id;
  let acertos=0;
  for(let i=0;i<questoesSim.length;i++){
    const q=questoesSim[i], escolhida=respostasSim[i];
    const respondeu=escolhida!==undefined, acertou=respondeu&&escolhida===q.resposta;
    if(acertou) acertos++;
    const ops=parseOpcoes(q.opcoes);
    ops.forEach((_,j)=>{
      const el=document.getElementById(`so-${i}-${j}`);
      if(!el)return;
      el.style.pointerEvents='none'; el.classList.remove('selecionada');
      if(j===q.resposta) el.classList.add('correta');
      else if(j===escolhida&&!acertou) el.classList.add('errada');
    });
    if(respondeu) await sb.from('respostas').insert({user_id:uid,questao_id:q.id,opcao_escolhida:escolhida,acertou,modo:'simulado'});
  }
  setTimeout(()=>{
    document.getElementById('tela-sim').style.display='none';
    document.getElementById('tela-result').style.display='block';
    const pct=Math.round((acertos/questoesSim.length)*100);
    const cor=pct>=70?'var(--green)':pct>=50?'var(--yellow)':'var(--red)';
    document.getElementById('res-pct').textContent=pct+'%';
    document.getElementById('res-pct').style.color=cor;
    document.getElementById('res-sub').textContent=`Você acertou ${acertos} de ${questoesSim.length} questões.`;
    document.getElementById('res-acertos').textContent=acertos;
    document.getElementById('res-erros').textContent=questoesSim.length-acertos;
  },1200);
}
</script>
</body>
</html>
