<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questões — MedQuest Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-900">

    <nav class="bg-blue-600 p-4 text-white shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tight">MedQuest Pro</h1>
            <a href="dashboard.html" class="text-sm font-medium hover:bg-blue-700 px-4 py-2 rounded-lg transition-all border border-blue-400">
                Voltar ao Dashboard
            </a>
        </div>
    </nav>

    <main class="container mx-auto p-6 max-w-4xl">
        <header class="mb-10">
            <h2 class="text-3xl font-extrabold text-gray-800">Banco de Questões</h2>
            <p class="text-gray-600 mt-2 text-lg">Resolva os casos clínicos e acompanhe seu desempenho.</p>
        </header>

        <div id="questoes-container" class="space-y-8">
            <div id="loading-state" class="text-center py-20">
                <div class="inline-block animate-spin rounded-full h-10 w-10 border-4 border-blue-500 border-t-transparent"></div>
                <p class="text-gray-500 mt-4 font-medium">Carregando banco de dados...</p>
            </div>
        </div>
    </main>

    <script>
        // Configuração do Banco de Dados
        const URL_PROJETO = 'SUA_URL_AQUI';
        const CHAVE_ACESSO = 'SUA_KEY_AQUI';
        const sbClient = supabase.createClient(URL_PROJETO, CHAVE_ACESSO);

        async function buscarDados() {
            const container = document.getElementById('questoes-container');
            
            // Tratamento de filtros da URL (ex: ?tema=Cardiologia)
            const parametros = new URLSearchParams(window.location.search);
            const filtroTema = parametros.get('tema');
            const filtroSubtema = parametros.get('subtema');

            let chamada = sbClient.from('questoes').select('*');

            if (filtroTema) chamada = chamada.eq('tema', filtroTema);
            if (filtroSubtema) chamada = chamada.eq('subtema', filtroSubtema);

            const { data: listaQuestoes, error } = await chamada.order('id', { ascending: false });

            if (error) {
                container.innerHTML = `<div class="bg-red-50 p-6 rounded-xl text-red-800 border border-red-200">Erro de conexão: ${error.message}</div>`;
                return;
            }

            if (!listaQuestoes || listaQuestoes.length === 0) {
                container.innerHTML = `<div class="text-center py-10 text-gray-400">Nenhuma questão disponível para este filtro.</div>`;
                return;
            }

            container.innerHTML = ''; // Limpa o loading

            listaQuestoes.forEach((item) => {
                const elementoCard = document.createElement('div');
                elementoCard.className = "bg-white p-8 rounded-2xl shadow-sm border border-gray-200 animate-fadeIn";
                
                elementoCard.innerHTML = `
                    <div class="flex justify-between items-center mb-6">
                        <span class="text-xs font-bold px-3 py-1 bg-blue-50 text-blue-600 rounded-full uppercase tracking-widest">
                            ${item.tema} | ${item.subtema}
                        </span>
                        <span class="text-xs text-gray-300 font-mono">ID #${item.id}</span>
                    </div>
                    
                    <h3 class="text-gray-800 font-bold mb-8 text-xl leading-relaxed">
                        ${item.pergunta}
                    </h3>

                    <div class="space-y-4" id="grupo-opcoes-${item.id}">
                        ${item.opcoes.map((texto, i) => `
                            <button onclick="checarResposta(${item.id}, ${i}, '${item.resposta}')" 
                                class="w-full text-left p-4 rounded-xl border border-gray-100 hover:border-blue-200 hover:bg-blue-50 transition-all flex items-center group">
                                <span id="letra-${item.id}-${i}" class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-100 text-gray-500 font-bold mr-4 group-hover:bg-blue-500 group-hover:text-white transition-all">
                                    ${String.fromCharCode(65 + i)}
                                </span>
                                <span class="text-gray-700 font-medium">${texto}</span>
                            </button>
                        `).join('')}
                    </div>

                    <div id="msg-feedback-${item.id}" class="mt-6 hidden p-5 rounded-xl font-bold border"></div>
                `;
                container.appendChild(elementoCard);
            });
        }

        function checarResposta(idQuestao, indexEscolhido, indexCorreto) {
            const painelFeedback = document.getElementById(`msg-feedback-${idQuestao}`);
            const listaBotoes = document.querySelectorAll(`#grupo-opcoes-${idQuestao} button`);
            const gabarito = parseInt(indexCorreto);
            
            // Trava as opções após o clique
            listaBotoes.forEach(b => b.disabled = true);
            painelFeedback.classList.remove('hidden');

            if (indexEscolhido === gabarito) {
                painelFeedback.className = "mt-6 p-5 rounded-xl bg-green-50 text-green-700 border-green-200 font-bold animate-pulseFast";
                painelFeedback.innerHTML = `✓ Resposta Correta!`;
                colorirLetra(idQuestao, indexEscolhido, 'correto');
            } else {
                painelFeedback.className = "mt-6 p-5 rounded-xl bg-red-50 text-red-700 border-red-200 font-bold";
                painelFeedback.innerHTML = `✕ Incorreto. A alternativa correta era a ${String.fromCharCode(65 + gabarito)}.`;
                colorirLetra(idQuestao, indexEscolhido, 'errado');
                colorirLetra(idQuestao, gabarito, 'correto');
            }
        }

        function colorirLetra(idQuestao, index, status) {
            const circulo = document.getElementById(`letra-${idQuestao}-${index}`);
            if (status === 'correto') {
                circulo.className = "w-10 h-10 flex items-center justify-center rounded-full bg-green-500 text-white font-bold mr-4 shadow-md";
            } else {
                circulo.className = "w-10 h-10 flex items-center justify-center rounded-full bg-red-500 text-white font-bold mr-4 shadow-md";
            }
        }

        buscarDados();
    </script>

    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.5s ease-out; }
        @keyframes pulseFast { 0%, 100% { opacity: 1; } 50% { opacity: 0.8; } }
        .animate-pulseFast { animation: pulseFast 1.5s infinite; }
    </style>
</body>
</html>
