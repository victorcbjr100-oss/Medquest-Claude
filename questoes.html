<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>MedQuest — Questões</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --sb-bg: #0f172a;
            --sb-text: #94a3b8;
            --sb-active-bg: #1e293b;
            --sb-active-text: #ffffff;
            --sb-accent: #2563eb;
            --sb-divider: #1e293b;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #f6f7fb;
            color: #111;
            display: flex; /* Adicionado para lidar com a sidebar e o app lado a lado */
        }

        /* ================= SIDEBAR ================= */
        .sidebar {
            width: 260px;
            height: 100vh;
            background-color: var(--sb-bg);
            color: var(--sb-text);
            position: fixed;
            left: 0;
            top: 0;
            display: flex;
            flex-direction: column;
            padding: 1.5rem 0;
            z-index: 1000;
            border-right: 1px solid var(--sb-divider);
            box-sizing: border-box;
        }

        .sidebar-brand {
            padding: 0 1.5rem 2rem;
            display: flex;
            align-items: center;
            gap: 0.85rem;
        }

        .sidebar-brand-icon {
            background-color: var(--sb-accent);
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.1rem;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        }

        .sidebar-brand-name {
            color: white;
            font-weight: 700;
            font-size: 1.25rem;
            letter-spacing: -0.025em;
        }

        .sidebar-section-label {
            padding: 0 1.5rem 0.5rem;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #475569;
            margin-top: 1rem;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1.5rem;
            color: var(--sb-text);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        .sidebar-link:hover {
            color: white;
            background-color: var(--sb-active-bg);
        }

        .sidebar-link.active {
            background-color: var(--sb-active-bg);
            color: white;
            border-left-color: var(--sb-accent);
        }

        .sidebar-link-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.7;
        }

        .active .sidebar-link-icon {
            color: var(--sb-accent);
            opacity: 1;
        }

        .sidebar-divider {
            height: 1px;
            background-color: var(--sb-divider);
            margin: 1.5rem 1rem;
        }

        .sidebar-footer {
            margin-top: auto;
            padding: 0 1rem;
        }

        .sidebar-user-card {
            background-color: var(--sb-active-bg);
            border-radius: 12px;
            padding: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .sidebar-user-card:hover {
            background-color: #334155;
        }

        .sidebar-avatar {
            width: 36px;
            height: 36px;
            background-color: var(--sb-accent);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            flex-shrink: 0;
        }

        .sidebar-user-info {
            overflow: hidden;
            flex-grow: 1;
        }

        .sidebar-user-name {
            color: white;
            font-size: 0.85rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sidebar-user-email {
            font-size: 0.7rem;
            color: var(--sb-text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn-logout-minimal {
            background: transparent;
            border: none;
            color: var(--sb-text);
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            transition: all 0.2s;
        }

        .btn-logout-minimal:hover {
            color: #ef4444;
            background-color: rgba(239, 68, 68, 0.1);
        }

        /* ================= CONTEÚDO PRINCIPAL ================= */
        #app {
            margin-left: 260px; /* Respeita a sidebar permanentemente */
            width: calc(100% - 260px); /* Ocupa o restante da tela */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Evita que o card estique verticalmente no centro */
            padding: 40px 30px;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 850px;
        }

        .card {
            background: #fff;
            border: 1px solid #e8e8e8;
            border-radius: 14px;
            padding: 30px; /* Aumentei um pouco o padding para respirar melhor */
            box-shadow: 0 6px 18px rgba(0,0,0,.05);
        }

        .question {
            font-size: 18px;
            font-weight: 600;
            line-height: 1.6;
            margin-bottom: 24px;
            color: #1f2937;
        }

        .option {
            padding: 14px 16px;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            margin-top: 12px;
            cursor: pointer;
            transition: all .2s ease;
            background: #fff;
            font-size: 15px;
            color: #374151;
            display: flex;
            align-items: center;
        }

        .option:hover {
            background: #f9fafb;
            border-color: #d1d5db;
        }

        .option.selected {
            border-color: #2563eb;
            background-color: #eff6ff;
        }

        .option.correct {
            border: 2px solid #16a34a;
            background: #f0fdf4;
            color: #166534;
        }

        .option.wrong {
            border: 2px solid #dc2626;
            background: #fef2f2;
            color: #991b1b;
        }

        .actions {
            display: flex;
            justify-content: space-between; /* Distribui os botões melhor */
            gap: 12px;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #f3f4f6;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
        }

        button {
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            padding: 12px 20px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }

        button:active {
            transform: scale(0.98);
        }

        .primary {
            background: #2563eb;
            color: #fff;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        }

        .primary:hover {
            background: #1d4ed8;
        }

        .secondary {
            background: #fff;
            border: 1px solid #e5e7eb;
            color: #374151;
        }

        .secondary:hover {
            background: #f3f4f6;
        }

        /* ================= COMENTÁRIOS ================= */
        #feedback {
            margin-top: 30px;
            display: none;
            background: #f8fafc;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid #e2e8f0;
        }

        #feedback h3 {
            margin: 0 0 20px 0;
            font-size: 16px;
            color: #1e293b;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
        }

        .comment {
            padding: 16px 0;
            border-bottom: 1px solid #e2e8f0;
        }

        .comment:last-child {
            border-bottom: none;
        }

        .comment-header {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #2563eb;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            box-shadow: 0 2px 4px rgba(37, 99, 235, 0.2);
        }

        .comment-name {
            font-weight: 600;
            font-size: 14px;
            color: #0f172a;
        }

        .comment-date {
            font-size: 12px;
            color: #64748b;
            margin-top: 2px;
        }

        .comment-text {
            margin-left: 48px;
            margin-top: 8px;
            font-size: 14px;
            color: #334155;
            line-height: 1.5;
        }

        .reply-btn {
            margin-left: 48px;
            font-size: 12px;
            color: #2563eb;
            cursor: pointer;
            margin-top: 8px;
            font-weight: 600;
            display: inline-block;
        }
        
        .reply-btn:hover {
            text-decoration: underline;
        }

        /* Estética consertada da caixa de comentário/resposta */
        .comment-box {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
            background: #fff;
            padding: 16px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
        }

        .reply-box {
            margin-left: 48px;
            margin-top: 12px;
            display: none;
            background: #f1f5f9;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            font-family: 'Inter', sans-serif;
            resize: vertical;
            min-height: 80px;
            box-sizing: border-box;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .small-btn {
            align-self: flex-end;
            font-size: 13px;
            padding: 8px 16px;
        }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            #app { margin-left: 0; width: 100%; padding: 20px 15px; }
        }
    </style>
</head>

<body>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <div class="sidebar-brand-icon">MQ</div>
            <div class="sidebar-brand-name">MedQuest</div>
        </div>

        <div class="sidebar-section-label">Estudos</div>
        
        <a href="dashboard.html" class="sidebar-link">
            <div class="sidebar-link-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>

        <a href="temas.html" class="sidebar-link">
            <div class="sidebar-link-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg></div>

        <a href="favoritas.html" class="sidebar-link">

        </a>
        <a href="caderno.html" class="sidebar-link">
            <div class="sidebar-link-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>

        <div id="sidebar-admin-section" style="display:none">

            <a href="admin-usuarios.html" class="sidebar-link">
                <div class="sidebar-link-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>
                <span>Gerenciar Usuários</span>
            </a>
            <a href="admin-questoes.html" class="sidebar-link">

        <div class="sidebar-footer">
            <div class="sidebar-user-card" onclick="window.location.href='perfil.html'">
                <div class="sidebar-avatar" id="sb-avatar">?</div>
                <div class="sidebar-user-info">
                    <div class="sidebar-user-name" id="sb-nome">Carregando...</div>
                    <div class="sidebar-user-email" id="sb-email"></div>
                </div>
                <button class="btn-logout-minimal" onclick="event.stopPropagation();logout()" title="Sair">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>

    <main id="app" style="display:none">
        <div class="container">
            <div class="card">
                <div class="question" id="question"></div>
                <div id="options"></div>

                <div class="actions">
                    <div class="nav-buttons">
                        <button class="secondary" onclick="prev()">⬅ Anterior</button>
                        <button class="secondary" onclick="next()">Próxima ➜</button>
                    </div>
                    <button class="primary" onclick="confirm()">Responder</button>
                </div>

                <div id="feedback">
                    <h3>Discussão da Questão</h3>
                    <div id="comments"></div>

                    <div class="comment-box">
                        <textarea id="newComment" placeholder="Ficou com dúvida? Escreva um comentário..."></textarea>
                        <button class="primary small-btn" onclick="sendComment()">Enviar comentário</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

<script>
let qs = [];
let i = 0;
let selected = null;
let answered = false;

/* INIT GERAL E SIDEBAR DINÂMICA */
window.addEventListener("load", async () => {
    // 1. Lógica da Aplicação Principal
    if (typeof exigirLogin === "function") await exigirLogin();
    
    document.getElementById("app").style.display = "flex";

    if (typeof db !== "undefined") {
        const { data } = await db.from("banco_questoes").select("*").limit(30);
        qs = data || [];
        if(qs.length > 0) render();
    }

    // 2. Lógica da Sidebar
    const page = window.location.pathname.split('/').pop();
    document.querySelectorAll('.sidebar-link').forEach(link => {
        if (link.getAttribute('href') === page) {
            link.classList.add('active');
        }
    });

    const esperar = ms => new Promise(r => setTimeout(r, ms));
    let t = 0;
    while (!window.supabase && t++ < 40) await esperar(80);
    if (!window.supabase) return;

    const { data: { session } } = await window.supabase.auth.getSession();
    if (!session) return;

    const user = session.user;
    const nome = user.user_metadata?.nome || user.email.split('@');
    document.getElementById('sb-avatar').textContent = nome.charAt(0).toUpperCase();
    document.getElementById('sb-nome').textContent = nome;
    document.getElementById('sb-email').textContent = user.email;

    if (typeof getPerfil === "function") {
        const perfil = await getPerfil(user.id);
        if (perfil?.role === 'admin') {
            document.getElementById('sidebar-admin-section').style.display = 'block';
        }
    }
});

/* RENDER */
function render(){
    selected = null;
    answered = false;

    const q = qs[i];
    document.getElementById("question").innerText = q.enunciado;

    document.getElementById("options").innerHTML = ["a","b","c","d"].map(l => `
        <div class="option" onclick="selectOpt('${l}', this)">
            <strong>${l.toUpperCase()})</strong> &nbsp;${q["alternativa_"+l]}
        </div>
    `).join("");

    document.getElementById("feedback").style.display = "none";
}

/* SELECT */
function selectOpt(letter, el){
    if(answered) return;

    selected = { letter, el };

    document.querySelectorAll(".option").forEach(o => {
        o.classList.remove("selected");
    });

    el.classList.add("selected");
}

/* CONFIRM */
async function confirm(){
    if(!selected || answered) return;

    answered = true;

    const q = qs[i];
    const correct = selected.letter === q.correta;

    document.getElementById("feedback").style.display = "block";

    document.querySelectorAll(".option").forEach(o => {
        const textOption = o.innerText.trim();
        const l = textOption.toLowerCase();
        if(l === q.correta) o.classList.add("correct");
        if(o === selected.el && !correct) o.classList.add("wrong");
    });

    if (window.supabase) {
        const { data } = await supabase.auth.getUser();
        if (data && data.user) {
            await db.from("respostas_usuario").insert({
                user_id: data.user.id,
                questao_id: q.id,
                resposta_marcada: selected.letter,
                correta: correct
            });
        }
    }

    loadComments();
}

/* NAV */
function prev(){ if(i>0){ i--; render(); } }
function next(){ if(i<qs.length-1){ i++; render(); } }

/* COMMENTS */
async function loadComments(){
    if (!window.db) return;
    const q = qs[i];

    const { data } = await db
        .from("comentarios_questao")
        .select("*")
        .eq("questao_id", q.id)
        .order("created_at", { ascending: false });

    renderComments(data || []);
}

function renderComments(cms){
    const box = document.getElementById("comments");

    box.innerHTML = cms.map(c => `
        <div class="comment">
            <div class="comment-header">
                <div class="avatar">${(c.user_name || "U").toUpperCase()}</div>
                <div>
                    <div class="comment-name">${c.user_name || "Usuário"}</div>
                    <div class="comment-date">${new Date(c.created_at).toLocaleString('pt-BR')}</div>
                </div>
            </div>

            <div class="comment-text">${c.conteudo}</div>

            <div class="reply-btn" onclick="toggleReply('${c.id}')">Responder</div>

            <div class="reply-box" id="r-${c.id}">
                <textarea id="t-${c.id}" placeholder="Escreva sua resposta..."></textarea>
                <div style="display:flex; justify-content:flex-end; margin-top:8px;">
                    <button class="primary small-btn" onclick="reply('${c.id}')">Enviar resposta</button>
                </div>
            </div>
        </div>
    `).join("");
}

/* SEND COMMENT */
async function sendComment(){
    const textEl = document.getElementById("newComment");
    const text = textEl.value.trim();
    if(!text || !window.supabase) return;

    const q = qs[i];
    const { data } = await supabase.auth.getUser();
    if (!data || !data.user) return;
    const user = data.user;
    const userName = user.user_metadata?.nome || user.email.split('@');

    await db.from("comentarios_questao").insert({
        questao_id: q.id,
        user_id: user.id,
        user_name: userName,
        conteudo: text,
        parent_id: null
    });

    textEl.value = "";
    loadComments();
}

/* REPLY */
async function reply(id){
    const textEl = document.getElementById("t-"+id);
    const text = textEl.value.trim();
    if(!text || !window.supabase) return;

    const q = qs[i];
    const { data } = await supabase.auth.getUser();
    if (!data || !data.user) return;
    const user = data.user;
    const userName = user.user_metadata?.nome || user.email.split('@');

    await db.from("comentarios_questao").insert({
        questao_id: q.id,
        user_id: user.id,
        user_name: userName,
        conteudo: text,
        parent_id: id
    });

    textEl.value = "";
    loadComments();
}

function toggleReply(id){
    const el = document.getElementById("r-"+id);
    el.style.display = el.style.display === "block" ? "none" : "block";
}
</script>

</body>
