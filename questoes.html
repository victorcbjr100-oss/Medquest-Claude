<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questões — MedQuest Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-900">

    <nav class="bg-blue-600 p-4 text-white shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tight">MedQuest Pro</h1>
            <a href="dashboard.html" class="text-sm font-medium hover:bg-blue-700 px-3 py-2 rounded-lg transition-all">Voltar ao Dashboard</a>
        </div>
    </nav>

    <main class="container mx-auto p-6 max-w-4xl">
        <header class="mb-8">
            <h2 class="text-3xl font-extrabold text-gray-800">Banco de Questões</h2>
            <p class="text-gray-600 mt-2">Resolva os casos clínicos e acompanhe seu desempenho.</p>
        </header>

        <div id="questoes-container" class="space-y-8">
            <div id="loading" class="text-center py-20">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-blue-500 border-t-transparent"></div>
                <p class="text-gray-500 mt-4 font-medium">Buscando questões...</p>
            </div>
        </div>
    </main>

    <script>
        // Substitua com suas credenciais reais
        const SUPABASE_URL = 'SUA_URL_AQUI';
        const SUPABASE_KEY = 'SUA_KEY_AQUI';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function carregarQuestoes() {
            const container = document.getElementById('questoes-container');
            
            // Captura filtros da URL
            const urlParams = new URLSearchParams(window.location.search);
            const temaFiltro = urlParams.get('tema');
            const subtemaFiltro = urlParams.get('subtema');

            let query = supabaseClient.from('questoes').select('*');

            if (temaFiltro) query = query.eq('tema', temaFiltro);
            if (subtemaFiltro) query = query.eq('subtema', subtemaFiltro);

            const { data: questoes, error } = await query.order('id', { ascending: false });

            if (error) {
                container.innerHTML = `<div class="p-4 bg-red-100 text-red-700 rounded-lg">${error.message}</div>`;
                return;
            }

            if (!questoes || questoes.length === 0) {
                container.innerHTML = `<div class="text-center py-10 text-gray-500 font-medium">Nenhuma questão encontrada para este filtro.</div>`;
                return;
            }

            container.innerHTML = '';

            questoes.forEach((q) => {
                const card = document.createElement('div');
                card.className = "bg-white p-8 rounded-xl shadow-sm border border-gray-200";
                
                card.innerHTML = `
                    <div class="flex justify-between items-center mb-6">
                        <span class="text-xs font-bold px-3 py-1 bg-blue-50 text-blue-600 rounded-full uppercase">
                            ${q.tema} | ${q.subtema}
                        </span>
                        <span class="text-xs text-gray-400 font-mono">#${q.id}</span>
                    </div>
                    
                    <p class="text-gray-800 font-semibold mb-8 text-xl leading-relaxed">${q.pergunta}</p>

                    <div class="space-y-4" id="opcoes-${q.id}">
                        ${q.opcoes.map((opcao, i) => `
                            <button onclick="verificarResposta(${q.id}, ${i}, '${q.resposta}')" 
                                class="w-full text-left p-4 rounded-xl border border-gray-100 hover:border-blue-300 hover:bg-blue-50 transition-all flex items-center group">
                                <span id="letra-${q.id}-${i}" class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-100 text-gray-500 font-bold mr-4 group-hover:bg-blue-500 group-hover:text-white transition-all">
                                    ${String.fromCharCode(65 + i)}
                                </span>
                                <span class="text-gray-700 font-medium">${opcao}</span>
                            </button>
                        `).join('')}
                    </div>

                    <div id="feedback-${q.id}" class="mt-6 hidden p-5 rounded-xl font-medium animate-fadeIn"></div>
                `;
                container.appendChild(card);
            });
        }

        function verificarResposta(questaoId, escolha, correta) {
            const feedback = document.getElementById(`feedback-${questaoId}`);
            const botoes = document.querySelectorAll(`#opcoes-${questaoId} button`);
            const indexCorreto = parseInt(correta);
            
            botoes.forEach(btn => btn.disabled = true);
            feedback.classList.remove('hidden');

            if (escolha === indexCorreto) {
                feedback.className = "mt-6 p-5 rounded-xl bg-green-50 text-green-800 border border-green-200";
                feedback.innerHTML = `✅ <strong>Correto!</strong>`;
                marcarBotao(questaoId, escolha, 'success');
            } else {
                feedback.className = "mt-6 p-5 rounded-xl bg-red-50 text-red-800 border border-red-200";
                feedback.innerHTML = `❌ <strong>Incorreto.</strong> A correta é a letra ${String.fromCharCode(65 + indexCorreto)}.`;
                marcarBotao(questaoId, escolha, 'error');
                marcarBotao(questaoId, indexCorreto, 'success');
            }
        }

        function marcarBotao(questaoId, index, tipo) {
            const spanLetra = document.getElementById(`letra-${questaoId}-${index}`);
            if (tipo === 'success') {
                spanLetra.className = "w-10 h-10 flex items-center justify-center rounded-full bg-green-500 text-white font-bold mr-4";
            } else {
                spanLetra.className = "w-10 h-10 flex items-center justify-center rounded-full bg-red-500 text-white font-bold mr-4";
            }
        }

        carregarQuestoes();
    </script>

    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.4s ease-out; }
    </style>
</body>
</html>
