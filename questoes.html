<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questões — MedQuest Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 font-sans">

    <nav class="bg-blue-600 p-4 text-white shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">MedQuest Pro</h1>
            <a href="dashboard.html" class="text-sm hover:underline">Voltar ao Dashboard</a>
        </div>
    </nav>

    <main class="container mx-auto p-4 max-w-4xl">
        <header class="mb-6">
            <h2 class="text-2xl font-bold text-gray-800">Banco de Questões</h2>
            <p class="text-gray-600">Resolva os casos clínicos e acompanhe seu desempenho.</p>
        </header>

        <div id="questoes-container" class="space-y-6">
            <div class="text-center py-10">
                <p class="text-gray-500 animate-pulse">Carregando questões...</p>
            </div>
        </div>
    </main>

    <script>
        // Configuração do Supabase (Substitua pelas suas credenciais se necessário)
        const supabaseUrl = 'SUA_URL_DO_SUPABASE';
        const supabaseKey = 'SUA_KEY_DO_SUPABASE';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function carregarQuestoes() {
            const container = document.getElementById('questoes-container');
            
            const { data: questoes, error } = await supabase
                .from('questoes')
                .select('*')
                .order('id', { ascending: false });

            if (error) {
                container.innerHTML = `<p class="text-red-500">Erro ao carregar: ${error.message}</p>`;
                return;
            }

            container.innerHTML = '';

            questoes.forEach((q, index) => {
                const card = document.createElement('div');
                card.className = "bg-white p-6 rounded-lg shadow-sm border border-gray-200";
                
                // Cabeçalho da Questão (Tema e Dificuldade)
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-xs font-semibold px-2 py-1 bg-blue-100 text-blue-700 rounded uppercase">
                            ${q.tema} | ${q.subtema}
                        </span>
                        <span class="text-xs text-gray-400">ID: #${q.id}</span>
                    </div>
                    
                    <p class="text-gray-800 font-medium mb-6 text-lg leading-relaxed">
                        ${q.pergunta}
                    </p>

                    <div class="space-y-3" id="opcoes-${q.id}">
                        ${q.opcoes.map((opcao, i) => `
                            <button onclick="verificarResposta(${q.id}, ${i}, ${q.resposta})" 
                                class="w-full text-left p-3 rounded-md border border-gray-100 hover:bg-gray-50 transition-colors flex items-center group">
                                <span class="w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 text-gray-500 mr-3 group-hover:bg-blue-500 group-hover:text-white transition-all">
                                    ${String.fromCharCode(65 + i)}
                                </span>
                                <span class="text-gray-700">${opcao}</span>
                            </button>
                        `).join('')}
                    </div>

                    <div id="feedback-${q.id}" class="mt-4 hidden p-4 rounded-md"></div>
                `;
                container.appendChild(card);
            });
        }

        function verificarResposta(questaoId, escolha, correta) {
            const feedback = document.getElementById(`feedback-${questaoId}`);
            const botoes = document.querySelectorAll(`#opcoes-${questaoId} button`);
            
            // Desabilita os botões após a escolha
            botoes.forEach(btn => btn.disabled = true);

            feedback.classList.remove('hidden');

            if (escolha == correta) {
                feedback.classList.add('bg-green-100', 'text-green-800');
                feedback.innerHTML = `<strong>Correto!</strong> Parabéns pela análise clínica.`;
                botoes[escolha].classList.add('bg-green-50', 'border-green-500');
            } else {
                feedback.classList.add('bg-red-100', 'text-red-800');
                feedback.innerHTML = `<strong>Incorreto.</strong> A resposta certa era a alternativa ${String.fromCharCode(65 + parseInt(correta))}.`;
                botoes[escolha].classList.add('bg-red-50', 'border-red-500');
                botoes[correta].classList.add('bg-green-50', 'border-green-500');
            }
        }

        carregarQuestoes();
    </script>
</body>
</html>
