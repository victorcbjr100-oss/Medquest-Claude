<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MedQuest — Questões</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/sidebar.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* ================= LAYOUT BASE ================= */

body{
  margin:0;
  font-family:Inter;
  background:#f6f7fb;
  color:#0f172a;
}

.main-content{
  max-width:900px;
  margin:0 auto;
  padding:28px 18px;
}

/* CARD */
.card{
  background:#fff;
  border:1px solid #e5e7eb;
  border-radius:18px;
  padding:22px;
  box-shadow:0 10px 30px rgba(0,0,0,.06);
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  font-size:13px;
  color:#64748b;
  margin-bottom:10px;
}

/* PROGRESS */
.progress{
  height:8px;
  background:#e2e8f0;
  border-radius:999px;
  overflow:hidden;
  margin-bottom:18px;
}

.progress-fill{
  height:100%;
  width:0%;
  background:#2563eb;
  transition:.3s;
}

/* QUESTÃO */
.question{
  font-size:18px;
  font-weight:600;
  margin:12px 0 18px;
  line-height:1.5;
}

/* OPÇÕES */
.option{
  display:flex;
  gap:10px;
  padding:12px;
  border:1px solid #e5e7eb;
  border-radius:14px;
  margin-top:10px;
  cursor:pointer;
  transition:.2s;
}

.option:hover{
  border-color:#93c5fd;
  background:#f8fafc;
}

.letter{
  width:28px;
  height:28px;
  border-radius:50%;
  border:1px solid #cbd5e1;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
}

/* STATES */
.selected{ border:2px solid #2563eb !important; background:#eff6ff; }
.correct{ border:2px solid #16a34a !important; background:#ecfdf5; }
.wrong{ border:2px solid #dc2626 !important; background:#fef2f2; }

/* BOTÕES CENTRAIS */
.actions{
  display:flex;
  justify-content:center;
  gap:12px;
  margin-top:18px;
}

button{
  font-family:Inter;
  border:none;
  cursor:pointer;
  padding:10px 14px;
  border-radius:12px;
  font-weight:600;
}

.primary{ background:#2563eb; color:#fff; }
.secondary{ background:#fff; border:1px solid #e5e7eb; }

/* COMMENTS (inicialmente escondido) */
.comments-wrapper{
  display:none;
  margin-top:20px;
  border-top:1px solid #e5e7eb;
  padding-top:16px;
}

.comment{
  padding:12px 0;
  border-bottom:1px solid #f1f5f9;
}

.comment-head{
  display:flex;
  gap:10px;
  align-items:center;
}

.avatar{
  width:32px;
  height:32px;
  border-radius:50%;
  background:#2563eb;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
}

/* TEXTAREA */
textarea{
  width:100%;
  margin-top:10px;
  padding:10px;
  border-radius:12px;
  border:1px solid #e5e7eb;
  font-family:Inter;
  resize:none;
}

</style>

</head>

<body>

<!-- SIDEBAR ORIGINAL (INJETADO) -->
<script src="js/sidebar.js"></script>

<div class="main-content" id="main" style="display:none">

  <div class="card">

    <div class="header">
      <div id="counter">Questão</div>
      <div id="score">0 ✓ | 0 ✗</div>
    </div>

    <div class="progress">
      <div class="progress-fill" id="progress"></div>
    </div>

    <div class="question" id="question"></div>

    <div id="options"></div>

    <!-- BOTÕES CENTRALIZADOS -->
    <div class="actions">
      <button class="secondary" onclick="prev()">Anterior</button>
      <button class="secondary" onclick="next()">Próxima</button>
      <button class="primary" onclick="submitAnswer()">Responder</button>
    </div>

    <!-- COMMENTS SÓ APÓS RESPONDER -->
    <div class="comments-wrapper" id="commentsWrapper">

      <div id="comments"></div>

      <textarea id="commentBox" placeholder="Escreva um comentário..."></textarea>
      <button class="primary" style="margin-top:8px" onclick="sendComment()">
        Enviar comentário
      </button>

    </div>

  </div>

</div>

<script>

let questions=[];
let index=0;
let selected=null;
let answered=false;
let score={c:0,e:0};

/* INIT */
window.onload = async () => {

  const session = await exigirLogin();
  if(!session) return;

  document.getElementById("main").style.display="block";

  const { data } = await db.from("banco_questoes").select("*").limit(30);
  questions=data||[];

  render();
};

/* RENDER */
function render(){

  const q=questions[index];
  if(!q) return;

  selected=null;
  answered=false;

  document.getElementById("commentsWrapper").style.display="none";

  document.getElementById("question").innerText=q.enunciado;

  document.getElementById("counter").innerText=
    `Questão ${index+1} de ${questions.length}`;

  document.getElementById("progress").style.width=
    ((index+1)/questions.length)*100+"%";

  document.getElementById("options").innerHTML=
    ["a","b","c","d"].map(l=>`
      <div class="option" onclick="select('${l}',this)">
        <div class="letter">${l.toUpperCase()}</div>
        <div>${q["alternativa_"+l]}</div>
      </div>
    `).join("");
}

/* SELECT */
function select(l,el){

  if(answered) return;

  selected=l;

  document.querySelectorAll(".option")
    .forEach(o=>o.classList.remove("selected"));

  el.classList.add("selected");
}

/* SUBMIT */
async function submitAnswer(){

  if(answered || !selected) return;

  answered=true;

  const q=questions[index];
  const correct=selected===q.correta;

  document.querySelectorAll(".option").forEach(o=>{
    const l=o.innerText.trim()[0].toLowerCase();

    if(l===q.correta) o.classList.add("correct");
    if(l===selected && !correct) o.classList.add("wrong");
  });

  correct?score.c++:score.e++;

  document.getElementById("score").innerText=
    `${score.c} ✓ | ${score.e} ✗`;

  document.getElementById("commentsWrapper").style.display="block";

  loadComments();
}

/* NAV */
function prev(){ if(index>0){ index--; render(); } }
function next(){ if(index<questions.length-1){ index++; render(); } }

/* COMMENTS */
async function loadComments(){

  const q=questions[index];

  const { data } = await db
    .from("comentarios_questao")
    .select("*")
    .eq("questao_id",q.id)
    .order("created_at",{ascending:false});

  renderComments(data||[]);
}

function renderComments(list){

  const box=document.getElementById("comments");

  if(!list.length){
    box.innerHTML="<p style='color:#888'>Sem comentários</p>";
    return;
  }

  box.innerHTML=list.map(c=>`
    <div class="comment">

      <div class="comment-head">
        <div class="avatar">
          ${(c.nome||"U").charAt(0).toUpperCase()}
        </div>

        <div style="font-size:13px;font-weight:600">
          ${c.nome||"Usuário"}
        </div>
      </div>

      <div style="margin-left:42px;margin-top:6px">
        ${c.conteudo}
      </div>

    </div>
  `).join("");
}

/* SEND */
async function sendComment(){

  const q=questions[index];
  const text=document.getElementById("commentBox").value.trim();

  if(!text) return;

  const { data } = await supabase.auth.getUser();
  const user=data.user;

  await db.from("comentarios_questao").insert({
    questao_id:q.id,
    conteudo:text,
    nome:user?.user_metadata?.nome || user.email
  });

  document.getElementById("commentBox").value="";
  loadComments();
}

</script>

</body>
</html>
