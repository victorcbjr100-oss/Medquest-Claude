<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questões — MedQuest Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-900 flex h-screen overflow-hidden">

    <aside class="w-64 bg-slate-900 text-white flex-shrink-0 flex flex-col shadow-2xl">
        <div class="p-6">
            <h1 class="text-2xl font-bold tracking-tighter text-blue-400">MedQuest Pro</h1>
            <p class="text-xs text-slate-400 mt-1 uppercase tracking-widest">Internato v1.0</p>
        </div>
        <nav class="flex-grow p-4 space-y-2">
            <a href="dashboard.html" class="flex items-center p-3 rounded-xl hover:bg-slate-800 transition-all text-slate-300 hover:text-white group">
                <span class="mr-3">📊</span> Dashboard
            </a>
            <a href="questoes.html" class="flex items-center p-3 rounded-xl bg-blue-600 text-white shadow-lg shadow-blue-900/20">
                <span class="mr-3">📝</span> Questões
            </a>
            <a href="favoritas.html" class="flex items-center p-3 rounded-xl hover:bg-slate-800 transition-all text-slate-300 hover:text-white">
                <span class="mr-3">⭐</span> Favoritas
            </a>
        </nav>
        <div class="p-4 border-t border-slate-800">
            <div class="bg-slate-800 p-4 rounded-2xl">
                <p class="text-xs text-slate-400 italic">"Primum non nocere"</p>
            </div>
        </div>
    </aside>

    <div class="flex-grow flex flex-col overflow-hidden">
        
        <header class="bg-white border-b border-gray-200 p-4 flex justify-between items-center shadow-sm z-10">
            <h2 id="page-title" class="font-bold text-gray-700">Banco de Questões</h2>
            <div class="flex items-center space-x-4">
                <span class="text-sm text-gray-400 italic">Dr. Victor</span>
                <div class="h-8 w-8 rounded-full bg-blue-100 border border-blue-200 flex items-center justify-center text-blue-600 font-bold">V</div>
            </div>
        </header>

        <main class="flex-grow overflow-y-auto p-8 bg-gray-50">
            <div class="max-w-4xl mx-auto">
                <header class="mb-10">
                    <h2 class="text-4xl font-black text-gray-900 tracking-tight">Questões</h2>
                    <p class="text-gray-500 mt-2 text-lg">Pratique com casos clínicos reais do internato.</p>
                </header>

                <div id="questoes-container" class="space-y-8">
                    <div id="loading" class="text-center py-20 bg-white rounded-3xl border border-dashed border-gray-300">
                        <div class="inline-block animate-spin rounded-full h-10 w-10 border-4 border-blue-500 border-t-transparent mb-4"></div>
                        <p class="text-gray-400 font-medium">Sincronizando com o banco de dados...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // CONFIGURAÇÕES SUPABASE
        const SUPA_URL = 'SUA_URL_AQUI';
        const SUPA_KEY = 'SUA_KEY_AQUI';
        const client = supabase.createClient(SUPA_URL, SUPA_KEY);

        async function carregar() {
            const container = document.getElementById('questoes-container');
            const params = new URLSearchParams(window.location.search);
            const t = params.get('tema');
            const s = params.get('subtema');

            let query = client.from('questoes').select('*');

            // Filtros inteligentes: se o tema estiver na URL, ele filtra; se não, traz tudo
            if (t) query = query.eq('tema', t);
            if (s) query = query.eq('subtema', s);

            const { data, error } = await query.order('id', { ascending: false });

            if (error || !data || data.length === 0) {
                container.innerHTML = `
                    <div class="p-10 bg-white rounded-3xl border border-gray-200 text-center">
                        <p class="text-gray-500">Nenhuma questão encontrada para os filtros selecionados.</p>
                        <a href="questoes.html" class="text-blue-600 font-bold mt-4 inline-block">Ver todas as questões</a>
                    </div>`;
                return;
            }

            container.innerHTML = '';

            data.forEach(q => {
                const card = document.createElement('div');
                card.className = "bg-white p-8 rounded-3xl shadow-sm border border-gray-200 hover:shadow-xl hover:border-blue-100 transition-all duration-300";
                
                card.innerHTML = `
                    <div class="flex justify-between items-center mb-6">
                        <span class="px-4 py-1.5 bg-blue-50 text-blue-600 rounded-full text-xs font-black uppercase tracking-widest border border-blue-100">
                            ${q.tema} | ${q.subtema}
                        </span>
                        <span class="text-xs font-mono text-gray-300">ID #${q.id}</span>
                    </div>

                    <p class="text-gray-900 font-bold text-xl leading-relaxed mb-8">${q.pergunta}</p>

                    <div class="space-y-4" id="box-${q.id}">
                        ${q.opcoes.map((opt, i) => `
                            <button onclick="check(${q.id}, ${i}, ${parseInt(q.resposta)})" 
                                class="w-full text-left p-5 rounded-2xl border border-gray-100 hover:bg-slate-50 hover:border-blue-200 transition-all flex items-center group">
                                <span id="idx-${q.id}-${i}" class="w-11 h-11 flex-shrink-0 flex items-center justify-center rounded-full bg-gray-100 text-gray-500 font-black mr-5 group-hover:bg-blue-600 group-hover:text-white transition-all shadow-sm">
                                    ${String.fromCharCode(65 + i)}
                                </span>
                                <span class="text-gray-700 font-semibold text-lg">${opt}</span>
                            </button>
                        `).join('')}
                    </div>
                    <div id="fb-${q.id}" class="mt-6 hidden p-6 rounded-2xl font-bold border-2 animate-bounce-short"></div>
                `;
                container.appendChild(card);
            });
        }

        function check(id, userIdx, correctIdx) {
            const fb = document.getElementById(`fb-${id}`);
            const btns = document.querySelectorAll(`#box-${id} button`);
            btns.forEach(b => b.disabled = true);
            fb.classList.remove('hidden');

            if (userIdx === correctIdx) {
                fb.className = "mt-6 p-6 rounded-2xl bg-green-50 text-green-700 border-green-200 font-bold flex items-center";
                fb.innerHTML = `<span>✅ Resposta Correta! Ótimo desempenho.</span>`;
                paint(id, userIdx, 'win');
            } else {
                fb.className = "mt-6 p-6 rounded-2xl bg-red-50 text-red-700 border-red-200 font-bold flex flex-col";
                fb.innerHTML = `<span>❌ Incorreto. A alternativa correta era a ${String.fromCharCode(65 + correctIdx)}.</span>`;
                paint(id, userIdx, 'lose');
                paint(id, correctIdx, 'win');
            }
        }

        function paint(id, idx, type) {
            const circle = document.getElementById(`idx-${id}-${idx}`);
            if (type === 'win') {
                circle.className = "w-11 h-11 flex-shrink-0 flex items-center justify-center rounded-full bg-green-500 text-white font-black mr-5 shadow-lg shadow-green-200";
            } else {
                circle.className = "w-11 h-11 flex-shrink-0 flex items-center justify-center rounded-full bg-red-500 text-white font-black mr-5 shadow-lg shadow-red-200";
            }
        }

        carregar();
    </script>

    <style>
        .animate-bounce-short { animation: bounce 0.5s ease-in-out 1; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        /* Custom scrollbar para parecer mais moderno */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</body>
</html>
