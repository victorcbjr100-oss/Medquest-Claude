<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MedQuest — Elite</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter;
  background:#f6f7fb;
  color:#0f172a;
}

/* CONTAINER */
.wrap{
  max-width:900px;
  margin:0 auto;
  padding:24px;
}

/* HEADER INFO */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:12px;
  font-size:13px;
  color:#64748b;
}

/* PROGRESS */
.progress{
  height:8px;
  background:#e2e8f0;
  border-radius:999px;
  overflow:hidden;
  margin-bottom:18px;
}

.progress-bar{
  height:100%;
  width:0%;
  background:#2563eb;
  transition:.3s;
}

/* CARD */
.card{
  background:#fff;
  border:1px solid #e5e7eb;
  border-radius:16px;
  padding:20px;
  box-shadow:0 10px 30px rgba(0,0,0,.05);
}

/* BADGES */
.badges{
  display:flex;
  gap:8px;
  margin-bottom:10px;
}

.badge{
  font-size:12px;
  padding:4px 10px;
  border-radius:999px;
  border:1px solid #e5e7eb;
}

.badge.med{
  border-color:#facc15;
  color:#b45309;
}

/* QUESTION */
.question{
  font-size:17px;
  font-weight:600;
  line-height:1.5;
  margin:12px 0 18px;
}

/* OPTIONS */
.option{
  border:1px solid #e5e7eb;
  padding:12px;
  border-radius:12px;
  margin-top:10px;
  cursor:pointer;
  transition:.2s;
  display:flex;
  gap:10px;
  align-items:flex-start;
}

.option:hover{
  border-color:#93c5fd;
  background:#f8fafc;
}

.letter{
  width:28px;
  height:28px;
  border-radius:50%;
  border:1px solid #cbd5e1;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  font-size:13px;
  flex-shrink:0;
}

.correct{
  border:2px solid #16a34a !important;
  background:#ecfdf5;
}

.wrong{
  border:2px solid #dc2626 !important;
  background:#fef2f2;
}

/* NAV */
.nav{
  display:flex;
  justify-content:space-between;
  margin-top:18px;
}

button{
  font-family:Inter;
  border:none;
  cursor:pointer;
  padding:10px 14px;
  border-radius:10px;
  font-weight:600;
}

.btn{
  background:#2563eb;
  color:#fff;
}

.btn2{
  background:#fff;
  border:1px solid #e5e7eb;
}

/* FEEDBACK */
.feedback{
  display:none;
  margin-top:18px;
  border-top:1px solid #e5e7eb;
  padding-top:14px;
  animation:fade .2s ease;
}

@keyframes fade{
  from{opacity:0;transform:translateY(5px)}
  to{opacity:1;transform:translateY(0)}
}

/* TABS */
.tabs{
  display:flex;
  gap:8px;
  margin-bottom:10px;
}

.tab{
  font-size:12px;
  padding:5px 10px;
  border-radius:999px;
  border:1px solid #e5e7eb;
  cursor:pointer;
}

.tab.active{
  background:#2563eb;
  color:#fff;
  border-color:#2563eb;
}

/* COMMENTS */
.comment{
  padding:12px 0;
  border-bottom:1px solid #eee;
}

.user{
  display:flex;
  gap:10px;
  align-items:center;
}

.avatar{
  width:32px;
  height:32px;
  border-radius:50%;
  background:#2563eb;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  font-size:13px;
}

textarea{
  width:100%;
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  border:1px solid #e5e7eb;
  font-family:Inter;
  resize:none;
}
</style>

</head>

<body>

<div class="wrap">

  <div class="header">
    <div id="counter">Questão 1 de 1</div>
    <div id="score">0 ✓ | 0 ✗</div>
  </div>

  <div class="progress">
    <div class="progress-bar" id="progress"></div>
  </div>

  <div class="card">

    <div class="badges">
      <span class="badge">Anestesiologia</span>
      <span class="badge med">Médio</span>
    </div>

    <div class="question" id="q"></div>

    <div id="options"></div>

    <div class="nav">
      <button class="btn2" onclick="prev()">Anterior</button>
      <button class="btn2" onclick="skip()">Pular</button>
      <button class="btn" onclick="next()">Próxima</button>
    </div>

    <div class="feedback" id="feedback">

      <div class="tabs">
        <div class="tab active" onclick="setTab('aluno')">Alunos</div>
        <div class="tab" onclick="setTab('prof')">Professor</div>
      </div>

      <div id="comments"></div>

      <textarea id="txt" placeholder="Escreva um comentário..."></textarea>
      <button class="btn" style="margin-top:8px" onclick="sendComment()">Enviar</button>

    </div>

  </div>

</div>

<script>

let qIndex = 0;
let questions = [];
let answered = false;
let tab = "aluno";
let score = {c:0,e:0};

/* INIT */
window.onload = async () => {

  const { data } = await db.from("banco_questoes").select("*").limit(30);
  questions = data || [];

  render();
};

/* RENDER */
function render(){

  const q = questions[qIndex];
  if(!q) return;

  answered = false;

  document.getElementById("q").innerText = q.enunciado;

  document.getElementById("counter").innerText =
    `Questão ${qIndex+1} de ${questions.length}`;

  document.getElementById("progress").style.width =
    ((qIndex+1)/questions.length)*100 + "%";

  document.getElementById("options").innerHTML =
    ["a","b","c","d","e"].map(l => `
      <div class="option" onclick="answer('${l}', this)">
        <div class="letter">${l.toUpperCase()}</div>
        <div>${q["alternativa_"+l]}</div>
      </div>
    `).join("");

  document.getElementById("feedback").style.display = "none";
}

/* ANSWER */
async function answer(l, el){

  if(answered) return;
  answered = true;

  const q = questions[qIndex];
  const correct = l === q.correta;

  document.getElementById("feedback").style.display = "block";

  document.querySelectorAll(".option").forEach(o=>{
    const letter = o.innerText.trim()[0].toLowerCase();

    if(letter === q.correta) o.classList.add("correct");
    if(o === el && !correct) o.classList.add("wrong");
  });

  correct ? score.c++ : score.e++;

  document.getElementById("score").innerText =
    `${score.c} ✓ | ${score.e} ✗`;

  loadComments();
}

/* NAV */
function prev(){ if(qIndex>0){ qIndex--; render(); } }
function skip(){ if(qIndex<questions.length-1){ qIndex++; render(); } }
function next(){ if(qIndex<questions.length-1){ qIndex++; render(); } }

/* COMMENTS */
function setTab(t){
  tab = t;
  loadComments();
}

async function loadComments(){

  const q = questions[qIndex];

  const { data } = await db
    .from("comentarios_questao")
    .select("*")
    .eq("questao_id", q.id)
    .eq("tipo", tab)
    .order("created_at", { ascending:false });

  renderComments(data || []);
}

function renderComments(list){

  const box = document.getElementById("comments");

  if(!list.length){
    box.innerHTML = "<p style='color:#888'>Sem comentários</p>";
    return;
  }

  box.innerHTML = list.map(c=>`
    <div class="comment">
      <div class="user">
        <div class="avatar">${c.tipo==="prof"?"P":"A"}</div>
        <div style="font-size:12px;color:#555">
          ${new Date(c.created_at).toLocaleString()}
        </div>
      </div>
      <div style="margin-left:42px;margin-top:6px">
        ${c.conteudo}
      </div>
    </div>
  `).join("");
}

/* SEND */
async function sendComment(){

  const q = questions[qIndex];
  const text = document.getElementById("txt").value.trim();

  if(!text) return;

  await db.from("comentarios_questao").insert({
    questao_id: q.id,
    conteudo: text,
    tipo: tab
  });

  document.getElementById("txt").value = "";
  loadComments();
}

</script>

</body>
</html>
