<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Questões — MedQuest Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: #f8fafc; font-family: 'Inter', sans-serif; margin: 0; display: flex; }
    .main-content { flex: 1; max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }
    
    .questao-card { 
      background: #fff; 
      border: 1px solid #e2e8f0; 
      border-radius: 20px; 
      padding: 2rem; 
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); 
      margin-bottom: 2rem; 
      position: relative;
    }

    .badge { padding: 5px 12px; border-radius: 99px; background: #eff6ff; color: #2563eb; font-size: 0.8rem; font-weight: 700; margin-right: 10px; }
    .dificuldade { font-size: 0.8rem; font-weight: 600; color: #64748b; }

    .enunciado { font-size: 1.15rem; color: #1e293b; line-height: 1.6; margin: 1.5rem 0; font-weight: 500; }

    .opcoes-container { display: flex; flex-direction: column; gap: 12px; }
    .opcao-btn { 
      padding: 15px 20px; 
      border: 2px solid #f1f5f9; 
      border-radius: 12px; 
      background: #fff; 
      text-align: left; 
      cursor: pointer; 
      font-size: 1rem; 
      transition: 0.2s; 
      color: #475569;
    }
    .opcao-btn:hover { border-color: #cbd5e1; background: #f8fafc; }
    .opcao-btn.correta { background: #dcfce7; border-color: #22c55e; color: #166534; font-weight: 600; }
    .opcao-btn.errada { background: #fee2e2; border-color: #ef4444; color: #991b1b; }

    .btn-favoritar { 
      position: absolute; top: 20px; right: 20px; 
      background: none; border: none; font-size: 1.5rem; 
      cursor: pointer; transition: transform 0.2s; 
    }
    .btn-favoritar:active { transform: scale(1.3); }

    .comentario { 
      margin-top: 1.5rem; padding: 1rem; background: #f0f9ff; 
      border-radius: 12px; border-left: 5px solid #0ea5e9; 
      display: none; font-size: 0.95rem; color: #0369a1; 
    }
  </style>
</head>
<body>

<script src="js/sidebar.js"></script>

<main class="main-content">
  <header style="margin-bottom: 2rem;">
    <h1 style="font-weight: 800; color: #1e293b;">Banco de Questões</h1>
    <p style="color: #64748b;">9º Período — Preparação para Enare 2027</p>
  </header>

  <div id="questoes-container">
    </div>
</main>

<script>
async function carregarQuestoes() {
    const container = document.getElementById('questoes-container');
    
    const { data: questoes, error } = await window.supabaseClient
        .from('questoes')
        .select('*')
        .order('id', { ascending: false });

    if (error) {
        container.innerHTML = "Erro ao carregar questões.";
        return;
    }

    container.innerHTML = questoes.map(q => renderizarQuestao(q)).join('');
}

function renderizarQuestao(q) {
    const opcoes = typeof q.opcoes === 'string' ? JSON.parse(q.opcoes) : q.opcoes;
    const estrela = q.favorita ? '⭐' : '☆';

    return `
        <div class="questao-card" id="q-${q.id}">
            <button class="btn-favoritar" id="fav-${q.id}" onclick="toggleFavorito('${q.id}', ${q.favorita})">
                ${estrela}
            </button>
            <div>
                <span class="badge">${q.tema}</span>
                <span class="dificuldade">${q.subtema} • ${q.dificuldade.toUpperCase()}</span>
            </div>
            <div class="enunciado">${q.pergunta}</div>
            
            <div class="opcoes-container">
                ${opcoes.map((opt, index) => `
                    <button class="opcao-btn" onclick="verificarResposta(this, ${index}, ${q.resposta}, '${q.id}')">
                        ${opt}
                    </button>
                `).join('')}
            </div>

            <div class="comentario" id="coment-${q.id}">
                <strong>Explicação técnica:</strong><br>
                ${q.comentario || 'Comentário em breve.'}
            </div>
        </div>
    `;
}

async function toggleFavorito(id, statusAtual) {
    const novoStatus = !statusAtual;
    
    // Atualiza no Banco
    const { error } = await window.supabaseClient
        .from('questoes')
        .update({ favorita: novoStatus })
        .eq('id', id);

    if (!error) {
        // Atualiza o ícone e a função para o próximo clique
        const btn = document.getElementById(`fav-${id}`);
        btn.innerText = novoStatus ? '⭐' : '☆';
        btn.setAttribute('onclick', `toggleFavorito('${id}', ${novoStatus})`);
        console.log(`Questão ${id} atualizada para: ${novoStatus}`);
    } else {
        alert("Erro ao favoritar. Verifique sua conexão.");
    }
}

function verificarResposta(btn, indexEscolhido, indexCorreto, id) {
    const container = btn.parentElement;
    const botoes = container.querySelectorAll('.opcao-btn');
    const comentario = document.getElementById(`coment-${id}`);

    botoes.forEach(b => b.disabled = true); // Trava as opções

    if (indexEscolhido === indexCorreto) {
        btn.classList.add('correta');
    } else {
        btn.classList.add('errada');
        botoes[indexCorreto].classList.add('correta');
    }

    comentario.style.display = 'block';
}

window.onload = carregarQuestoes;
</script>

</body>
</html>
