<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questões — MedQuest Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --bg-body: #f8fafc;
            --surface: #fff;
            --primary: #2563eb;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius-lg: 16px;
        }
        body { background: var(--bg-body); font-family: 'Inter', sans-serif; }
        
        /* Ajuste para o conteúdo não ficar colado na sidebar */
        .main-content { max-width: 900px; margin: 0 auto; padding: 2.5rem 1.5rem; }
        
        /* Estética Premium dos Cards de Questões */
        .question-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 2rem;
            margin-bottom: 2rem;
            transition: 0.25s;
        }
        .question-card:hover { border-color: var(--primary); box-shadow: 0 8px 24px rgba(0,0,0,0.05); }
        
        .circle-letter {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: #f1f5f9;
            color: var(--text-muted);
            font-weight: 800;
            margin-right: 1.25rem;
            flex-shrink: 0;
            transition: 0.2s;
        }
        
        .opt-btn {
            width: 100%;
            display: flex;
            align-items: center;
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid transparent;
            background: transparent;
            cursor: pointer;
            text-align: left;
            transition: 0.2s;
        }
        .opt-btn:hover { background: #f8fafc; border-color: var(--border); }
        .opt-btn:hover .circle-letter { background: var(--primary); color: #fff; }

        /* Feedback Colors */
        .is-correct { background: #dcfce7 !important; color: #166534 !important; }
        .is-wrong { background: #fee2e2 !important; color: #991b1b !important; }
    </style>
</head>
<body>
    <script src="js/auth.js"></script>
    <script src="js/sidebar.js"></script>

    <main class="main-content" id="main" style="display:none">
        <div class="page-header" style="margin-bottom: 2.5rem">
            <h1 style="font-size: 2rem; font-weight: 800; color: var(--text-main)">Banco de Questões</h1>
            <p id="subtitulo-filtro" style="color: var(--text-muted)">Resolva os casos clínicos e acompanhe seu desempenho.</p>
        </div>

        <div id="questoes-container">
            <div class="text-center py-10 text-gray-400">Sincronizando banco de dados...</div>
        </div>
    </main>

    <script>
        window.addEventListener('load', async () => {
            // Segue o padrão exigido pelas suas páginas
            const session = await exigirLogin(); 
            if(!session) return;
            document.getElementById('main').style.display = 'block';

            const sb = window.supabaseClient;
            const container = document.getElementById('questoes-container');
            
            // Filtros da URL
            const params = new URLSearchParams(window.location.search);
            const tema = params.get('tema');
            const subtema = params.get('subtema');

            if(tema) document.getElementById('subtitulo-filtro').innerText = `Focando em: ${tema} ${subtema ? '> ' + subtema : ''}`;

            let query = sb.from('questoes').select('*');
            if(tema) query = query.eq('tema', tema);
            if(subtema) query = query.eq('subtema', subtema);

            const { data: questoes, error } = await query.order('id', { ascending: false });

            if(error || !questoes || questoes.length === 0) {
                container.innerHTML = `<div class="text-center py-10 color: var(--text-muted)">Nenhuma questão encontrada.</div>`;
                return;
            }

            container.innerHTML = '';

            questoes.forEach(q => {
                const div = document.createElement('div');
                div.className = 'question-card';
                div.innerHTML = `
                    <div style="display: flex; justify-content: space-between; margin-bottom: 1rem">
                        <span style="font-size: 0.7rem; font-weight: 800; color: var(--primary); text-transform: uppercase; letter-spacing: 1px">
                            ${q.tema} | ${q.subtema}
                        </span>
                        <span style="font-size: 0.7rem; color: var(--text-muted)">ID #${q.id}</span>
                    </div>
                    
                    <h3 style="font-size: 1.15rem; font-weight: 700; color: var(--text-main); line-height: 1.5; margin-bottom: 2rem">
                        ${q.pergunta}
                    </h3>

                    <div id="opcoes-${q.id}" style="display: flex; flex-direction: column; gap: 0.75rem">
                        ${q.opcoes.map((opt, i) => `
                            <button class="opt-btn" onclick="verificar(${q.id}, ${i}, ${parseInt(q.resposta)})">
                                <div class="circle-letter" id="letter-${q.id}-${i}">${String.fromCharCode(65 + i)}</div>
                                <div style="font-weight: 600; color: var(--text-main); font-size: 0.95rem">${opt}</div>
                            </button>
                        `).join('')}
                    </div>
                    <div id="fb-${q.id}" style="margin-top: 1.5rem; display: none; padding: 1rem; border-radius: 12px; font-weight: 700; font-size: 0.9rem"></div>
                `;
                container.appendChild(div);
            });
        });

        function verificar(id, userIdx, correctIdx) {
            const btns = document.querySelectorAll(`#opcoes-${id} .opt-btn`);
            const fb = document.getElementById(`fb-${id}`);
            
            btns.forEach(b => b.disabled = true);
            fb.style.display = 'block';

            if(userIdx === correctIdx) {
                fb.style.background = '#dcfce7';
                fb.style.color = '#166534';
                fb.innerText = '✅ Resposta correta!';
                paint(id, userIdx, 'correct');
            } else {
                fb.style.background = '#fee2e2';
                fb.style.color = '#991b1b';
                fb.innerText = `❌ Incorreto. A correta era a letra ${String.fromCharCode(65 + correctIdx)}.`;
                paint(id, userIdx, 'wrong');
                paint(id, correctIdx, 'correct');
            }
        }

        function paint(id, idx, status) {
            const letter = document.getElementById(`letter-${id}-${idx}`);
            if(status === 'correct') {
                letter.classList.add('is-correct');
            } else {
                letter.classList.add('is-wrong');
            }
        }
    </script>
</body>
</html>
