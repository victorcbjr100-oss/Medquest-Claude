<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Questões — MedQuest</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

<style>
.main-content{
  max-width: 900px;
  margin: 0 auto;
  padding: 2rem 1.5rem;
}

.card{
  background: #fff;
  border: 1px solid #e5e7eb;
  border-radius: 16px;
  padding: 1.5rem;
  box-shadow: 0 6px 20px rgba(0,0,0,.05);
}

.questao-header{
  font-weight:700;
  font-size:1.05rem;
  margin-bottom:1.2rem;
}

.alternativa{
  padding: 12px;
  border: 1px solid #e5e7eb;
  border-radius: 10px;
  margin-top: 10px;
  cursor: pointer;
  transition: .2s;
  background:#fff;
}

.alternativa:hover{
  background:#f8fafc;
  border-color:#cbd5e1;
}

.correta{ background:#dcfce7; border-color:#16a34a; }
.errada{ background:#fee2e2; border-color:#dc2626; }

.botoes{
  display:flex;
  gap:10px;
  margin-top:1.5rem;
}

.btn{
  padding:.55rem 1rem;
  border-radius:10px;
  border:none;
  cursor:pointer;
  font-weight:600;
  font-family:Inter;
}

.btn-primary{ background:#2563eb; color:#fff; }
.btn-outline{ background:#fff; border:1px solid #e5e7eb; }

#feedback-area{
  margin-top:1.5rem;
  display:none;
  border-top:1px solid #eee;
  padding-top:1rem;
}

.tabs{
  display:flex;
  gap:10px;
  margin-bottom:10px;
}

.tab{
  padding:6px 12px;
  border-radius:20px;
  border:1px solid #e5e7eb;
  cursor:pointer;
  font-size:13px;
}

.tab.active{
  background:#2563eb;
  color:#fff;
  border-color:#2563eb;
}

.comentario{
  padding:10px;
  border-bottom:1px solid #eee;
}

.comentario strong{
  font-size:13px;
}

.comentario small{
  color:#666;
  font-size:11px;
}

.reply{
  margin-left:20px;
  border-left:2px solid #eee;
  padding-left:10px;
  margin-top:8px;
}
</style>
</head>

<body>

<script src="js/auth.js"></script>
<script src="js/sidebar.js"></script>

<main class="main-content" id="main" style="display:none">

  <h2 id="titulo" style="font-weight:800; margin-bottom:1rem;">Questões</h2>

  <div class="card">

    <div class="questao-header" id="enunciado"></div>

    <div id="alternativas"></div>

    <div class="botoes">
      <button class="btn btn-outline" onclick="voltar()">⬅️ Voltar</button>
      <button class="btn btn-outline" onclick="pular()">⏭️ Pular</button>
      <button class="btn btn-primary" onclick="proxima()">✔️ Próxima</button>
    </div>

    <div id="feedback-area">

      <div class="tabs">
        <div class="tab active" onclick="setTab('alunos')">Alunos</div>
        <div class="tab" onclick="setTab('prof')">Professor</div>
      </div>

      <div id="comentarios"></div>

      <div style="margin-top:10px;">
        <textarea id="novoComentario" class="form-textarea" placeholder="Escreva um comentário..."></textarea>
        <button class="btn btn-primary" style="margin-top:8px;" onclick="enviarComentario()">Enviar</button>
      </div>

    </div>

  </div>

</main>

<script>
let questoes = [];
let atual = 0;
let respondeu = false;
let tema = null;
let subtema = null;
let tabAtual = 'alunos';

// LOGIN
window.addEventListener('load', async () => {
  const session = await exigirLogin();
  if(!session) return;

  document.getElementById('main').style.display = 'block';

  const params = new URLSearchParams(window.location.search);
  tema = params.get('tema');
  subtema = params.get('subtema');

  carregarQuestoes();
});

// QUESTÕES
async function carregarQuestoes(){
  let query = db.from('banco_questoes').select('*');

  if(tema) query = query.ilike('tema', tema);
  if(subtema) query = query.ilike('subtema', subtema);

  const { data } = await query.limit(20);

  questoes = data || [];
  mostrarQuestao();
}

// MOSTRAR
function mostrarQuestao(){
  respondeu = false;

  const q = questoes[atual];

  document.getElementById('enunciado').innerText = q.enunciado;

  document.getElementById('alternativas').innerHTML =
    ['a','b','c','d'].map(l => `
      <div class="alternativa" onclick="responder('${l}', this)">
        ${l.toUpperCase()}) ${q['alternativa_'+l]}
      </div>
    `).join('');

  document.getElementById('feedback-area').style.display = 'none';
}

// RESPOSTA
async function responder(letra, el){
  if(respondeu) return;
  respondeu = true;

  const q = questoes[atual];
  const correta = letra === q.correta;

  document.getElementById('feedback-area').style.display = 'block';

  document.querySelectorAll('.alternativa').forEach(div=>{
    const l = div.innerText.trim()[0].toLowerCase();
    if(l === q.correta) div.classList.add('correta');
    if(div === el && !correta) div.classList.add('errada');
  });

  const user = (await supabase.auth.getUser()).data.user;

  await db.from('respostas_usuario').insert({
    user_id: user.id,
    questao_id: q.id,
    resposta_marcada: letra,
    correta
  });

  carregarComentarios();
}

// NAVEGAÇÃO
function voltar(){
  if(atual > 0){
    atual--;
    mostrarQuestao();
  }
}

function pular(){
  if(atual < questoes.length - 1){
    atual++;
    mostrarQuestao();
  }
}

function proxima(){
  if(atual < questoes.length - 1){
    atual++;
    mostrarQuestao();
  }
}

// COMENTÁRIOS
function setTab(tab){
  tabAtual = tab;
  carregarComentarios();
}

async function carregarComentarios(){
  const q = questoes[atual];

  const { data } = await db
    .from('comentarios_questao')
    .select('*')
    .eq('questao_id', q.id)
    .order('created_at', { ascending:false });

  renderComentarios(data || []);
}

function renderComentarios(comentarios){
  document.getElementById('comentarios').innerHTML =
    comentarios.map(c => `
      <div class="comentario">
        <strong>${c.tipo === 'professor' ? '👨‍🏫 Professor' : '👤 Aluno'}</strong><br>
        <small>${new Date(c.created_at).toLocaleString()}</small>
        <div>${c.conteudo}</div>
      </div>
    `).join('');
}

async function enviarComentario(){
  const q = questoes[atual];
  const user = (await supabase.auth.getUser()).data.user;

  await db.from('comentarios_questao').insert({
    questao_id: q.id,
    user_id: user.id,
    conteudo: document.getElementById('novoComentario').value,
    tipo: 'aluno'
  });

  document.getElementById('novoComentario').value = '';
  carregarComentarios();
}
</script>

</body>
</html>
