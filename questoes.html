<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>MedQuest — Questões</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    
    <script src="js/sidebar.js" defer></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #f6f7fb;
            color: #111;
            display: flex;
        }

        /* ================= CONTEÚDO PRINCIPAL ================= */
        #app {
            margin-left: 260px; /* Espaço para a sidebar fixa */
            width: calc(100% - 260px);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 30px;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 850px;
        }

        .card {
            background: #fff;
            border: 1px solid #e8e8e8;
            border-radius: 14px;
            padding: 30px;
            box-shadow: 0 6px 18px rgba(0,0,0,.05);
        }

        .question {
            font-size: 18px;
            font-weight: 600;
            line-height: 1.6;
            margin-bottom: 24px;
            color: #1f2937;
        }

        .option {
            padding: 14px 16px;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            margin-top: 12px;
            cursor: pointer;
            transition: all .2s ease;
            background: #fff;
            font-size: 15px;
            color: #374151;
            display: flex;
            align-items: center;
        }

        .option:hover { background: #f9fafb; border-color: #d1d5db; }

        .option.selected { border-color: #2563eb; background-color: #eff6ff; }

        .option.correct { border: 2px solid #16a34a; background: #f0fdf4; color: #166534; }

        .option.wrong { border: 2px solid #dc2626; background: #fef2f2; color: #991b1b; }

        .actions {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #f3f4f6;
        }

        .nav-buttons { display: flex; gap: 10px; }

        button {
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            padding: 12px 20px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }

        .primary { background: #2563eb; color: #fff; }
        .primary:hover { background: #1d4ed8; }
        .secondary { background: #fff; border: 1px solid #e5e7eb; color: #374151; }

        /* ================= COMENTÁRIOS ================= */
        #feedback {
            margin-top: 30px;
            display: none;
            background: #f8fafc;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid #e2e8f0;
        }

        .comment { padding: 16px 0; border-bottom: 1px solid #e2e8f0; }
        .comment:last-child { border-bottom: none; }
        .comment-header { display: flex; gap: 12px; align-items: center; }
        .avatar {
            width: 36px; height: 36px; border-radius: 50%;
            background: #2563eb; color: #fff;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 14px;
        }
        .comment-name { font-weight: 600; font-size: 14px; color: #0f172a; }
        .comment-date { font-size: 12px; color: #64748b; }
        .comment-text { margin-left: 48px; margin-top: 8px; font-size: 14px; color: #334155; }
        .reply-btn { margin-left: 48px; font-size: 12px; color: #2563eb; cursor: pointer; font-weight: 600; }
        
        .comment-box {
            display: flex; flex-direction: column; gap: 10px; margin-top: 20px;
            background: #fff; padding: 16px; border-radius: 10px; border: 1px solid #e2e8f0;
        }

        textarea {
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #cbd5e1;
            font-family: 'Inter', sans-serif; resize: vertical; min-height: 80px; box-sizing: border-box;
        }

        @media (max-width: 768px) {
            #app { margin-left: 0; width: 100%; padding: 20px 15px; }
        }
    </style>
</head>

<body>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <div class="sidebar-brand-icon">MQ</div>
            <div class="sidebar-brand-name">MedQuest</div>
        </div>
        <div id="sidebar-menu">
            </div>
        <div class="sidebar-footer">
            <div class="sidebar-user-card">
                <div class="sidebar-avatar" id="sb-avatar">?</div>
                <div class="sidebar-user-info">
                    <div class="sidebar-user-name" id="sb-nome">Carregando...</div>
                    <div class="sidebar-user-email" id="sb-email"></div>
                </div>
            </div>
        </div>
    </aside>

    <main id="app" style="display:none">
        <div class="container">
            <div class="card">
                <div class="question" id="question"></div>
                <div id="options"></div>

                <div class="actions">
                    <div class="nav-buttons">
                        <button class="secondary" onclick="prev()">⬅ Anterior</button>
                        <button class="secondary" onclick="next()">Próxima ➜</button>
                    </div>
                    <button class="primary" onclick="confirm()">Responder</button>
                </div>

                <div id="feedback">
                    <h3>Discussão da Questão</h3>
                    <div id="comments"></div>
                    <div class="comment-box">
                        <textarea id="newComment" placeholder="Ficou com dúvida? Escreva um comentário..."></textarea>
                        <button class="primary" style="align-self: flex-end;" onclick="sendComment()">Enviar comentário</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

<script>
let qs = [];
let i = 0;
let selected = null;
let answered = false;

// Inicialização da página
window.addEventListener("load", async () => {
    if (typeof exigirLogin === "function") await exigirLogin();
    
    document.getElementById("app").style.display = "flex";

    // Carrega questões do banco (db vem do supabase.js)
    if (typeof db !== "undefined") {
        try {
            const { data, error } = await db.from("banco_questoes").select("*").limit(30);
            if (error) throw error;
            qs = data || [];
            if(qs.length > 0) render();
        } catch (err) {
            console.error("Erro ao carregar questões:", err);
        }
    }
});

function render(){
    selected = null;
    answered = false;
    const q = qs[i];
    document.getElementById("question").innerText = q.enunciado;
    document.getElementById("options").innerHTML = ["a","b","c","d"].map(l => `
        <div class="option" onclick="selectOpt('${l}', this)">
            <strong>${l.toUpperCase()})</strong> &nbsp;${q["alternativa_"+l]}
        </div>
    `).join("");
    document.getElementById("feedback").style.display = "none";
}

function selectOpt(letter, el){
    if(answered) return;
    selected = { letter, el };
    document.querySelectorAll(".option").forEach(o => o.classList.remove("selected"));
    el.classList.add("selected");
}

async function confirm(){
    if(!selected || answered) return;
    answered = true;

    const q = qs[i];
    const correct = selected.letter === q.correta;
    document.getElementById("feedback").style.display = "block";

    document.querySelectorAll(".option").forEach(o => {
        const textOption = o.innerText.trim();
        const l = textOption.toLowerCase();
        if(l === q.correta) o.classList.add("correct");
        if(o === selected.el && !correct) o.classList.add("wrong");
    });

    // Salva resposta
    const { data } = await supabase.auth.getUser();
    if (data?.user) {
        await db.from("respostas_usuario").insert({
            user_id: data.user.id,
            questao_id: q.id,
            resposta_marcada: selected.letter,
            correta: correct
        });
    }
    loadComments();
}

function prev(){ if(i>0){ i--; render(); } }
function next(){ if(i<qs.length-1){ i++; render(); } }

// --- LÓGICA DE COMENTÁRIOS ---

async function loadComments(){
    const q = qs[i];
    const { data, error } = await db
        .from("comentarios_questao")
        .select("*")
        .eq("questao_id", q.id)
        .order("created_at", { ascending: false });

    if (!error) renderComments(data || []);
}

function renderComments(cms){
    const box = document.getElementById("comments");
    box.innerHTML = cms.map(c => `
        <div class="comment">
            <div class="comment-header">
                <div class="avatar">${(c.user_name || "U").toUpperCase()}</div>
                <div>
                    <div class="comment-name">${c.user_name || "Usuário"}</div>
                    <div class="comment-date">${new Date(c.created_at).toLocaleString('pt-BR')}</div>
                </div>
            </div>
            <div class="comment-text">${c.conteudo}</div>
        </div>
    `).join("");
}

async function sendComment(){
    const textEl = document.getElementById("newComment");
    const text = textEl.value.trim();
    if(!text) return;

    // Pega usuário atual do Supabase
    const { data, error: userError } = await supabase.auth.getUser();
    
    if (userError || !data.user) {
        alert("Você precisa estar logado para comentar.");
        return;
    }

    const user = data.user;
    const userName = user.user_metadata?.nome || user.email.split('@');

    const { error } = await db.from("comentarios_questao").insert({
        questao_id: qs[i].id,
        user_id: user.id,
        user_name: userName,
        conteudo: text
    });

    if (error) {
        console.error("Erro ao enviar:", error);
        alert("Erro ao enviar comentário.");
    } else {
        textEl.value = "";
        loadComments(); // Recarrega a lista
    }
}
</script>

</body>
</html>
