<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MedQuest — Elite</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter;
  background:#f6f7fb;
  color:#111;
}

/* CONTAINER */
.container{
  max-width:900px;
  margin:0 auto;
  padding:28px;
}

/* CARD */
.card{
  background:#fff;
  border:1px solid #e8e8e8;
  border-radius:16px;
  padding:22px;
  box-shadow:0 8px 24px rgba(0,0,0,.05);
}

/* QUESTÃO */
.question{
  font-size:18px;
  font-weight:600;
  margin-bottom:16px;
}

/* OPTIONS */
.option{
  padding:12px;
  border:1px solid #e5e7eb;
  border-radius:12px;
  margin-top:10px;
  cursor:pointer;
  transition:.2s;
}

.option:hover{ background:#f9fafb; }

.option.selected{
  border:2px solid #2563eb;
  background:#eff6ff;
}

.correct{
  border:2px solid #16a34a !important;
  background:#f0fdf4 !important;
}

.wrong{
  border:2px solid #dc2626 !important;
  background:#fef2f2 !important;
}

/* BOTÕES */
.actions{
  display:flex;
  justify-content:center;
  gap:12px;
  margin-top:18px;
}

button{
  font-family:Inter;
  font-weight:600;
  border:none;
  border-radius:10px;
  padding:10px 14px;
  cursor:pointer;
}

.primary{ background:#2563eb; color:#fff; }
.secondary{ background:#fff; border:1px solid #e5e7eb; }

/* FEEDBACK */
#feedback{
  margin-top:20px;
  display:none;
}

/* COMENTÁRIOS */
.comment-box{
  margin-top:16px;
  border-top:1px solid #eee;
  padding-top:16px;
}

.comment{
  padding:12px 0;
  border-bottom:1px solid #f1f1f1;
}

.comment-header{
  display:flex;
  gap:10px;
  align-items:center;
}

.avatar{
  width:32px;
  height:32px;
  border-radius:50%;
  background:#2563eb;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  font-size:13px;
}

.reply{
  margin-left:42px;
  border-left:2px solid #eee;
  padding-left:10px;
  margin-top:8px;
}

textarea{
  width:100%;
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  border:1px solid #e5e7eb;
  font-family:Inter;
  resize:none;
}

.tab{
  display:inline-block;
  padding:6px 10px;
  border-radius:999px;
  border:1px solid #ddd;
  font-size:12px;
  cursor:pointer;
  margin-right:6px;
}

.tab.active{
  background:#2563eb;
  color:#fff;
  border-color:#2563eb;
}

.small-btn{
  font-size:12px;
  background:none;
  border:none;
  color:#2563eb;
  cursor:pointer;
  margin-left:42px;
}
</style>
</head>

<body>

<!-- 🔥 SUA SIDEBAR ORIGINAL (NÃO ALTERADA) -->
<script src="js/sidebar.js"></script>

<div class="container" id="app" style="display:none">

  <div class="card">

    <div class="question" id="question"></div>

    <div id="options"></div>

    <div class="actions">
      <button class="secondary" onclick="prev()">⬅ Anterior</button>
      <button class="secondary" onclick="next()">Próxima ➜</button>
      <button class="primary" onclick="confirmAnswer()">Responder</button>
    </div>

    <!-- RESPOSTA / EXPLICAÇÃO -->
    <div id="feedback">

      <div style="margin-top:14px; font-size:14px; color:#374151">
        <strong>Comentário da questão:</strong>
        <div id="explicacao"></div>
      </div>

      <div style="margin-top:14px">
        <div class="tab active" onclick="loadComments()">Comentários</div>
      </div>

      <div class="comment-box" id="comments"></div>

      <textarea id="commentInput" placeholder="Escreva um comentário..."></textarea>
      <button class="primary" style="margin-top:8px" onclick="sendComment()">
        Enviar comentário
      </button>

    </div>

  </div>

</div>

<script>

let questions = [];
let index = 0;
let selected = null;
let answered = false;

/* INIT */
window.addEventListener("load", async () => {
  const session = await exigirLogin();
  if(!session) return;

  document.getElementById("app").style.display = "block";

  const { data } = await db.from("banco_questoes").select("*").limit(50);
  questions = data || [];

  render();
});

/* RENDER */
function render(){
  answered = false;
  selected = null;

  const q = questions[index];

  document.getElementById("question").innerText = q.enunciado;

  document.getElementById("options").innerHTML =
    ["a","b","c","d"].map(l => `
      <div class="option" onclick="selectOption('${l}', this)">
        ${l.toUpperCase()}) ${q["alternativa_"+l]}
      </div>
    `).join("");

  document.getElementById("feedback").style.display = "none";
}

/* SELECT OPTION */
function selectOption(letter, el){
  selected = letter;

  document.querySelectorAll(".option").forEach(o => o.classList.remove("selected"));
  el.classList.add("selected");
}

/* CONFIRM ANSWER */
async function confirmAnswer(){

  if(!selected || answered) return;

  answered = true;

  const q = questions[index];
  const correct = selected === q.correta;

  document.getElementById("feedback").style.display = "block";

  // explicação da questão
  document.getElementById("explicacao").innerText = q.comentario || "Sem explicação.";

  document.querySelectorAll(".option").forEach(o=>{
    const l = o.innerText.trim()[0].toLowerCase();

    if(l === q.correta) o.classList.add("correct");
    if(l === selected && !correct) o.classList.add("wrong");
  });

  const { data } = await supabase.auth.getUser();
  const user = data.user;

  await db.from("respostas_usuario").insert({
    user_id: user.id,
    questao_id: q.id,
    resposta_marcada: selected,
    correta: correct
  });

  loadComments();
}

/* COMMENTS */
async function loadComments(){

  const q = questions[index];

  const { data } = await db
    .from("comentarios_questao")
    .select("*")
    .eq("questao_id", q.id)
    .order("created_at", { ascending:false });

  renderComments(data || []);
}

function renderComments(comments){

  const box = document.getElementById("comments");

  if(!comments.length){
    box.innerHTML = "<p style='color:#888'>Sem comentários ainda</p>";
    return;
  }

  box.innerHTML = comments.map(c => `
    <div class="comment">

      <div class="comment-header">
        <div class="avatar">${(c.nome || "U").charAt(0).toUpperCase()}</div>

        <div>
          <div style="font-weight:600;font-size:13px">
            ${c.nome || "Usuário"}
          </div>
          <div style="font-size:11px;color:#888">
            ${new Date(c.created_at).toLocaleString()}
          </div>
        </div>
      </div>

      <div style="margin-left:42px;margin-top:6px">
        ${c.conteudo}
      </div>

      <button class="small-btn" onclick="reply(${c.id})">Responder</button>

      ${c.respostas ? c.respostas.map(r=>`
        <div class="reply">
          <strong>${r.nome}</strong>: ${r.conteudo}
        </div>
      `).join("") : ""}

    </div>
  `).join("");
}

/* SEND COMMENT */
async function sendComment(){

  const text = document.getElementById("commentInput").value.trim();
  if(!text) return;

  const q = questions[index];

  const { data } = await supabase.auth.getUser();
  const user = data.user;

  await db.from("comentarios_questao").insert({
    questao_id: q.id,
    user_id: user.id,
    conteudo: text,
    nome: user.email.split("@")[0],
    tipo: "aluno"
  });

  document.getElementById("commentInput").value = "";
  loadComments();
}

/* NAV */
function prev(){ if(index>0){ index--; render(); } }
function next(){ if(index<questions.length-1){ index++; render(); } }

function reply(id){
  alert("Função de resposta (thread) - próximo upgrade podemos deixar estilo YouTube completo com backend estruturado");
}

</script>

</body>
</html>
