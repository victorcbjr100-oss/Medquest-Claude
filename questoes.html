<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MedQuest — Questões</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/sidebar.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter;
  background:#f6f7fb;
  color:#111;
}

/* IMPORTANTE: não mexe na sidebar */
#app{
  margin-left:260px;
  display:flex;
  justify-content:center;
  padding:30px;
}

/* CONTAINER CENTRAL */
.container{
  width:100%;
  max-width:850px;
}

/* CARD */
.card{
  background:#fff;
  border:1px solid #e8e8e8;
  border-radius:14px;
  padding:22px;
  box-shadow:0 6px 18px rgba(0,0,0,.05);
}

/* QUESTÃO */
.question{
  font-size:17px;
  font-weight:600;
  line-height:1.5;
  margin-bottom:18px;
}

/* OPTIONS */
.option{
  padding:12px 14px;
  border:1px solid #e5e7eb;
  border-radius:10px;
  margin-top:10px;
  cursor:pointer;
  transition:.15s;
  background:#fff;
}

.option:hover{
  background:#f9fafb;
}

.option.selected{
  border-color:#2563eb;
}

.option.correct{
  border:2px solid #16a34a;
  background:#f0fdf4;
}

.option.wrong{
  border:2px solid #dc2626;
  background:#fef2f2;
}

/* BOTÕES */
.actions{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:18px;
}

button{
  font-family:Inter;
  font-weight:600;
  border:none;
  border-radius:8px;
  padding:10px 14px;
  cursor:pointer;
}

.primary{
  background:#2563eb;
  color:#fff;
}

.secondary{
  background:#fff;
  border:1px solid #e5e7eb;
}

/* COMENTÁRIOS */
#feedback{
  margin-top:22px;
  display:none;
}

.comment{
  padding:14px 0;
  border-bottom:1px solid #eee;
}

.comment-header{
  display:flex;
  gap:10px;
  align-items:center;
}

.avatar{
  width:32px;
  height:32px;
  border-radius:50%;
  background:#2563eb;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  font-size:13px;
}

.comment-name{
  font-weight:600;
  font-size:13px;
}

.comment-date{
  font-size:11px;
  color:#888;
}

.comment-text{
  margin-left:42px;
  margin-top:6px;
  font-size:14px;
}

/* REPLY */
.reply-btn{
  margin-left:42px;
  font-size:12px;
  color:#2563eb;
  cursor:pointer;
  margin-top:6px;
}

.reply-box{
  margin-left:42px;
  margin-top:8px;
  display:none;
}

textarea{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #ddd;
  font-family:Inter;
  resize:none;
}

.small-btn{
  margin-top:6px;
  font-size:12px;
}
</style>

</head>

<body>

<div id="app" style="display:none">

  <div class="container">

    <div class="card">

      <div class="question" id="question"></div>

      <div id="options"></div>

      <div class="actions">
        <button class="secondary" onclick="prev()">⬅ Anterior</button>
        <button class="secondary" onclick="next()">Próxima ➜</button>
        <button class="primary" onclick="confirm()">Responder</button>
      </div>

      <!-- COMENTÁRIOS SÓ APARECEM APÓS RESPOSTA -->
      <div id="feedback">

        <div id="comments"></div>

        <textarea id="newComment" placeholder="Escreva um comentário..."></textarea>
        <button class="primary small-btn" onclick="sendComment()">Enviar comentário</button>

      </div>

    </div>

  </div>

</div>

<script>
let qs = [];
let i = 0;
let selected = null;
let answered = false;

/* INIT */
window.addEventListener("load", async () => {
  await exigirLogin();

  document.getElementById("app").style.display = "flex";

  const { data } = await db.from("banco_questoes").select("*").limit(30);
  qs = data || [];

  render();
});

/* RENDER */
function render(){
  selected = null;
  answered = false;

  const q = qs[i];

  document.getElementById("question").innerText = q.enunciado;

  document.getElementById("options").innerHTML =
    ["a","b","c","d"].map(l => `
      <div class="option" onclick="selectOpt('${l}', this)">
        ${l.toUpperCase()}) ${q["alternativa_"+l]}
      </div>
    `).join("");

  document.getElementById("feedback").style.display = "none";
}

/* SELECT */
function selectOpt(letter, el){
  if(answered) return;

  selected = { letter, el };

  document.querySelectorAll(".option").forEach(o=>{
    o.classList.remove("selected");
  });

  el.classList.add("selected");
}

/* CONFIRM */
async function confirm(){
  if(!selected || answered) return;

  answered = true;

  const q = qs[i];
  const correct = selected.letter === q.correta;

  document.getElementById("feedback").style.display = "block";

  document.querySelectorAll(".option").forEach(o=>{
    const l = o.innerText.trim()[0].toLowerCase();
    if(l === q.correta) o.classList.add("correct");
    if(o === selected.el && !correct) o.classList.add("wrong");
  });

  const { data } = await supabase.auth.getUser();
  const user = data.user;

  await db.from("respostas_usuario").insert({
    user_id: user.id,
    questao_id: q.id,
    resposta_marcada: selected.letter,
    correta: correct
  });

  loadComments();
}

/* NAV */
function prev(){ if(i>0){ i--; render(); } }
function next(){ if(i<qs.length-1){ i++; render(); } }

/* COMMENTS */
async function loadComments(){
  const q = qs[i];

  const { data } = await db
    .from("comentarios_questao")
    .select("*")
    .eq("questao_id", q.id)
    .order("created_at", { ascending:false });

  renderComments(data || []);
}

function renderComments(cms){

  const box = document.getElementById("comments");

  box.innerHTML = cms.map(c => `
    <div class="comment">

      <div class="comment-header">
        <div class="avatar">${(c.user_name || "U")[0]}</div>

        <div>
          <div class="comment-name">${c.user_name || "Usuário"}</div>
          <div class="comment-date">${new Date(c.created_at).toLocaleString()}</div>
        </div>
      </div>

      <div class="comment-text">${c.conteudo}</div>

      <div class="reply-btn" onclick="toggleReply('${c.id}')">Responder</div>

      <div class="reply-box" id="r-${c.id}">
        <textarea id="t-${c.id}" placeholder="Responder..."></textarea>
        <button class="primary small-btn" onclick="reply('${c.id}')">Enviar</button>
      </div>

    </div>
  `).join("");
}

/* SEND COMMENT */
async function sendComment(){
  const text = document.getElementById("newComment").value.trim();
  if(!text) return;

  const q = qs[i];
  const { data } = await supabase.auth.getUser();
  const user = data.user;

  await db.from("comentarios_questao").insert({
    questao_id: q.id,
    user_id: user.id,
    user_name: user.email,
    conteudo: text,
    parent_id: null
  });

  document.getElementById("newComment").value = "";
  loadComments();
}

/* REPLY */
async function reply(id){
  const text = document.getElementById("t-"+id).value.trim();
  if(!text) return;

  const q = qs[i];
  const { data } = await supabase.auth.getUser();
  const user = data.user;

  await db.from("comentarios_questao").insert({
    questao_id: q.id,
    user_id: user.id,
    user_name: user.email,
    conteudo: text,
    parent_id: id
  });

  loadComments();
}

function toggleReply(id){
  const el = document.getElementById("r-"+id);
  el.style.display = el.style.display === "block" ? "none" : "block";
}
</script>

</body>
</html>
