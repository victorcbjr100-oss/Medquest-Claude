<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MedQuest — UWorld Elite</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter;
  background:#f6f7fb;
  color:#111;
}

.container{
  max-width:950px;
  margin:0 auto;
  padding:28px;
}

.card{
  background:#fff;
  border:1px solid #e8e8e8;
  border-radius:16px;
  padding:22px;
  box-shadow:0 8px 24px rgba(0,0,0,.05);
}

.question{
  font-size:18px;
  font-weight:600;
  line-height:1.5;
  margin-bottom:18px;
}

.option{
  padding:12px 14px;
  border:1px solid #e5e7eb;
  border-radius:12px;
  margin-top:10px;
  cursor:pointer;
  transition:.2s;
  background:#fff;
}

.option:hover{
  border-color:#cbd5e1;
  background:#f9fafb;
}

.correct{
  border:2px solid #16a34a !important;
  background:#f0fdf4 !important;
}

.wrong{
  border:2px solid #dc2626 !important;
  background:#fef2f2 !important;
}

.actions{
  display:flex;
  gap:10px;
  margin-top:18px;
}

button{
  font-family:Inter;
  font-weight:600;
  border:none;
  border-radius:10px;
  padding:10px 14px;
  cursor:pointer;
}

.primary{
  background:#2563eb;
  color:#fff;
}

.secondary{
  background:#fff;
  border:1px solid #e5e7eb;
}

#feedback{
  margin-top:20px;
  display:none;
  animation:fade .2s ease;
}

@keyframes fade{
  from{opacity:0; transform:translateY(5px);}
  to{opacity:1; transform:translateY(0);}
}

.tabs{
  display:flex;
  gap:10px;
  margin-bottom:12px;
}

.tab{
  padding:6px 12px;
  border-radius:999px;
  border:1px solid #e5e7eb;
  font-size:13px;
  cursor:pointer;
}

.tab.active{
  background:#2563eb;
  color:#fff;
  border-color:#2563eb;
}

.comment{
  padding:14px 0;
  border-bottom:1px solid #eee;
}

.comment-header{
  display:flex;
  gap:10px;
  align-items:center;
}

.avatar{
  width:34px;
  height:34px;
  border-radius:50%;
  background:#2563eb;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
}

textarea{
  width:100%;
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  border:1px solid #e5e7eb;
  font-family:Inter;
  resize:none;
}
</style>

</head>

<body>

<div class="container" id="app" style="display:none">

  <div class="card">

    <div class="question" id="question"></div>

    <div id="options"></div>

    <div class="actions">
      <button class="secondary" onclick="prev()">⬅ Voltar</button>
      <button class="secondary" onclick="skip()">⏭ Pular</button>
      <button class="primary" onclick="next()">Próxima ➜</button>
    </div>

    <div id="feedback">

      <div class="tabs">
        <div class="tab active" id="tab-alunos" onclick="setTab('alunos')">Alunos</div>
        <div class="tab" id="tab-prof" onclick="setTab('prof')">Professor</div>
      </div>

      <div id="comments"></div>

      <textarea id="commentInput" placeholder="Escreva um comentário..."></textarea>

      <button class="primary" style="margin-top:8px" onclick="sendComment()">
        Enviar
      </button>

    </div>

  </div>

</div>

<script>

let questions = [];
let index = 0;
let answered = false;
let tab = "alunos";

/* INIT */
window.addEventListener("load", async () => {

  const session = await exigirLogin();
  if(!session) return;

  document.getElementById("app").style.display = "block";

  const { data } = await db
    .from("banco_questoes")
    .select("*")
    .limit(30);

  questions = data || [];

  render();
});

/* RENDER */
function render(){

  answered = false;

  const q = questions[index];
  if(!q) return;

  document.getElementById("question").innerText = q.enunciado;

  document.getElementById("options").innerHTML =
    ["a","b","c","d"].map(l => `
      <div class="option" onclick="answer('${l}', this)">
        ${l.toUpperCase()}) ${q["alternativa_"+l]}
      </div>
    `).join("");

  document.getElementById("feedback").style.display = "none";
}

/* ANSWER */
async function answer(letter, el){

  if(answered) return;
  answered = true;

  const q = questions[index];
  const correct = letter === q.correta;

  document.getElementById("feedback").style.display = "block";

  document.querySelectorAll(".option").forEach(o=>{
    const l = o.innerText.trim()[0].toLowerCase();
    if(l === q.correta) o.classList.add("correct");
    if(o === el && !correct) o.classList.add("wrong");
  });

  const { data } = await supabase.auth.getUser();
  const user = data?.user;

  await db.from("respostas_usuario").insert({
    user_id: user.id,
    questao_id: q.id,
    resposta_marcada: letter,
    correta: correct
  });

  await loadComments();
}

/* NAV */
function prev(){ if(index>0){ index--; render(); } }
function skip(){ if(index<questions.length-1){ index++; render(); } }
function next(){ if(index<questions.length-1){ index++; render(); } }

/* TAB */
function setTab(t){
  tab = t;

  document.getElementById("tab-alunos").classList.remove("active");
  document.getElementById("tab-prof").classList.remove("active");

  if(t === "alunos") document.getElementById("tab-alunos").classList.add("active");
  else document.getElementById("tab-prof").classList.add("active");

  loadComments();
}

/* COMMENTS */
async function loadComments(){

  const q = questions[index];

  const { data } = await db
    .from("comentarios_questao")
    .select("*")
    .eq("questao_id", q.id)
    .eq("tipo", tab === "prof" ? "professor" : "aluno")
    .order("created_at", { ascending:false });

  renderComments(data || []);
}

function renderComments(comments){

  const box = document.getElementById("comments");

  if(!comments.length){
    box.innerHTML = "<p style='color:#888'>Sem comentários</p>";
    return;
  }

  box.innerHTML = comments.map(c => `
    <div class="comment">

      <div class="comment-header">
        <div class="avatar">
          ${c.tipo === "professor" ? "P" : "A"}
        </div>

        <div>
          <div style="font-weight:600;font-size:13px">
            ${c.tipo === "professor" ? "Professor" : "Aluno"}
          </div>
          <div style="font-size:11px;color:#888">
            ${new Date(c.created_at).toLocaleString()}
          </div>
        </div>
      </div>

      <div style="margin-left:44px;margin-top:6px">
        ${c.conteudo}
      </div>

    </div>
  `).join("");
}

/* SEND COMMENT (FIX DEFINITIVO) */
async function sendComment(){

  const q = questions[index];
  const text = document.getElementById("commentInput").value.trim();

  if(!text) return alert("Digite um comentário");

  const { data } = await supabase.auth.getUser();
  const user = data?.user;

  const { error } = await db.from("comentarios_questao").insert({
    questao_id: q.id,
    user_id: user.id,
    conteudo: text,
    tipo: "aluno"
  });

  if(error){
    console.error(error);
    return alert("Erro ao enviar comentário");
  }

  document.getElementById("commentInput").value = "";
  await loadComments();
}

</script>

</body>
</html>
