<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Questões</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>

<style>
body {
  font-family: Arial;
  max-width: 700px;
  margin: auto;
  padding: 20px;
}

.alternativa {
  padding: 10px;
  border: 1px solid #ccc;
  margin-top: 10px;
  cursor: pointer;
}

.alternativa:hover {
  background: #eee;
}
</style>
</head>

<body>

<h2>Questões</h2>

<div id="questao"></div>

<script>
let questoes = [];
let atual = 0;

// 🔹 CARREGAR QUESTÕES
async function carregarQuestoes(){
  const { data } = await supabase
    .from('questoes')
    .select('*')
    .limit(10);

  questoes = data;

  mostrarQuestao();
}

// 🔹 MOSTRAR QUESTÃO
function mostrarQuestao(){
  const q = questoes[atual];

  document.getElementById('questao').innerHTML = `
    <h3>${q.enunciado}</h3>

    <div class="alternativa" onclick="responder('a')">
      A) ${q.alternativa_a}
    </div>

    <div class="alternativa" onclick="responder('b')">
      B) ${q.alternativa_b}
    </div>

    <div class="alternativa" onclick="responder('c')">
      C) ${q.alternativa_c}
    </div>

    <div class="alternativa" onclick="responder('d')">
      D) ${q.alternativa_d}
    </div>
  `;
}

// 🔹 RESPONDER
async function responder(letra){
  const q = questoes[atual];

  const correta = letra === q.correta;

  alert(correta ? 'Acertou!' : 'Errou!');

  const user = (await supabase.auth.getUser()).data.user;

  await supabase.from('respostas_usuario').insert({
    user_id: user.id,
    questao_id: q.id,
    resposta_marcada: letra,
    correta
  });

  atual++;

  if(atual < questoes.length){
    mostrarQuestao();
  } else {
    alert('Fim das questões');
  }
}

// 🔹 INICIAR
window.onload = carregarQuestoes;
</script>

</body>
</html>
