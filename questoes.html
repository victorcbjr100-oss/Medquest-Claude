<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MedQuest — Questões</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter, sans-serif;
  background:#f6f7fb;
  color:#0f172a;
}

/* CONTAINER */
.main-content{
  max-width:900px;
  margin:0 auto;
  padding:28px 18px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  font-size:13px;
  color:#64748b;
  margin-bottom:10px;
}

/* PROGRESS */
.progress{
  height:8px;
  background:#e2e8f0;
  border-radius:999px;
  overflow:hidden;
  margin-bottom:18px;
}

.progress-fill{
  height:100%;
  width:0%;
  background:#2563eb;
  transition:.3s;
}

/* CARD */
.card{
  background:#fff;
  border:1px solid #e5e7eb;
  border-radius:18px;
  padding:22px;
  box-shadow:0 10px 30px rgba(0,0,0,.06);
}

/* BADGES */
.badges{
  display:flex;
  gap:8px;
  margin-bottom:10px;
}

.badge{
  font-size:12px;
  padding:4px 10px;
  border-radius:999px;
  border:1px solid #e5e7eb;
  background:#fff;
  color:#334155;
}

.badge-level{
  border-color:#facc15;
  background:#fffbeb;
  color:#b45309;
}

/* QUESTÃO */
.question{
  font-size:18px;
  font-weight:600;
  line-height:1.5;
  margin:12px 0 18px;
}

/* OPÇÕES */
.option{
  display:flex;
  gap:10px;
  align-items:flex-start;
  padding:12px 14px;
  border:1px solid #e5e7eb;
  border-radius:14px;
  margin-top:10px;
  cursor:pointer;
  transition:.2s;
  background:#fff;
}

.option:hover{
  border-color:#93c5fd;
  background:#f8fafc;
}

.letter{
  width:30px;
  height:30px;
  border-radius:50%;
  border:1px solid #cbd5e1;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  font-size:13px;
  flex-shrink:0;
  background:#fff;
}

/* CORREÇÃO */
.correct{
  border:2px solid #16a34a !important;
  background:#ecfdf5 !important;
}

.wrong{
  border:2px solid #dc2626 !important;
  background:#fef2f2 !important;
}

/* BOTÕES */
.actions{
  display:flex;
  justify-content:space-between;
  margin-top:18px;
  gap:10px;
}

button{
  font-family:Inter;
  border:none;
  cursor:pointer;
  padding:10px 14px;
  border-radius:12px;
  font-weight:600;
}

.btn-primary{
  background:#2563eb;
  color:#fff;
}

.btn-secondary{
  background:#fff;
  border:1px solid #e5e7eb;
}

/* FEEDBACK */
.feedback{
  display:none;
  margin-top:18px;
  padding-top:16px;
  border-top:1px solid #e5e7eb;
}

/* TABS */
.tabs{
  display:flex;
  gap:8px;
  margin-bottom:10px;
}

.tab{
  font-size:12px;
  padding:5px 10px;
  border-radius:999px;
  border:1px solid #e5e7eb;
  cursor:pointer;
}

.tab.active{
  background:#2563eb;
  color:#fff;
  border-color:#2563eb;
}

/* COMENTÁRIOS */
.comment{
  padding:12px 0;
  border-bottom:1px solid #f1f5f9;
}

.user{
  display:flex;
  gap:10px;
  align-items:center;
}

.avatar{
  width:32px;
  height:32px;
  border-radius:50%;
  background:#2563eb;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  font-size:13px;
}

textarea{
  width:100%;
  margin-top:10px;
  padding:10px;
  border-radius:12px;
  border:1px solid #e5e7eb;
  font-family:Inter;
  resize:none;
  outline:none;
}

textarea:focus{
  border-color:#2563eb;
  box-shadow:0 0 0 3px rgba(37,99,235,.1);
}
</style>

</head>

<body>

<main class="main-content" id="main" style="display:none">

  <div class="header">
    <div id="counter">Questão 1 de 1</div>
    <div id="score">0 ✓ | 0 ✗</div>
  </div>

  <div class="progress">
    <div class="progress-fill" id="progress"></div>
  </div>

  <div class="card">

    <div class="badges">
      <span class="badge">Tema</span>
      <span class="badge-level">Médio</span>
    </div>

    <div class="question" id="question"></div>

    <div id="options"></div>

    <div class="actions">
      <button class="btn-secondary" onclick="prev()">Anterior</button>
      <button class="btn-secondary" onclick="skip()">Pular</button>
      <button class="btn-primary" onclick="next()">Próxima</button>
    </div>

    <div class="feedback" id="feedback">

      <div class="tabs">
        <div class="tab active" onclick="setTab('aluno')">Alunos</div>
        <div class="tab" onclick="setTab('prof')">Professor</div>
      </div>

      <div id="comments"></div>

      <textarea id="commentInput" placeholder="Escreva um comentário..."></textarea>
      <button class="btn-primary" style="margin-top:8px" onclick="sendComment()">
        Enviar
      </button>

    </div>

  </div>

</main>

<script>

let questions = [];
let index = 0;
let answered = false;
let tab = "aluno";
let score = {c:0,e:0};

/* INIT */
window.addEventListener("load", async () => {

  const session = await exigirLogin();
  if(!session) return;

  document.getElementById("main").style.display = "block";

  const { data } = await db.from("banco_questoes").select("*").limit(30);
  questions = data || [];

  render();
});

/* RENDER */
function render(){

  const q = questions[index];
  if(!q) return;

  answered = false;

  document.getElementById("question").innerText = q.enunciado;

  document.getElementById("counter").innerText =
    `Questão ${index+1} de ${questions.length}`;

  document.getElementById("progress").style.width =
    ((index+1)/questions.length)*100 + "%";

  document.getElementById("options").innerHTML =
    ["a","b","c","d"].map(l => `
      <div class="option" onclick="answer('${l}', this)">
        <div class="letter">${l.toUpperCase()}</div>
        <div>${q["alternativa_"+l]}</div>
      </div>
    `).join("");

  document.getElementById("feedback").style.display = "none";
}

/* ANSWER */
async function answer(l, el){

  if(answered) return;
  answered = true;

  const q = questions[index];
  const correct = l === q.correta;

  document.getElementById("feedback").style.display = "block";

  document.querySelectorAll(".option").forEach(o=>{
    const letter = o.innerText.trim()[0].toLowerCase();
    if(letter === q.correta) o.classList.add("correct");
    if(o === el && !correct) o.classList.add("wrong");
  });

  correct ? score.c++ : score.e++;

  document.getElementById("score").innerText =
    `${score.c} ✓ | ${score.e} ✗`;

  loadComments();
}

/* NAV */
function prev(){ if(index>0){ index--; render(); } }
function skip(){ if(index<questions.length-1){ index++; render(); } }
function next(){ if(index<questions.length-1){ index++; render(); } }

/* COMMENTS */
function setTab(t){
  tab = t;
  loadComments();
}

async function loadComments(){

  const q = questions[index];

  const { data } = await db
    .from("comentarios_questao")
    .select("*")
    .eq("questao_id", q.id)
    .eq("tipo", tab)
    .order("created_at",{ascending:false});

  renderComments(data || []);
}

function renderComments(list){

  const box = document.getElementById("comments");

  if(!list.length){
    box.innerHTML = "<p style='color:#888'>Sem comentários</p>";
    return;
  }

  box.innerHTML = list.map(c=>`
    <div class="comment">
      <div class="user">
        <div class="avatar">${c.tipo==="prof"?"P":"A"}</div>
        <div style="font-size:12px;color:#666">
          ${new Date(c.created_at).toLocaleString()}
        </div>
      </div>
      <div style="margin-left:42px;margin-top:6px">
        ${c.conteudo}
      </div>
    </div>
  `).join("");
}

/* SEND */
async function sendComment(){

  const q = questions[index];
  const text = document.getElementById("commentInput").value.trim();

  if(!text) return;

  await db.from("comentarios_questao").insert({
    questao_id: q.id,
    conteudo: text,
    tipo: tab
  });

  document.getElementById("commentInput").value = "";
  loadComments();
}

</script>

</body>
</html>
