<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MedQuest — UWorld Elite</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter;
  background:#f6f7fb;
  color:#111;
}

/* ===== SIDEBAR NÃO ALTERADA (cole a sua aqui) ===== */
/* >>> MANTIVE SEU CÓDIGO EXTERNO VIA sidebar.js <<< */

/* LAYOUT CENTRALIZADO (CORRIGIDO) */
#app{
  margin-left:260px;
  display:flex;
  justify-content:center;
  padding:28px;
}

.container{
  width:100%;
  max-width:900px;
}

/* CARD */
.card{
  background:#fff;
  border:1px solid #e8e8e8;
  border-radius:16px;
  padding:22px;
  box-shadow:0 8px 24px rgba(0,0,0,.05);
}

/* QUESTÃO */
.question{
  font-size:18px;
  font-weight:600;
  line-height:1.5;
  margin-bottom:18px;
}

/* OPTIONS */
.option{
  padding:12px 14px;
  border:1px solid #e5e7eb;
  border-radius:12px;
  margin-top:10px;
  cursor:pointer;
  transition:.2s;
  background:#fff;
}

.option:hover{
  border-color:#cbd5e1;
  background:#f9fafb;
}

.correct{
  border:2px solid #16a34a !important;
  background:#f0fdf4 !important;
}

.wrong{
  border:2px solid #dc2626 !important;
  background:#fef2f2 !important;
}

/* BOTÕES */
.actions{
  display:flex;
  justify-content:center;
  gap:12px;
  margin-top:18px;
}

button{
  font-family:Inter;
  font-weight:600;
  border:none;
  border-radius:10px;
  padding:10px 14px;
  cursor:pointer;
}

.primary{
  background:#2563eb;
  color:#fff;
}

.secondary{
  background:#fff;
  border:1px solid #e5e7eb;
}

/* FEEDBACK */
#feedback{
  margin-top:20px;
  display:none;
}

/* TABS */
.tabs{
  display:flex;
  gap:10px;
  margin-bottom:12px;
}

.tab{
  padding:6px 12px;
  border-radius:999px;
  border:1px solid #e5e7eb;
  font-size:13px;
  cursor:pointer;
}

.tab.active{
  background:#2563eb;
  color:#fff;
  border-color:#2563eb;
}

/* COMENTÁRIOS */
.comment{
  padding:12px 0;
  border-bottom:1px solid #eee;
}

.comment-header{
  display:flex;
  gap:10px;
  align-items:center;
}

.avatar{
  width:34px;
  height:34px;
  border-radius:50%;
  background:#2563eb;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
}

.reply{
  margin-left:44px;
  border-left:2px solid #eee;
  padding-left:12px;
  margin-top:8px;
}

textarea{
  width:100%;
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  border:1px solid #e5e7eb;
  font-family:Inter;
  resize:none;
}
.reply-box{
  margin-top:8px;
  display:none;
}
.reply-btn{
  font-size:12px;
  color:#2563eb;
  cursor:pointer;
  margin-left:44px;
}
</style>
</head>

<body>

<!-- SIDEBAR (SEU SCRIPT ORIGINAL) -->
<script src="js/sidebar.js"></script>

<div id="app" style="display:none">

  <div class="container">

    <div class="card">

      <div class="question" id="question"></div>

      <div id="options"></div>

      <div class="actions">
        <button class="secondary" onclick="prev()">⬅ Anterior</button>
        <button class="secondary" onclick="next()">Próxima ➜</button>
        <button class="primary" onclick="confirmAnswer()">Responder</button>
      </div>

      <div id="feedback">

        <div class="tabs">
          <div class="tab active" onclick="setTab('alunos')">Alunos</div>
          <div class="tab" onclick="setTab('prof')">Professor</div>
        </div>

        <div id="comments"></div>

        <textarea id="commentInput" placeholder="Escreva um comentário..."></textarea>
        <button class="primary" onclick="sendComment()">Enviar comentário</button>

      </div>

    </div>

  </div>

</div>

<script>
let questions = [];
let index = 0;
let selected = null;
let answered = false;
let tab = "alunos";

/* INIT */
window.addEventListener("load", async () => {
  await exigirLogin();

  document.getElementById("app").style.display = "flex";

  const { data } = await db.from("banco_questoes").select("*").limit(30);
  questions = data || [];

  render();
});

/* RENDER */
function render(){
  selected = null;
  answered = false;

  const q = questions[index];

  document.getElementById("question").innerText = q.enunciado;

  document.getElementById("options").innerHTML =
    ["a","b","c","d"].map(l => `
      <div class="option" onclick="selectOption('${l}', this)">
        ${l.toUpperCase()}) ${q["alternativa_"+l]}
      </div>
    `).join("");

  document.getElementById("feedback").style.display = "none";
}

/* SELECT */
function selectOption(letter, el){
  if(answered) return;

  selected = { letter, el };

  document.querySelectorAll(".option").forEach(o=>{
    o.style.borderColor = "#e5e7eb";
  });

  el.style.borderColor = "#2563eb";
}

/* CONFIRM ANSWER */
async function confirmAnswer(){
  if(!selected || answered) return;

  answered = true;

  const q = questions[index];
  const correct = selected.letter === q.correta;

  document.getElementById("feedback").style.display = "block";

  document.querySelectorAll(".option").forEach(o=>{
    const l = o.innerText.trim()[0].toLowerCase();
    if(l === q.correta) o.classList.add("correct");
    if(o === selected.el && !correct) o.classList.add("wrong");
  });

  const { data } = await supabase.auth.getUser();
  const user = data.user;

  await db.from("respostas_usuario").insert({
    user_id: user.id,
    questao_id: q.id,
    resposta_marcada: selected.letter,
    correta: correct
  });

  loadComments();
}

/* NAV */
function prev(){ if(index>0){ index--; render(); } }
function next(){ if(index<questions.length-1){ index++; render(); } }

/* COMMENTS */
function setTab(t){
  tab = t;
  loadComments();
}

async function loadComments(){
  const q = questions[index];

  const { data } = await db
    .from("comentarios_questao")
    .select("*")
    .eq("questao_id", q.id)
    .order("created_at", { ascending:false });

  renderComments(data || []);
}

function renderComments(comments){

  const box = document.getElementById("comments");

  const parents = comments.filter(c => !c.parent_id);

  box.innerHTML = parents.map(c => `
    <div class="comment">

      <div class="comment-header">
        <div class="avatar">${c.user_name?.[0] || "U"}</div>
        <div>
          <div style="font-weight:600;font-size:13px">${c.user_name || "Usuário"}</div>
          <div style="font-size:11px;color:#888">
            ${new Date(c.created_at).toLocaleString()}
          </div>
        </div>
      </div>

      <div style="margin-left:44px;margin-top:6px">
        ${c.conteudo}
      </div>

      <div class="reply-btn" onclick="toggleReply('${c.id}')">Responder</div>

      <div class="reply-box" id="reply-${c.id}">
        <textarea id="reply-text-${c.id}" placeholder="Responder comentário..."></textarea>
        <button class="primary" onclick="sendReply('${c.id}')">Enviar</button>
      </div>

      ${comments.filter(r => r.parent_id === c.id).map(r => `
        <div class="reply">
          <b>${r.user_name || "Usuário"}</b>: ${r.conteudo}
        </div>
      `).join("")}

    </div>
  `).join("");
}

/* COMMENT */
async function sendComment(){
  const text = document.getElementById("commentInput").value.trim();
  if(!text) return;

  const q = questions[index];
  const { data } = await supabase.auth.getUser();
  const user = data.user;

  await db.from("comentarios_questao").insert({
    questao_id: q.id,
    user_id: user.id,
    user_name: user.email,
    conteudo: text,
    parent_id: null
  });

  document.getElementById("commentInput").value = "";
  loadComments();
}

/* REPLY */
async function sendReply(parentId){
  const input = document.getElementById("reply-text-"+parentId);
  const text = input.value.trim();
  if(!text) return;

  const q = questions[index];
  const { data } = await supabase.auth.getUser();
  const user = data.user;

  await db.from("comentarios_questao").insert({
    questao_id: q.id,
    user_id: user.id,
    user_name: user.email,
    conteudo: text,
    parent_id: parentId
  });

  loadComments();
}

function toggleReply(id){
  const el = document.getElementById("reply-"+id);
  el.style.display = el.style.display === "block" ? "none" : "block";
}
</script>

</body>
</html>
