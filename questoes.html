<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questões — MedQuest Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --bg-body: #f8fafc;
            --surface: #fff;
            --primary: #2563eb;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius-xl: 24px;
        }
        body { background: var(--bg-body); font-family: 'Inter', sans-serif; }
        
        /* Layout */
        .main-content { max-width: 900px; margin: 0 auto; padding: 2.5rem 1.5rem; }
        
        /* Estética Premium dos Cards */
        .question-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 2.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
            animation: fadeIn 0.5s ease-out;
        }
        .question-card:hover { 
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08); 
            border-color: #cbd5e1;
        }

        /* Alternativas com Círculos */
        .circle-letter {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: #f1f5f9;
            color: #64748b;
            font-weight: 800;
            font-size: 1.1rem;
            margin-right: 1.25rem;
            flex-shrink: 0;
            transition: all 0.2s ease;
        }
        
        .opt-btn {
            width: 100%;
            display: flex;
            align-items: center;
            padding: 1.25rem;
            margin-bottom: 0.5rem;
            border-radius: 18px;
            border: 1px solid #f1f5f9;
            background: #fff;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .opt-btn:hover:not(:disabled) { 
            background: #f8fafc; 
            border-color: var(--primary); 
        }
        .opt-btn:hover:not(:disabled) .circle-letter { 
            background: var(--primary); 
            color: #fff; 
        }

        /* Status de Resposta */
        .is-correct { background: #22c55e !important; color: #fff !important; box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3); }
        .is-wrong { background: #ef4444 !important; color: #fff !important; box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <script src="js/auth.js"></script>
    <script src="js/sidebar.js"></script>

    <main class="main-content" id="main" style="display:none">
        <header class="mb-10">
            <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight">Questões</h1>
            <p id="subtitulo-filtro" class="text-slate-500 mt-2 text-lg font-medium">Pratique com foco em casos clínicos reais.</p>
        </header>

        <div id="questoes-container" class="space-y-6">
            <div id="loading" class="text-center py-20 bg-white rounded-[24px] border border-dashed border-slate-300">
                <div class="inline-block animate-spin rounded-full h-10 w-10 border-4 border-blue-500 border-t-transparent mb-4"></div>
                <p class="text-slate-400 font-bold">Sincronizando banco de dados...</p>
            </div>
        </div>
    </main>

    <script>
        window.addEventListener('load', async () => {
            const session = await exigirLogin(); 
            if(!session) return;
            document.getElementById('main').style.display = 'block';

            const sb = window.supabaseClient;
            const container = document.getElementById('questoes-container');
            
            const params = new URLSearchParams(window.location.search);
            const tema = params.get('tema');
            const subtema = params.get('subtema');

            if(tema) {
                document.getElementById('subtitulo-filtro').innerHTML = 
                    `<span class="text-blue-600">Filtro:</span> ${tema} ${subtema ? '• ' + subtema : ''}`;
            }

            let query = sb.from('questoes').select('*');
            if(tema) query = query.eq('tema', tema);
            if(subtema) query = query.eq('subtema', subtema);

            const { data, error } = await query.order('id', { ascending: false });

            if(error || !data || data.length === 0) {
                container.innerHTML = `
                    <div class="p-10 bg-white rounded-[24px] border border-slate-200 text-center shadow-sm">
                        <p class="text-slate-500 font-bold">Nenhuma questão encontrada para este tema.</p>
                        <a href="questoes.html" class="text-blue-600 font-black mt-4 inline-block hover:underline">Ver todas as questões</a>
                    </div>`;
                return;
            }

            container.innerHTML = '';

            data.forEach(q => {
                const card = document.createElement('div');
                card.className = 'question-card';
                card.innerHTML = `
                    <div class="flex justify-between items-center mb-6">
                        <span class="px-4 py-1.5 bg-blue-50 text-blue-600 rounded-full text-[10px] font-black uppercase tracking-widest border border-blue-100">
                            ${q.tema} | ${q.subtema}
                        </span>
                        <span class="text-xs font-mono text-slate-300">ID #${q.id}</span>
                    </div>
                    
                    <h3 class="text-slate-800 font-bold mb-10 text-xl leading-relaxed">${q.pergunta}</h3>

                    <div id="box-${q.id}" class="space-y-3">
                        ${q.opcoes.map((opt, i) => `
                            <button class="opt-btn" onclick="verificar(${q.id}, ${i}, ${parseInt(q.resposta)})">
                                <div class="circle-letter" id="letter-${q.id}-${i}">${String.fromCharCode(65 + i)}</div>
                                <div class="text-slate-700 font-bold text-lg">${opt}</div>
                            </button>
                        `).join('')}
                    </div>
                    <div id="fb-${q.id}" class="mt-8 hidden p-6 rounded-2xl font-black text-center animate-fadeIn border-2"></div>
                `;
                container.appendChild(card);
            });
        });

        function verificar(id, userIdx, correctIdx) {
            const btns = document.querySelectorAll(`#box-${id} .opt-btn`);
            const fb = document.getElementById(`fb-${id}`);
            btns.forEach(b => b.disabled = true);
            fb.classList.remove('hidden');

            if(userIdx === correctIdx) {
                fb.className = "mt-8 p-6 rounded-2xl bg-green-50 text-green-700 border-green-100 font-black text-center block animate-bounce-short";
                fb.innerHTML = "✨ RESPOSTA CORRETA!";
                paint(id, userIdx, 'win');
            } else {
                fb.className = "mt-8 p-6 rounded-2xl bg-red-50 text-red-700 border-red-100 font-black text-center block";
                fb.innerHTML = `✖ INCORRETO. A RESPOSTA É A LETRA ${String.fromCharCode(65 + correctIdx)}.`;
                paint(id, userIdx, 'lose');
                paint(id, correctIdx, 'win');
            }
        }

        function paint(id, idx, type) {
            const circle = document.getElementById(`letter-${id}-${idx}`);
            if(type === 'win') {
                circle.classList.add('is-correct');
            } else {
                circle.classList.add('is-wrong');
            }
        }
    </script>
</body>
</html>
