<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Questões — MedQuest</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

<style>
.main-content {
  max-width: 800px;
  margin: 0 auto;
  padding: 2rem 1.5rem;
}

.card {
  background: white;
  border: 1px solid #e2e8f0;
  border-radius: 16px;
  padding: 1.5rem;
}

.alternativa {
  padding: 12px;
  border: 1px solid #e2e8f0;
  border-radius: 10px;
  margin-top: 10px;
  cursor: pointer;
  transition: 0.2s;
}

.alternativa:hover {
  background: #f1f5f9;
}

.correta {
  background: #dcfce7;
  border-color: #16a34a;
}

.errada {
  background: #fee2e2;
  border-color: #dc2626;
}
</style>
</head>

<body>

<script src="js/auth.js"></script>
<script src="js/sidebar.js"></script>

<main class="main-content" id="main" style="display:none">

  <h1 id="titulo" style="font-weight:800; margin-bottom:1.5rem;">🧠 Questões</h1>

  <div class="card" id="questao"></div>

</main>

<script>
let questoes = [];
let atual = 0;
let respondeu = false;


// 🔐 LOGIN + SIDEBAR
window.addEventListener('load', async () => {
  const session = await exigirLogin();
  if(!session) return;

  document.getElementById('main').style.display = 'block';

  carregarQuestoes();
});


// 🔹 CARREGAR QUESTÕES (SEM FILTRO)
async function carregarQuestoes(){

  const { data, error } = await supabase
    .from('banco_questoes')
    .select('*')
    .limit(10);

  console.log('QUESTÕES:', data, error);

  if(error){
    document.getElementById('questao').innerHTML = 'Erro ao carregar questões';
    return;
  }

  if(!data || data.length === 0){
    document.getElementById('questao').innerHTML = 'Nenhuma questão encontrada';
    return;
  }

  questoes = data;
  mostrarQuestao();
}


// 🔹 MOSTRAR QUESTÃO
function mostrarQuestao(){
  respondeu = false;

  const q = questoes[atual];

  document.getElementById('questao').innerHTML = `
    <div style="font-weight:600; margin-bottom:1rem;">
      ${q.enunciado}
    </div>

    ${['a','b','c','d'].map(l => `
      <div class="alternativa" onclick="responder('${l}', this)">
        ${l.toUpperCase()}) ${q['opcao_'+l]}
      </div>
    `).join('')}
  `;
}


// 🔹 RESPONDER
async function responder(letra, elemento){
  if(respondeu) return;
  respondeu = true;

  const q = questoes[atual];
  const correta = letra === q.correta;

  const alternativas = document.querySelectorAll('.alternativa');

  alternativas.forEach(el => {
    const texto = el.innerText.trim()[0].toLowerCase();

    if(texto === q.correta){
      el.classList.add('correta');
    } else if(el === elemento){
      el.classList.add('errada');
    }
  });

  const user = (await supabase.auth.getUser()).data.user;

  await supabase.from('respostas_usuario').insert({
    user_id: user.id,
    questao_id: q.id,
    resposta_marcada: letra,
    correta
  });

  setTimeout(() => {
    atual++;

    if(atual < questoes.length){
      mostrarQuestao();
    } else {
      document.getElementById('questao').innerHTML = '🎉 Fim das questões';
    }
  }, 1200);
}
</script>

</body>
</html>
