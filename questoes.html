<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questões — MedQuest Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{--bg:#0d1117;--surface:#161b22;--border:#21262d;--accent:#3b82f6;--text:#e6edf3;--muted:#7d8590;--success:#3fb950;--danger:#f85149}
        body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);margin-left:16rem}
        @media(max-width:768px){body{margin-left:0}}
        .main{padding:2.5rem;max-width:900px}
        .page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;flex-wrap:wrap;gap:1rem}
        .page-header h1{font-family:'Sora',sans-serif;font-size:1.8rem;font-weight:700}

        /* Filtros */
        .filtros{display:flex;gap:.75rem;flex-wrap:wrap;margin-bottom:2rem}
        .filtro-btn{padding:.45rem 1rem;background:var(--surface);border:1px solid var(--border);border-radius:20px;color:var(--muted);font-size:.85rem;cursor:pointer;transition:all .15s}
        .filtro-btn:hover,.filtro-btn.active{background:rgba(59,130,246,.15);border-color:var(--accent);color:var(--accent)}

        /* Card de questão */
        .questao-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.75rem;margin-bottom:1.5rem;transition:border-color .2s}
        .questao-card.respondida{border-color:#21262d}
        .questao-meta{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;margin-bottom:1rem}
        .badge{padding:.25rem .65rem;border-radius:20px;font-size:.75rem;font-weight:500}
        .badge-tema{background:rgba(59,130,246,.15);color:var(--accent)}
        .badge-facil{background:rgba(63,185,80,.15);color:var(--success)}
        .badge-media{background:rgba(210,153,34,.15);color:#d29922}
        .badge-dificil{background:rgba(248,81,73,.15);color:var(--danger)}
        .questao-pergunta{font-size:1rem;line-height:1.7;margin-bottom:1.25rem;font-weight:500}

        .opcao{display:flex;align-items:flex-start;gap:.75rem;padding:.7rem .9rem;border-radius:8px;border:1px solid var(--border);margin-bottom:.5rem;cursor:pointer;transition:all .15s}
        .opcao:hover{border-color:#444}
        .opcao.correta{border-color:var(--success);background:rgba(63,185,80,.08)}
        .opcao.errada{border-color:var(--danger);background:rgba(248,81,73,.08)}
        .opcao-letra{width:24px;height:24px;border-radius:50%;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:600;flex-shrink:0;margin-top:1px}
        .opcao.correta .opcao-letra{background:var(--success);border-color:var(--success);color:#000}
        .opcao.errada .opcao-letra{background:var(--danger);border-color:var(--danger);color:#fff}

        .gabarito-box{margin-top:1.25rem;padding:1rem 1.25rem;background:rgba(59,130,246,.07);border:1px solid rgba(59,130,246,.2);border-radius:10px;font-size:.9rem;line-height:1.7;display:none}
        .gabarito-box strong{color:var(--accent);display:block;margin-bottom:.4rem}

        .questao-actions{display:flex;gap:.75rem;margin-top:1.25rem;align-items:center;flex-wrap:wrap}
        .btn-fav{padding:.45rem .9rem;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:.85rem;cursor:pointer;transition:all .15s}
        .btn-fav:hover{border-color:#d29922;color:#d29922}
        .btn-fav.favoritado{border-color:#d29922;color:#d29922;background:rgba(210,153,34,.1)}
        .btn-comentarios{padding:.45rem .9rem;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:.85rem;cursor:pointer;transition:all .15s}
        .btn-comentarios:hover{border-color:var(--accent);color:var(--accent)}

        /* Comentários */
        .comentarios-box{margin-top:1rem;display:none}
        .comentario-item{padding:.75rem 1rem;border-left:2px solid var(--border);margin-bottom:.75rem}
        .comentario-autor{font-size:.78rem;color:var(--muted);margin-bottom:.25rem}
        .comentario-texto{font-size:.9rem;line-height:1.6}
        .comentario-input{display:flex;gap:.5rem;margin-top:.75rem}
        .comentario-input input{flex:1;padding:.6rem .9rem;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none}
        .comentario-input input:focus{border-color:var(--accent)}
        .comentario-input button{padding:.6rem 1rem;background:var(--accent);border:none;border-radius:8px;color:#fff;font-family:'DM Sans',sans-serif;font-size:.85rem;cursor:pointer}

        .loading{text-align:center;padding:3rem;color:var(--muted)}
        .paginacao{display:flex;justify-content:center;gap:.5rem;margin-top:2rem}
        .pag-btn{padding:.5rem .9rem;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--muted);cursor:pointer;font-size:.9rem;transition:all .15s}
        .pag-btn:hover,.pag-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
    </style>
</head>
<body>
<script src="sidebar.js"></script>
<script src="js/auth.js"></script>
<main class="main">
    <div class="page-header">
        <h1>Questões</h1>
        <span id="contador" style="color:var(--muted);font-size:.9rem"></span>
    </div>

    <div class="filtros" id="filtros">
        <button class="filtro-btn active" data-tema="">Todos os temas</button>
    </div>

    <div id="lista"></div>
    <div class="paginacao" id="paginacao"></div>
</main>

<script>
let sessaoAtual = null;
let favoritosSet = new Set();
let todasQuestoes = [];
let temaFiltro = '';
const POR_PAGINA = 10;
let paginaAtual = 1;

window.addEventListener('load', async () => {
    const session = await exigirLogin();
    if (!session) return;
    sessaoAtual = session;

    const sb = window.supabaseClient;
    const uid = session.user.id;

    // Carrega favoritos do usuário
    const { data: favs } = await sb.from('favoritos').select('questao_id').eq('user_id', uid);
    if (favs) favs.forEach(f => favoritosSet.add(f.questao_id));

    // Carrega todas as questões
    const { data: questoes, error } = await sb.from('questoes').select('*').order('id', { ascending: true });
    if (error || !questoes) {
        document.getElementById('lista').innerHTML = '<div class="loading">Erro ao carregar questões.</div>';
        return;
    }
    todasQuestoes = questoes;

    // Monta filtros de tema
    const temas = [...new Set(questoes.map(q => q.tema).filter(Boolean))].sort();
    const filtrosEl = document.getElementById('filtros');
    temas.forEach(tema => {
        const btn = document.createElement('button');
        btn.className = 'filtro-btn';
        btn.dataset.tema = tema;
        btn.textContent = tema;
        btn.onclick = () => aplicarFiltro(tema, btn);
        filtrosEl.appendChild(btn);
    });

    renderizar();
});

function aplicarFiltro(tema, btnEl) {
    temaFiltro = tema;
    paginaAtual = 1;
    document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('active'));
    btnEl.classList.add('active');
    renderizar();
}

document.querySelector('.filtro-btn[data-tema=""]').onclick = function() {
    aplicarFiltro('', this);
};

function questoesFiltradas() {
    return temaFiltro ? todasQuestoes.filter(q => q.tema === temaFiltro) : todasQuestoes;
}

function renderizar() {
    const filtradas = questoesFiltradas();
    const totalPags = Math.ceil(filtradas.length / POR_PAGINA);
    const inicio = (paginaAtual - 1) * POR_PAGINA;
    const pagina = filtradas.slice(inicio, inicio + POR_PAGINA);

    document.getElementById('contador').textContent = `${filtradas.length} questões`;
    document.getElementById('lista').innerHTML = pagina.length
        ? pagina.map((q, i) => renderQuestao(q, inicio + i)).join('')
        : '<div class="loading">Nenhuma questão encontrada.</div>';

    renderPaginacao(totalPags);
}

function renderQuestao(q, idx) {
    let opcoes = q.opcoes;
    if (typeof opcoes === 'string') { try { opcoes = JSON.parse(opcoes); } catch { opcoes = opcoes.split(',').map(s => s.trim()); } }
    const letras = ['A','B','C','D','E'];
    const difClass = { facil:'badge-facil', media:'badge-media', dificil:'badge-dificil' }[q.dificuldade] || 'badge-media';
    const favClass = favoritosSet.has(q.id) ? 'btn-fav favoritado' : 'btn-fav';
    const favLabel = favoritosSet.has(q.id) ? '★ Favoritado' : '☆ Favoritar';

    const opcoesHTML = opcoes.map((op, i) => `
        <div class="opcao" id="op-${q.id}-${i}" onclick="responder(${q.id}, ${i}, ${q.resposta}, this)">
            <div class="opcao-letra">${letras[i]}</div>
            <div>${op}</div>
        </div>
    `).join('');

    return `
        <div class="questao-card" id="card-${q.id}">
            <div class="questao-meta">
                ${q.tema ? `<span class="badge badge-tema">${q.tema}</span>` : ''}
                ${q.subtema ? `<span class="badge" style="background:var(--border);color:var(--muted)">${q.subtema}</span>` : ''}
                <span class="badge ${difClass}">${q.dificuldade || 'Média'}</span>
                ${q.banca ? `<span class="badge" style="background:var(--border);color:var(--muted)">${q.banca} ${q.ano||''}</span>` : ''}
            </div>
            <div class="questao-pergunta">${q.pergunta}</div>
            <div id="opcoes-${q.id}">${opcoesHTML}</div>
            ${q.comentario ? `<div class="gabarito-box" id="gabarito-${q.id}"><strong>Gabarito comentado</strong>${q.comentario}</div>` : ''}
            <div class="questao-actions">
                <button class="${favClass}" id="fav-${q.id}" onclick="toggleFavorito(${q.id}, this)">${favLabel}</button>
                <button class="btn-comentarios" onclick="toggleComentarios(${q.id}, this)">💬 Comentários</button>
            </div>
            <div class="comentarios-box" id="coments-${q.id}">
                <div id="lista-coments-${q.id}" style="margin-bottom:.5rem"></div>
                <div class="comentario-input">
                    <input type="text" id="input-coment-${q.id}" placeholder="Adicionar comentário...">
                    <button onclick="enviarComentario(${q.id})">Enviar</button>
                </div>
            </div>
        </div>
    `;
}

async function responder(qId, opcaoIdx, respostaCorreta, el) {
    const card = document.getElementById(`card-${qId}`);
    if (card.classList.contains('respondida')) return;
    card.classList.add('respondida');

    const acertou = opcaoIdx === respostaCorreta;
    const opcoes = card.querySelectorAll('.opcao');
    opcoes.forEach((op, i) => {
        op.style.pointerEvents = 'none';
        if (i === respostaCorreta) op.classList.add('correta');
        else if (i === opcaoIdx && !acertou) op.classList.add('errada');
    });

    const gabarito = document.getElementById(`gabarito-${qId}`);
    if (gabarito) gabarito.style.display = 'block';

    // Salva resposta
    const sb = window.supabaseClient;
    await sb.from('respostas').insert({
        user_id: sessaoAtual.user.id,
        questao_id: qId,
        opcao_escolhida: opcaoIdx,
        acertou,
        modo: 'normal'
    });
}

async function toggleFavorito(qId, btn) {
    const sb = window.supabaseClient;
    const uid = sessaoAtual.user.id;
    if (favoritosSet.has(qId)) {
        await sb.from('favoritos').delete().eq('user_id', uid).eq('questao_id', qId);
        favoritosSet.delete(qId);
        btn.className = 'btn-fav';
        btn.textContent = '☆ Favoritar';
    } else {
        await sb.from('favoritos').insert({ user_id: uid, questao_id: qId });
        favoritosSet.add(qId);
        btn.className = 'btn-fav favoritado';
        btn.textContent = '★ Favoritado';
    }
}

async function toggleComentarios(qId, btn) {
    const box = document.getElementById(`coments-${qId}`);
    const aberto = box.style.display === 'block';
    box.style.display = aberto ? 'none' : 'block';
    if (!aberto) await carregarComentarios(qId);
}

async function carregarComentarios(qId) {
    const sb = window.supabaseClient;
    const { data } = await sb.from('comentarios')
        .select('texto, criado_em, perfis(nome)')
        .eq('questao_id', qId)
        .order('criado_em', { ascending: true });

    const lista = document.getElementById(`lista-coments-${qId}`);
    if (!data || data.length === 0) { lista.innerHTML = '<p style="color:var(--muted);font-size:.85rem">Sem comentários ainda.</p>'; return; }
    lista.innerHTML = data.map(c => `
        <div class="comentario-item">
            <div class="comentario-autor">${c.perfis?.nome || 'Usuário'} · ${new Date(c.criado_em).toLocaleDateString('pt-BR')}</div>
            <div class="comentario-texto">${c.texto}</div>
        </div>
    `).join('');
}

async function enviarComentario(qId) {
    const input = document.getElementById(`input-coment-${qId}`);
    const texto = input.value.trim();
    if (!texto) return;
    const sb = window.supabaseClient;
    await sb.from('comentarios').insert({ user_id: sessaoAtual.user.id, questao_id: qId, texto });
    input.value = '';
    await carregarComentarios(qId);
}

function renderPaginacao(total) {
    const el = document.getElementById('paginacao');
    if (total <= 1) { el.innerHTML = ''; return; }
    let html = '';
    for (let i = 1; i <= total; i++) {
        html += `<button class="pag-btn ${i === paginaAtual ? 'active' : ''}" onclick="irPagina(${i})">${i}</button>`;
    }
    el.innerHTML = html;
}

function irPagina(n) {
    paginaAtual = n;
    renderizar();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
